chapter: 15
title: "母亲入组"
summary: >
  第十四章后，陈屿带着ARK/A-E-03边缘线索回到母亲补充评估流程中。
  他没有时间继续查方舟，因为母亲必须在三日内完成指定机构复查。陈屿陪母亲前往指定机构，
  发现所谓补充评估并不是一次普通复查，而是一套长期观察组入组流程：身份核验、风险稳定性问卷、
  配给药方案确认、家属知情回执、远程随访授权。执行人员态度温和，只按系统提示操作，并不知道
  沈医生、伊甸或方舟。陈屿试图撤回申请或暂停流程，却发现撤回会导致优先关怀资格失效，母亲将回到
  普通公共健康通道，配给药和复查周期也会被重新排队。母亲把“长期观察”理解成更细致的照顾，
  劝陈屿别把事情想复杂。章末，系统通知母亲已纳入长期观察组，陈屿同时收到沈医生关于材料复核的
  简短提醒，确认自己既没能阻止母亲入组，也没摆脱假材料的倒计时。

before_state:
  characters:
    - name: "陈屿"
      state: "刚从方舟/ARK边缘设施外围回来，只掌握A-E-03、独立能源、封闭网络等边缘线索；仍担心假材料被沈医生拆穿"
      location: "家中、指定补充评估机构"
    - name: "母亲"
      state: "已完成基础评估，收到补充评估通知；仍把优先关怀通道理解为治疗机会"
      location: "家中、指定补充评估机构"
    - name: "沈医生"
      state: "仍在复核陈屿交出的U盘和仿造束带；没有公开拆穿，保持礼貌压力"
      location: "消息中、公共健康协调体系背后"
    - name: "林远"
      state: "继续失联或不回复；不解释TM-000、ARK或A-E线索"
      location: "未知、消息未读状态中"
    - name: "社区/公共健康执行人员"
      state: "只负责按系统流程执行补充评估、入组登记、材料回执；不知道背后真实项目"
      location: "指定补充评估机构"
  plot_hooks:
    - "第十二章假U盘和仿造束带仍可能被沈医生识破"
    - "第十四章A-E-03和ARK边缘显示公共健康体系背后存在另一套封闭流程"
    - "母亲补充评估通知已经明确：将决定是否纳入长期观察序列"
    - "陈屿知道绿色通道资格可以被授予，也可以被撤回"
    - "第二卷第十五章目标：母亲被纳入长期观察组，陈屿无法取消"
  world_state: >
    第二卷继续从“发现边缘设施”转回“私人代价”。本章不继续解释方舟，
    也不进入AI阵营真相。重点是公共健康流程如何用温和、合规、可撤回资格的方式，
    把一个普通病人推入长期观察体系。执行端不需要知道阴谋，系统已经替他们完成了压迫。

after_state:
  characters:
    - name: "陈屿"
      state: "确认母亲已被纳入长期观察组；发现家属无法真正取消，只能在失去资格和接受观察之间选择"
      location: "补充评估机构外、返家路上"
    - name: "母亲"
      state: "正式进入长期观察组/长期观察序列；获得更密集随访和配给药调整承诺，但风险更高"
      location: "家中或返程路上"
    - name: "沈医生"
      state: "通过消息继续要求陈屿保持通讯畅通或补充说明，暗示材料复核尚未结束"
      location: "消息中"
    - name: "林远"
      state: "仍不解释；可以保持未读或只出现一条非常普通的状态变化"
      location: "未知"
    - name: "公共健康执行人员"
      state: "完成入组流程；仍认为这是常规优先关怀服务"
      location: "指定补充评估机构"
  plot_advances:
    - "母亲从优先关怀通道推进到长期观察组，命运进一步被系统锁定"
    - "陈屿确认流程无法由普通家属实质撤回，撤回代价是失去全部优先资格"
    - "执行端无知但高效，显示压迫不依赖恶人"
    - "假材料复核压力继续存在，为第十六章陈屿选择分片散布证据提供动机"
    - "方舟/ARK线暂时收束为背景压力，不在本章继续解释"
  new_hooks:
    - "长期观察组到底观察什么？母亲会被如何随访和用药？"
    - "沈医生什么时候拆穿假材料？拆穿后会如何处理陈屿和母亲？"
    - "陈屿是否要在材料露馅前主动把证据散出去？"
    - "林远为什么在母亲入组节点仍然沉默？"

must_happen:
  - "开篇必须承接第十四章：陈屿带着A-E-03照片、ARK疑问和沈医生复核压力回到母亲补充评估"
  - "母亲必须把补充评估当成麻烦但可能有益的好事，重点关心花钱、请假、路程和药"
  - "陈屿必须陪母亲去指定机构，而不是继续查方舟；私人危机压过宏大线索"
  - "指定机构不能写成阴森基地，应是普通、干净、流程化的公共健康合作点"
  - "必须出现执行端工作人员：态度礼貌、只按终端提示操作、不知道沈医生或背后项目"
  - "必须出现长期观察组/长期观察序列入组流程：身份核验、风险问卷、用药确认、远程随访授权、家属回执等至少三项"
  - "陈屿必须尝试暂停、撤回或询问能否不入组；得到的回答是可以撤回，但优先关怀资格和当前药物方案将失效或重新排队"
  - "必须体现系统性无力：没有人威胁他，但每一个选项都把母亲推向更差结果"
  - "母亲必须劝陈屿不要折腾，认为能多复查、多给药就是好事"
  - "沈医生必须以消息或电话形式出现一次，语气体面，提醒材料仍在复核或需要后续说明"
  - "林远不要解释；可以保持未读，或状态从'请假中'变成'外勤'但没有审批人"
  - "结尾必须冷收束：系统显示母亲已纳入长期观察组，陈屿知道自己没有阻止成功"

