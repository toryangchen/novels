key_scenes:
  - "家中早晨：母亲整理材料，陈屿检查手机里的A-E-03照片和沈医生复核消息"
  - "去指定机构路上：母亲担心麻烦陈屿和花钱，陈屿担心撤回资格代价"
  - "指定机构大厅：普通排队、蓝色工牌、终端叫号，环境温和但流程精密"
  - "身份核验：母亲编号、配给药批号、风险等级被终端自动带出"
  - "风险问卷：问题看似生活化，实则确认服从度、反应延迟、居家监测条件"
  - "用药确认：工作人员说明配给药方案将进入长期观察组动态调整"
  - "撤回尝试：陈屿询问能否暂停，工作人员展示撤回后果而非威胁"
  - "家属回执：陈屿被要求确认远程随访、数据授权或紧急联系权限"
  - "沈医生消息：材料仍在复核，请保持通讯畅通；如有必要会安排面谈"
  - "冷收束：母亲手机/机构终端显示'已纳入长期观察组'或'长期观察序列：已生效'"

母亲线处理:
  - "母亲不知道阴谋，只觉得绿色通道能省钱、能多检查、有人管"
  - "她可以对流程繁琐有抱怨，但不会主动拒绝"
  - "她要在某个关键处劝陈屿签字或不要撤回，形成情感压力"
  - "她不能本章崩溃或知道真相；恐怖来自她平静地配合"

沈医生处理:
  - "沈医生不需要正面登场；一条消息足够"
  - "消息措辞保持礼貌、专业、可解释：材料复核仍在进行，后续可能需要补充说明"
  - "不要让沈医生直接说发现假腕带；本章只让陈屿知道倒计时没有解除"

林远处理:
  - "林远本章不救场，不解释ARK、不解释TM-000"
  - "可以只保留未读状态，或训练中心状态栏轻微变化：请假中/外勤/审批人为空"
  - "不要让林远发谜语消息；如果出现消息，只能普通到近乎无意义"

信息揭露边界:
  - "可以明确母亲进入长期观察组"
  - "可以显示长期观察组包含随访、用药动态调整、数据授权和紧急联系"
  - "可以让陈屿联想到第十章样本池和第十四章封闭流程，但不能推导出完整真相"
  - "禁止解释方舟计划、冬眠舱、AI阵营、林远身份"
  - "禁止让执行人员知道伊甸/方舟/ARK等核心词"

environment_constraints:
  - "本章环境描写必须服务流程压迫、母亲处境和陈屿无力感，整体占比控制在10%-15%左右"
  - "指定机构最多保留3个环境锚点：蓝色工牌、叫号终端、隔断窗口/签字板"
  - "不要铺陈大厅装修、街景、天气、交通；除非用于体现普通公共服务外观"
  - "家中环境只写材料袋、药盒、手机通知等与评估流程有关的物件"
  - "如果一段环境描写删掉后不影响流程理解或情绪压力，应不写"

写作要求:
  - 字数: 4200-5200字
  - 基调: 温和、流程化、压迫、无力
  - 视角: 陈屿第三人称有限视角
  - 节奏: 家中准备开局、机构流程推进、中段撤回受阻、沈医生复核插入、入组冷收束
  - 重点: 写出没有坏人出场也能完成伤害；写出陈屿被母亲本人劝着接受流程的痛感
  - 对话: 工作人员礼貌机械，母亲生活化，陈屿尽量问具体后果而非喊口号
  - 段落: 流程信息适当合并，关键字段、撤回后果和入组结果可单独成段

避免:
  - "不要写成医院惊悚、绑架、强制带走或暴力冲突"
  - "不要让陈屿成功取消入组"
  - "不要让工作人员像反派一样威胁"
  - "不要继续大篇幅追查方舟/ARK；本章重点是母亲入组"
  - "不要让沈医生拆穿假材料并摊牌；只保留倒计时"
  - "不要提前解释长期观察组的真实实验目的"
  - "不要让母亲突然理解真相"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P0: 不要提前明牌方舟全貌、冬眠舱用途、两种AI、林远真实身份"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免连续用'他发现/他意识到/他觉得'推进"
  - "P1: 避免把流程写成设定百科，要用窗口、签字、终端字段和母亲反应承载信息"
  - "P2: 用撤回后果、家属回执、药物方案、长期观察组字段制造压力"
