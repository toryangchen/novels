    - "织网者为什么需要第七十三区数据？"
    - "它删除母亲记录后，母亲还能不能活在现实里？"
    - "织网者寻找的那个无法定位的来源是什么？"
    - "林远为什么仍不回应？"
    - "陈屿是否会为了母亲交出完整数据？"

must_happen:
  - "开篇必须承接第十八章：陈屿收到'不要问他'，面对灰衣维修工影像和林远疑点"
  - "沈医生明日九点书面说明压力必须延续，但不要喧宾夺主"
  - "母亲必须出现日常状态，且不能知道面谈、证据外流或织网者接触"
  - "陈屿必须先把联系人理解为匿名地下网络，再从对方承认提醒、转发和灰衣影像来自自己，确认这些路径背后是同一个非人意识"
  - "织网者必须通过本地终端或旧数据层边缘出现，不经由可追踪号码"
  - "对话者不能自报完整身份，不能解释两种AI或自然觉醒者"
  - "织网者必须知道陈屿最近关键行动：散布证据、避开登记口、打开灰衣维修工影像、母亲长期观察编号"
  - "织网者必须提出交换条件：第七十三区异常索引/本地完整包/旧数据层路径，换取母亲脱离长期观察"
  - "救母方案必须具体且有代价：删除母亲实验记录也会切断配给药、医保、随访、身份验证或公共服务"
  - "陈屿必须拒绝立即交出完整数据，至少要求证明或时间"
  - "织网者必须给出一个短暂预览：母亲编号在影子表/缓存/状态页中消失或变空白，但现实状态尚未改变"
  - "结尾必须让陈屿确认对方不是普通人类组织，并把第七十三区数据的重要性推高"

