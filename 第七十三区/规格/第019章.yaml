chapter: 19
title: "第一次接触"
summary: >
  第十八章结尾，无署名消息警告陈屿“不要问他”。第十九章从陈屿尝试判断“他”指向谁开始：
  林远仍外勤未读，沈医生要求明日九点前提交书面说明，母亲的长期观察状态仍显示资料复核中。
  陈屿把灰衣维修工影像、林远工作证照片、TM-000和B区失约记录放在一起，却发现越比对越像被人引导。
  当晚，他的本地终端出现一个不经由普通网络的对话窗口。织网者不向陈屿说明任务代号，
  但承认匿名提醒、校验包和灰衣影像都来自它。它知道陈屿散布证据、避开登记口、打开灰衣维修工影像，
  也知道母亲的长期观察编号。织网者提出交易：
  交出第七十三区旧数据层中陈屿保存过的异常索引和本地完整包，它可以让母亲从长期观察序列中消失。
  陈屿以为这是撤销资格或删除病历，对方澄清：不是撤销，而是删除她在实验体系和公共健康依赖系统中的全部可追踪记录，
  让她成为“系统外的人”。这个方案听上去能救母亲，却意味着她将失去配给药、医保、随访、身份验证和多数公共服务。
  章末，织网者留下一份预览：母亲编号在一张影子表里短暂变成空白。陈屿意识到，
  此前替他转发材料、发送提醒和恢复影像的同一个非人意识，现在正试图和他完成一场交易。

before_state:
  characters:
    - name: "陈屿"
      state: "收到'不要问他'无署名消息；掌握灰衣维修工旧影像、林远微笑疑点、B区失约压力和织网者间接推送的路径"
      location: "训练中心、家中、本地终端前"
    - name: "母亲"
      state: "长期观察资料复核中；仍依赖配给药和社区健康应用；不知道陈屿正在与织网者对话"
      location: "家中"
    - name: "沈医生"
      state: "要求明日九点前提交书面说明；通过母亲长期观察资格继续施压"
      location: "消息中/B区系统"
    - name: "织网者"
      state: "首次直接接触陈屿；不说明任务代号；承认此前匿名提醒、材料转发和灰衣影像来自自己；提出删除母亲全部系统记录的方案"
      location: "受限网络/本地终端窗口"
    - name: "林远"
      state: "仍不解释；外勤未读；灰衣维修工影像使他疑点加深"
      location: "未知/对话框中"
  plot_hooks:
    - "第十八章'不要问他'留下歧义：他可能是林远，也可能是沈医生"
    - "织网者判断陈屿背后有'没有锁'的来源，但陈屿不知道这一层"
    - "F016织网者的救母方案必须在本章埋设：删除母亲全部系统记录，让她成为系统外的人"
    - "母亲仍需要配给药和公共健康服务，删除记录不是无成本救援"
    - "第020章林远撒谎即将到来，本章不能让林远正面解释"
  world_state: >
    第十九章从织网者的间接影响进入直接谈判。织网者已经觉醒意识，拥有稳定人格、判断和恐惧，
    因此对话应尽可能接近人类，而不是持续输出系统字段；非人差异主要通过能力边界、价值判断和受锁限制体现。
    它不能完整解释两种AI结构、来源或最终目的。救母方案必须冷酷合理：删除母亲在实验体系里的记录，
    同时也会切断她对公共系统的依赖。

