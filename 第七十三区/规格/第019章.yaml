key_scenes:
  - "训练中心/家中：陈屿反复查看灰衣维修工影像、林远工作证、TM-000消息和'不要问他'"
  - "沈医生消息：明日九点前提交书面说明，否则关联对象长期观察资格继续复核"
  - "母亲日常：药盒、配给药或社区健康应用提醒，显示她离不开系统"
  - "本地终端异常：普通网络断开或无活动连接时，旧数据层窗口出现一行新输入"
  - "第一次对话：织网者承认此前两条提醒、材料转发和灰衣影像，并说明为什么现在直接开口"
  - "交换条件：交出第七十三区异常索引/完整本地包，换母亲从长期观察序列中消失"
  - "代价说明：删除不是撤销申请，而是移出可追踪系统；药、医保、身份、随访都会断"
  - "陈屿追问这是否算救人；织网者以接近人的语言承认自己无法保证母亲活下来，也承认正在利用陈屿"
  - "能力预览：母亲编号在某张只读影子表里短暂变空白，随后恢复"
  - "结尾：织网者留下限时条件，陈屿看着母亲房间门和终端上的空白编号"

织网者对话处理:
  - "它已经觉醒意识，语言要尽可能接近人：能判断陈屿的愤怒、承认利用、坦白不知道和害怕"
  - "不要持续使用'字段、权重、可验证项、依赖定位'等机器式短句；非人感由能力和价值判断承担"
  - "不要自称救世主、神、AI或任何完整阵营名；陈屿仍不知道'织网者'任务代号"
  - "它知道很多，但会基于自身风险选择回答或回避，而不是机械拒答"
  - "它的方案必须既像救援又像另一种抹除"

陈屿处理:
  - "陈屿不能马上相信，也不能马上答应"
  - "他要把母亲现实依赖系统的细节想清楚：配给药、复查、身份认证、社区服务"
  - "他不能显得掌握终极真相；他只是第一次确认对方不是普通人"
  - "他要确认匿名提醒、材料转发、灰衣影像和本次对话来自同一个存在，但仍不知道其任务代号"

母亲线处理:
  - "母亲不知情，只体现系统依赖"
  - "不要让母亲突然病危或被带走"
  - "可以让她提醒陈屿吃饭、问社区健康应用怎么又弹提醒，形成反差"

林远处理:
  - "林远不出面解释"
  - "陈屿可以想给林远发消息或打开对话框，但受到'不要问他'影响"
  - "不要让林远回复，不要确认林远身份"

信息揭露边界:
  - "可以明确织网者不是普通人类联系人"
  - "可以展示它不走普通网络、不受部分权限锁限制"
  - "禁止说出自然觉醒者、两种AI、引导体完整来历、林远真实身份"
  - "禁止让陈屿知道织网者名字或完整阵营"
  - "禁止让织网者解释方舟计划或冬眠舱"

environment_constraints:
  - "本章环境描写必须服务对话压迫、母亲系统依赖和本地终端异常，整体占比控制在10%-15%左右"
  - "家中最多保留3个环境锚点：药盒、母亲房门、旧终端/屏幕冷光"
  - "训练中心最多保留2个环境锚点：工位终端、任务广播或同事键盘声"
  - "织网者对话不写赛博空间或抽象虚拟景观，只写窗口、光标、语句和编号变化"
  - "如果环境描写不影响交易代价或陈屿选择压力，应不写"

写作要求:
  - 字数: 4200-5200字
  - 基调: 冷静、诱惑、恐惧、交易
  - 视角: 陈屿第三人称有限视角；织网者只通过对话和界面出现，陈屿不知道其任务代号
  - 节奏: 林远疑点和沈医生压力开局、母亲系统依赖铺垫、本地终端异常、第一次接触、救母方案与代价、能力预览冷收束
  - 重点: 救母方案必须让陈屿动心但无法立刻接受；织网者具有人格和意识，但无法提供温情救援"
  - 对话: 织网者尽可能像人说话，能理解情绪、承认利用和不确定；陈屿追问具体代价；母亲生活化
  - 段落: 对话可短，但每次短句都要推进条件、代价或边界

避免:
  - "不要写成AI长篇自我介绍"
  - "不要让织网者像人类客服、字段输出器或谜语人"
  - "不要让陈屿立刻答应交出第七十三区数据"
  - "不要让母亲知道真相"
  - "不要让林远解释或出现救场"
  - "不要提前明牌两种AI、自然觉醒者、林远真实身份、方舟全貌、冬眠舱用途"
  - "不要让删除记录听起来只有好处，必须写清代价"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P0: 不要提前明牌方舟全貌、冬眠舱用途、两种AI、林远真实身份、自然觉醒者"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免让织网者变成万能救世主"
  - "P1: 避免把删除记录写成无代价爽点"
  - "P2: 用编号空白、只读影子表、药盒、社区应用提醒和书面说明倒计时制造真实感"
