    value: 3
    note: "开篇，陈屿被热醒，展示压抑的日常"
  - position: 20
    value: 3
    note: "与母亲闲聊，通过回忆展示社会变迁，节奏舒缓"
  - position: 40
    value: 4
    note: "通勤路上，展示社会分化，压抑感加深"
  - position: 70
    value: 5
