key_scenes:
  - "陈屿被热醒：50°C的热浪，限电的空调，汗流浃背的房间"
  - "与母亲的闲聊：母亲回忆2020年代的社会，感叹三十年的变化"
  - "通勤路上：精英社区的灯火通明与普通城区的热浪地狱形成刺眼对比"
  - "UBI领取者的生存状态：麻木、空虚、沉迷虚拟娱乐"
  - "AI训练中心：陈屿开始训练医疗AI模型"

母亲闲聊内容参考:
  - 2020年代：那时候还有工作，虽然累但至少有盼头。房价高得离谱，但年轻人还在努力。
  - 2030年代：AI开始大规模取代人类工作，失业潮来了。政府推出UBI，说是保障生活，其实就是把你养着不让你闹事。
  - 2040年代：能源危机越来越严重，夏天越来越热。精英社区开始建自己的电网，普通人连空调都开不起。
  - 2050年代：现在这样，限电、热浪、UBI、精英社区。母亲感叹：以前的人至少还有选择，现在连选择都没有了。
  - 母亲的语气：不是愤怒，是疲惫和无奈。她已经接受了这个现实，只是偶尔会想起过去。
  - 陈屿的反应：沉默。他知道母亲说得对，但他不知道该说什么。他只是听着，然后去上班。

写作要求:
  - 字数: 6000字
  - 基调: 压抑、克制、暗流涌动
  - 视角: 陈屿第三人称有限视角
  - 节奏: 慢，通过细节建立世界观
  - 重点: 通过感官描写（热浪、汗水、灯光）让读者感受到这个世界的压迫感

红线提醒:
  - P0: 不要用AI词汇（"众所周知"、"不言而喻"等）
  - P0: 不要用感悟式结尾（"他明白了..."、"她终于懂得..."）
  - P0: 不要用上帝视角（"所有人没想到..."）
  - P1: 避免套路化表达、流水账、抽象心理描写
  - P2: 注意细节打磨、画面感、节奏感
