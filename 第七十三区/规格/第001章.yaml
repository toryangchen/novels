chapter: 1
title: "限电"
summary: >
  2050年代的夏天，陈屿在限电的出租屋里被热醒。
  窗外是50°C的热浪，屋内的空调因为限电无法启动。
  他要去上班——训练一个新上线的医疗AI模型。
  通过他的通勤路上的所见所闻，快速建立世界观：
  能源危机、社会分化、普通人与精英的巨大鸿沟。

before_state:
  characters:
    - name: "陈屿"
      state: "普通的AI训练师，35岁，聪明但无力"
      location: "普通城区的限电出租屋"
    - name: "陈屿母亲"
      state: "年迈，身体不好，靠UBI生活"
      location: "与陈屿同住"
  plot_hooks: []
  world_state: >
    2050年代，AI大规模使用导致能源危机，
    全球变暖使夏季气温频繁突破50°C，
    普通人限电，精英社区恒温25°C。

after_state:
  characters:
    - name: "陈屿"
      state: "日常工作状态，对社会不满但无力改变"
      location: "AI训练中心"
    - name: "陈屿母亲"
      state: "在家中，等待陈屿下班"
      location: "出租屋"
  plot_advances:
    - "建立了能源危机的社会背景"
    - "建立了陈屿的性格：聪明、观察者、无力感"
    - "暗示了精英阶层与普通人的巨大鸿沟"
  new_hooks:
    - "陈屿正在训练的医疗AI模型（伏笔：与伊甸计划相关）"
    - "母亲的身体状况（伏笔：可能与伊甸计划有关）"

must_happen:
  - "陈屿在限电的出租屋里被热醒，展示能源危机的残酷"
  - "陈屿与母亲的闲聊：通过母亲的回忆，自然地展示2020年代至今的社会变迁"
  - "通过陈屿的视角，展示普通人的日常生活：限电、热浪、UBI"
  - "陈屿去上班的路上，展示社会分化：精英社区的灯火通明 vs 普通城区的热浪地狱"
  - "到达AI训练中心，展示陈屿的工作：训练医疗AI模型"
  - "建立陈屿的性格：聪明、观察者、对社会不满但无力改变"

tension_curve:
