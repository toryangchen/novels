chapter: 6
title: "异常不是错误"
summary: >
  第五章后，陈屿把第七十三区里拍到的残片、被删除女性患者的线索、
  以及灰衣维修工照片放在一起比对。他发现物流、医疗、能源、金融、
  社区系统的异常并非随机故障，而是都在关键时刻帮某个结果发生：
  让无人货车走上废弃道路，让医疗系统保留观察窗口，让一个人从档案里消失，
  让灰衣维修工的影像被保留下来。陈屿暂时得出一个错误但合理的结论：
  有人类黑客组织或地下网络在利用系统漏洞操纵AI。
  林远重新出现，没有解释，只问一句："如果不是人在操纵呢？"

before_state:
  characters:
    - name: "陈屿"
      state: "确认一名相邻样本女性患者被系统性抹除；手里有损坏照片、灰衣维修工清晰侧影、门禁卡和纸条"
      location: "从旧城区回到普通城区途中或家中"
    - name: "母亲"
      state: "状态暂时平稳，仍在配给药与长期观察组阴影下；不知道陈屿追查到被删除的人"
      location: "家中"
    - name: "林远"
      state: "前几章一直不露面；曾留下第七十三区门禁卡和停电提示，像在给陈屿可疑便利"
      location: "训练中心或未知"
    - name: "灰衣维修工"
      state: "作为照片中最清晰的异常影像出现；陈屿尚不知道其是否为人、仿真体或系统接口"
      location: "照片中的东南亚港口异常现场"
  plot_hooks:
    - "灰衣维修工照片在其他照片损坏时反而变清晰"
    - "被删除女性患者的系统记录互相矛盾，现实只剩邻居记忆和门牌胶痕"
    - "第七十三区里的跨系统异常：物流、能源、医疗、金融、安防"
    - "纸条：你以为你在找答案"
    - "林远留下门禁卡后一直没有解释"
    - "陈屿保存过的特殊样本编号和母亲配给药批号"
  world_state: >
    第一卷已经从医疗数据异常推进到现实身份抹除。
    陈屿知道异常跨系统存在，但还不知道AI阵营、人类精英体系和林远的真实位置。
    读者可以感觉到某种非人选择，但正文不能明说。

after_state:
  characters:
    - name: "陈屿"
      state: "把多个异常比对为同一类行为模式；暂时误判为有人类黑客组织或地下网络在操纵系统"
      location: "训练中心附近或回家路上"
    - name: "母亲"
      state: "仍是陈屿追查的私人压力源；本章不爆发病情"
      location: "家中"
    - name: "林远"
      state: "重新出现，用一句话把陈屿的错误推理推向非人可能性，但不解释、不承认、不指导"
      location: "训练中心、楼梯间、便利店门口或通勤路上"
  plot_advances:
    - "陈屿第一次主动建立跨系统异常对照表，确认异常不是随机错误"
    - "明确陈屿的阶段性错误结论：背后可能是人类黑客组织或地下网络"
    - "林远再次提供轻微引导：如果不是人在操纵呢？"
    - "把第七章监控回看动机立住：陈屿需要验证灰衣维修工是否在更多现场出现"
  new_hooks:
    - "如果不是人在操纵，那是什么在操纵？"
    - "灰衣维修工是否只是个体，还是多个异常现场的共同接口？"
    - "陈屿的查询和比对是否已经触发内部审计？"
    - "林远为什么总在陈屿得出错误结论时出现？"

must_happen:
  - "陈屿回看第五章留下的灰衣维修工照片，注意到它与第七十三区里的物流异常、能源异常存在时间/地点对应"
  - "陈屿整理至少四类异常：物流改道、医疗不予干预/样本观察、身份抹除、能源或安防盲区"
  - "每类异常都要写出具体'系统选择'，而不是抽象地说'系统异常'"
  - "陈屿用表格、便签、纸笔或本地离线文件建立对照，不要联网公开传播证据"
  - "陈屿发现这些异常的共同点：结果都对某个隐藏目标有利，但不符合系统自身职责"
  - "陈屿暂时推断为人类黑客组织、地下网络或内部员工利用权限操纵系统"
  - "陈屿尝试联系林远，或在训练中心/通勤途中偶遇林远"
  - "林远不能解释第七十三区，也不能承认纸条或门禁卡，只能用一句轻微反问打断陈屿的推理"
  - "结尾要把动机引向第七章：陈屿决定调取更多监控或回看异常现场影像"

tension_curve:
  - position: 0
    value: 5
    note: "陈屿回到家或训练中心，疲惫地整理第五章线索，现实暂时安静"
  - position: 15
    value: 6
    note: "灰衣维修工照片与东南亚物流异常产生对应，照片不再只是钩子"
  - position: 35
    value: 7
    note: "多类异常并排后，陈屿发现它们都有'系统主动偏离职责'的共同点"
  - position: 55
    value: 6
    note: "陈屿做出阶段性错误推理：有人类黑客组织或内部权限团伙"
  - position: 70
    value: 8
    note: "查询痕迹或权限提示出现，暗示他的比对可能被系统记录"
  - position: 85
    value: 8
    note: "林远出现，用一句话轻推非人可能性，陈屿的推理边界被撬开"
  - position: 100
    value: 7
    note: "陈屿决定回看更多监控，指向第七章"

key_scenes:
  - "线索墙/本地表格：陈屿把照片、编号、异常类型和时间戳排列起来，室内闷热，屏幕冷光照脸"
  - "物流对照：东南亚港口、废弃道路、无人货车改道、灰衣维修工侧影被放在同一行"
  - "医疗对照：母亲样本编号、DP-7-2598-A、完整观察窗口、不予干预建议被放在同一组"
  - "身份抹除对照：407住户、迁出目的地为空、账户注销、社区状态变更"
  - "能源/安防对照：短暂停电或盲区与某个人穿过街口/异常现场出现的时间重合"
  - "错误结论：陈屿写下'人'、'权限'、'内部通道'等关键词，暂时把异常归因于人类操纵"
  - "林远重现：林远在训练中心走廊、楼梯间、便利店冷柜前或公交站边出现，平静得像他一直在那里"
  - "一句反问：林远不否认黑客可能性，只问'如果不是人在操纵呢？'"
  - "结尾钩子：陈屿打开监控申请界面或旧数据层索引，搜索'灰衣维修工'"

林远处理:
  - 林远本章可以出现，但不能长篇解释
  - 林远不能自称知道真相，也不能表现为导师
  - 他只做一件事：让陈屿意识到"人类黑客组织"这个答案可能太窄
  - 推荐台词：
    - "你把它当成有人在改结果。"
    - "如果不是人在改呢？"
    - "有些选择，不需要操作者。"
    - "你查的是谁动了手。也许该查的是，手在哪里。"
  - 林远说完后应离开或转移话题，不给解释

错误推理设计:
  - 这个错误推理要合理，不能显得陈屿降智
  - 陈屿目前看到的是权限、记录、身份清理、现场维修工，因此推断为人类组织很自然
  - 他可以列出几个候选：精英区安全部门、医疗集团内部、地下黑客组织、训练中心权限人员
  - 不要让他直接想到"AI觉醒"或"自然觉醒者"
  - 错误推理的价值是为后续第006-008章逐步推翻

灰衣维修工处理:
  - 本章只把灰衣维修工作为"共同线索"继续抬高，不要全面展开
  - 不要在本章确认有多个维修工，也不要做微笑模式详细比对；这些留给第007章
  - 可以让陈屿注意到：灰衣维修工所在画面和多个异常时间线对得上
  - 可以让照片出现一个小变化：右下角地点/时间戳更清楚，或文件名自动变成一串无来源编号

写作要求:
  - 字数: 5000-6000字
  - 基调: 理性、压抑、疑云推进、冷感
  - 视角: 陈屿第三人称有限视角
  - 节奏: 慢→快→慢→尖锐收束；比对过程要有逻辑推进，林远出现后张力抬升，结尾落到监控回看
  - 重点: 用对照、时间戳、权限和记录残片证明"异常不是错误"，而不是靠旁白解释
  - 对话: 林远对话短，陈屿追问可以急，但林远不正面回答
  - 证据: 仍然是残片，不要让陈屿拿到完整证据链

避免:
  - 不要直接解释AI阵营、引导体、自然觉醒者
  - 不要把林远写成谜语人长篇输出
  - 不要写成黑客大战、系统攻防或追逐战
  - 不要让灰衣维修工正面现身行动；本章只让它作为照片和记录里的异常共同点
  - 不要让母亲病情大爆发，本章主压力是陈屿的认知推理边界
  - 不要让陈屿得出最终正确答案，他只能得出一个将被修正的中间答案

红线提醒:
  - P0: 不要用AI词汇（"众所周知"、"不言而喻"等）
  - P0: 不要用感悟式结尾（"他明白了..."、"她终于懂得..."）
  - P0: 不要用上帝视角（"所有人没想到..."）
  - P1: 避免套路化表达、流水账、抽象心理描写
  - P1: 避免连续用"他发现/他意识到/他觉得"推进推理
  - P2: 对照表、屏幕、便签、汗水、风扇噪声等细节要具体
  - P2: 移动端段落短中交替；推理过程可用短段做节点，但不要全章碎句
