chapter: 10
title: "样本池"
summary: >
  陈屿拿着母亲体检中心留下的编号，利用训练师权限和旧数据残片进行反查。
  他发现所谓免费深度体检并非普通福利，而是从UBI领取者、长期配给药用户和旧城区居民中筛选样本，
  按认知延迟、药物反应、器官年龄、服从度和长期观察价值分组。母亲所在分组与特殊样本编号存在交叉，
  医疗AI给出的建议不是治疗，而是继续观察、延迟干预、保持样本稳定。陈屿第一次产生明确职业罪感：
  他训练和标注过的模型，正在服务一套伤害普通人的筛选系统。章末，他发现母亲编号旁有一个空白关联项，
  指向曾被删除的 DP-7-2598-A。

before_state:
  characters:
    - name: "陈屿"
      state: "陪母亲完成体检，观察到UBI领取者、同款药物贴片和异常体检项目；记下母亲体检编号"
      location: "家中或训练中心工位"
    - name: "母亲"
      state: "体检后疲惫但无明显急症；等待报告或后续通知"
      location: "家中"
    - name: "林远"
      state: "仍未解释第七十三区和门禁卡；本章可短暂出现但不能解释真相"
      location: "训练中心或未知"
    - name: "医疗AI系统"
      state: "表面提供健康风险筛查和干预建议，实际在进行样本分组与长期观察"
      location: "训练系统、体检中心数据接口"
  plot_hooks:
    - "母亲体检编号格式接近特殊样本线"
    - "体检中心集中出现UBI领取者和药物贴片"
    - "特殊样本建议多次出现'不予干预'或'继续观察'"
    - "被删除患者 DP-7-2598-A 仍是母亲线的预演"
    - "内部监察已经警告陈屿不要越界查询"
  world_state: >
    第二卷核心推进：从体检现场进入样本池结构。
    陈屿能看到筛选与分组，但仍看不到最终实验目标。
    表层上，这是一套公共健康和医疗AI协同的福利体系；底层上，它把弱势群体转化为可观察、可延迟干预的样本。

after_state:
  characters:
    - name: "陈屿"
      state: "确认UBI人群被纳入样本池，母亲所在分组与特殊样本和被删除患者有关；职业罪感明显加重"
      location: "训练中心工位或家中终端前"
    - name: "母亲"
      state: "仍不知道自己被分组；后续报告和随访可能继续收紧"
      location: "家中"
    - name: "林远"
      state: "如果出现，只能提醒陈屿注意'建议'和'治疗'的区别，不能讲出答案"
      location: "训练中心"
    - name: "DP-7-2598-A"
      state: "作为空白关联项再次出现，连接第五章被删除的人和母亲样本池"
      location: "系统残留记录"
  plot_advances:
    - "确认免费体检是样本筛选入口"
    - "确认UBI领取者、长期配给药用户和旧城区居民构成主要样本来源"
    - "医疗AI建议从治疗逻辑转为观察逻辑，陈屿意识到自己的工作被卷入"
    - "母亲与被删除患者通过样本池关联起来"
    - "第十一章逃出者登场有了来源：有人从体检/样本体系中逃出"
  new_hooks:
    - "样本池的最终实验目标是什么？"
    - "为什么某些样本被继续观察，某些样本被删除或转移？"
    - "DP-7-2598-A 与母亲分组之间的空白关联项代表什么？"
    - "陈屿是否还能继续使用权限，而不再次触发更严重审计？"

must_happen:
  - "开篇从母亲体检编号入手，陈屿反查编号，不要重复体检中心现场太多"
  - "陈屿必须受到第八章警告影响，查询更谨慎：离线记录、低权限入口、缓存残影、交叉字段，而不是明目张胆硬查"
  - "必须确认UBI领取者是样本池主要来源之一，但不要写成公开阴谋文件"
  - "样本池字段要具体：领取状态、配给药批次、体检编号、认知延迟、药物反应、器官年龄、干预建议、观察价值"
  - "医疗AI的建议要冷静：继续观察、暂缓干预、保持变量稳定、避免非必要治疗"
  - "陈屿要把自己过去训练/标注过的模型任务与这些建议联系起来，职业罪感出现"
  - "不能让陈屿完整破解系统，只能看到一部分分组表、缓存接口或导出失败的字段"
  - "母亲分组要与特殊样本线产生明确联系，但不要说她一定会被删除"
  - "DP-7-2598-A 要作为空白关联项或历史对照项再次出现，连接第五章"
  - "本章结尾要指向第十一章：样本池里有人不见了、逃出了，或有一条外部求助信息进入陈屿视野"

tension_curve:
  - position: 0
    value: 6
    note: "陈屿回到终端前，用母亲体检编号做低风险反查"
  - position: 20
    value: 7
    note: "编号对应到公共健康项目和UBI领取状态，体检中心不是单点异常"
  - position: 40
    value: 8
    note: "样本池字段逐步出现，医疗建议明显偏向观察而非治疗"
  - position: 60
    value: 8
    note: "陈屿看到熟悉的模型标签，意识到自己训练过的系统参与了分组"
  - position: 78
    value: 9
    note: "母亲所在分组与特殊样本、被删除患者发生交叉"
  - position: 100
    value: 8
    note: "空白关联项或求助残片出现，钩子转向第十一章逃出者"

key_scenes:
  - "编号反查：陈屿把母亲体检回执放在键盘旁，逐位拆分编号结构"
  - "低权限入口：他不敢再进旧数据层，只用训练任务缓存、模型标注历史和公共健康接口交叉"
  - "UBI字段露出：样本列表不显示姓名，只显示领取状态、社区级别、配给药批次和风险等级"
  - "样本池结构：陈屿看到分组名不是疾病，而是反应类型、观察窗口、干预优先级"
  - "医疗AI建议：几条建议写着暂缓干预、继续观察、保持长期用药方案稳定"
  - "职业罪感：陈屿认出某些标签就是他曾经训练过的标注项，例如'服从度'、'延迟反应'、'异常恢复'"
  - "母亲关联：母亲编号所在行被隐藏姓名，但配给药批次和旧样本编号对得上"
  - "DP-7-2598-A 回返：空白关联项里闪过这个编号，随后字段变成权限不足或记录不存在"
  - "外部钩子：陈屿收到匿名短消息、旧邮箱退信、或系统缓存里出现一句求助，提示有人从样本体系中逃出"

样本池字段设计:
  - "source_type: UBI领取者、长期配给药用户、旧城区公共健康项目"
  - "sample_code: 与DP序列有格式联系，但不要全部公开真实姓名"
  - "drug_batch: 与第三章配给药批号呼应"
  - "response_delay: 认知/反应延迟，来自第九章体检项目"
  - "organ_age_delta: 器官年龄偏差，只露字段名或数值，不解释逆龄机制"
  - "compliance_score: 服从度或流程配合度，制造职业罪感"
  - "intervention_advice: 继续观察、暂缓干预、保持变量稳定"

职业罪感处理:
  - "陈屿不是突然忏悔，要从具体模型标签触发"
  - "他可以想起自己曾经把某类标注当成普通训练任务：延迟反应、依从性、异常恢复、情绪平稳"
  - "不要写成大段自责独白，用手停在键盘上、删除查询词、看母亲药盒等动作承载"
  - "职业罪感是第二卷重要情绪线，但本章只点燃，不要写到崩溃"

林远处理:
  - "林远可以不出现；如果出现，只能给一句轻微提醒"
  - "推荐台词：'你看的是治疗建议，还是观察建议？'"
  - "不要让林远讲样本池真相，也不要替陈屿查数据"
  - "陈屿对林远应有一点不信任：门禁卡、审计、母亲体检都和他的引导有关"

写作要求:
  - 字数: 3800-4300字
  - 基调: 冷静、技术性、罪感上升、数据背后的现实恐怖
  - 视角: 陈屿第三人称有限视角
  - 节奏: 反查慢启动、字段逐步露出、中段逻辑加速、职业罪感压住、结尾用空白关联项收束
  - 重点: 写出'筛选'而不是'治疗'，写出陈屿的工作如何被这套系统吸纳
  - 对话: 可以少对话；若有林远或母亲，短而克制
  - 段落: 数据比对不要全碎句，关键字段和钩子可单独成段

避免:
  - "不要直接说出伊甸计划完整内容或实验目标"
  - "不要让陈屿一次破解全部样本池"
  - "不要写成热血黑客突破防火墙"
  - "不要让母亲本章得知全部真相"
  - "不要把职业罪感写成口号式忏悔"
  - "不要忘记第八章审计压力，陈屿查询必须谨慎"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免把样本池字段写成设定百科"
  - "P1: 避免连续用'他发现/他意识到/他觉得'推进"
  - "P2: 用回执、药盒、缓存字段、标注历史和删除失败的查询词承载情绪"
