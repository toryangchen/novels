chapter: 11
title: "逃出者"
summary: >
  第十章末，陈屿发现自己被训练系统标记为行为观察对象。次日清晨，他在旧邮箱里收到一封P2P加密阅后即焚邮件，
  内容指向第五章被删除患者 DP-7-2598-A；邮件发送端残留的维护端口和公共健康维护网关暗示灰衣维修工曾经介入。陈屿不敢再使用训练中心权限，只能用离线记录、邮件连接记录和维护箱检修范围
  追踪信号来源。他在一处高温断电后的旧商场地下通道里见到逃出者：她外表像四十岁左右，档案却显示六十多岁；
  皮肤和面容异常年轻，但呼吸、咳血、步态和手臂淤斑暴露出身体正在崩溃。她不知道完整真相，只知道自己被登记、
  被体检、被转移，后来听到一个词：“伊甸”。她警告陈屿不要相信穿蓝衣服的人，也不要相信系统里的“治疗建议”。
  章末，蓝衣工作人员接近地下通道，逃出者把一枚破损腕带或一张残留编号交给陈屿后离开/被迫转移，
  陈屿第一次面对一个活着的样本，而不只是屏幕上的字段。

before_state:
  characters:
    - name: "陈屿"
      state: "已确认样本池存在，并在缓存中看到自己被纳入行为观察；手里有母亲编号、DP-7-2598-A残留记录和外部求助信号"
      location: "家中或训练中心附近"
    - name: "母亲"
      state: "体检后疲惫，仍不知道自己可能被纳入长期观察；是陈屿行动的软肋"
      location: "家中"
    - name: "逃出者"
      state: "疑似第五章被删除患者或与其同组样本；外表年轻化，但身体指标崩溃，正在躲避回收"
      location: "旧城区临时藏身点"
    - name: "蓝衣工作人员"
      state: "公共健康/社区医疗体系的外勤执行者；表面温和，负责寻找和带回逃出者"
      location: "旧城区、旧商场、街面接驳车附近"
    - name: "林远"
      state: "本章最好不正面出现；可以只通过一条迟来的空消息或工位缺席保持存在感"
      location: "未知"
  plot_hooks:
    - "第十章外部求助信号：编号未知，状态变更为脱离观察"
    - "DP-7-2598-A 的关联项不存在或已删除"
    - "第五章邻居留下警告：不要相信穿蓝衣服的人"
    - "第九章等待区老太太说'你也是7系？'后被带走"
    - "陈屿已被记录为服从度评分3/10，继续查询会触发更严重处置"
  world_state: >
    第二卷进入人体实验的实证阶段。
    读者已知道体检和样本池可疑，但还没有看见实验结果落在一个人身上。
    本章必须把数据恐怖转化为现实恐怖：一个从系统里逃出来的人，既是证据，也是警告。

after_state:
  characters:
    - name: "陈屿"
      state: "确认样本池中确实有人被转移、改写和回收；拿到与伊甸/DP-7-2598-A有关的实体证据"
      location: "旧城区返程路上或家中"
    - name: "逃出者"
      state: "留下伊甸线索和实体证据后消失、转移或被迫离开；是否安全未知"
      location: "未知"
    - name: "母亲"
      state: "仍在家中等待体检报告；她可能变成下一个可被带走的人，压力加重"
      location: "家中"
    - name: "蓝衣工作人员"
      state: "确认逃出者仍被体系追踪，也暗示陈屿已经进入外勤视野"
      location: "旧城区"
  plot_advances:
    - "外部求助信号落到现实人物身上，同时暗示灰衣维修工在背后递送线索"
    - "逆龄实验体首次以活人形态出现"
    - "伊甸计划首次在正文中出现词名，但不解释完整目标"
    - "第五章被删除的人、第九章体检中心、第十章样本池三条线并到同一活证据上"
    - "陈屿从查字段升级为接触逃出样本，风险等级提高"
  new_hooks:
    - "伊甸到底是什么项目？"
    - "逃出者为什么外表年轻，身体却在崩溃？"
    - "穿蓝衣服的人是普通执行者，还是专门的回收人员？"
    - "陈屿拿到的腕带/编号会把他引向谁？"
    - "母亲会不会被升级为下一个长期观察样本？"

must_happen:
  - "开篇必须承接第十章：陈屿被标记后不敢继续硬查，行动方式更谨慎"
  - "外部求助信号不能像完整短信一样说明真相，只能是P2P加密阅后即焚邮件；传递路径由灰衣维修工暗中帮忙，不由逃出者自己定位陈屿"
  - "陈屿必须通过离线记录和现实地址去找人，避免重复一整章数据查询"
  - "见面地点要有现实压迫感：旧城区、停电、热、空置商场、地下通道或废弃社区服务点"
  - "逃出者外表必须和档案年龄矛盾：看起来年轻十几岁，但身体状态很差"
  - "逃出者不能讲完整设定；她只知道体检、转移、蓝衣人、编号和'伊甸'这个词"
  - "逃出者时间线要清楚：三天前复查接驳车门锁异常弹开，她趁机逃走；今天凌晨灰衣维修工到藏身点，帮她打开一次性加密邮件窗口"
  - "必须出现'伊甸'，但只能作为听来的词、门牌残片、流程名称或别人说漏的词"
  - "必须回收第五章警告：不要相信穿蓝衣服的人"
  - "必须让陈屿意识到：屏幕上的样本字段对应的是会喘气、会害怕、会求救的人"
  - "蓝衣工作人员或接驳车要在后段逼近，制造现实危险"
  - "逃出者留下实体证据：破损腕带、药物贴片、体检回执残角、编号牌或采样管标签"
  - "结尾不能让陈屿公开报警或大获全胜，只能带着证据和更大的风险离开"

