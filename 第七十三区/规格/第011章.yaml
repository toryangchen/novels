key_scenes:
  - "被标记后的早晨：陈屿看着缓存里的自己名字，删除新的查询词，改用离线文件"
  - "求助残片：旧邮箱收到P2P加密阅后即焚邮件，内容出现DP-7-2598-A同序列线索；连接记录指向旧城区西端公共健康维护网关，维护箱检修范围再指向B栋地下一层"
  - "现实寻址：陈屿去旧城区，街面高温、限电、公共健康接驳车和蓝衣工作人员远远出现"
  - "藏身点：旧商场地下通道或废弃社区服务点，灯管坏了一半，空气闷热"
  - "逃出者露面：她看起来比档案年轻，但咳嗽、手抖、皮下淤斑和步态暴露崩溃"
  - "短促对话：她先确认陈屿不是蓝衣人，再说灰衣维修工帮她打开一次性加密邮件窗口，让她把一句话发出去"
  - "伊甸露出：她说自己在转移车或手术室外听见过'伊甸'，有人说她'窗口快坏了'"
  - "现实危险：蓝衣工作人员进地下通道找人，广播或脚步声逼近"
  - "实体证据：逃出者把破损腕带、贴片或编号残片塞给陈屿，让他去查一串新编号"
  - "冷收束：陈屿回到热浪和街面秩序里，证据在口袋里发硬，母亲的编号在手机备忘录最上方"

逃出者设计:
  - "不要让她像全知证人，她只知道自己亲历过的流程"
  - "外表年轻化要克制：皮肤紧、眼角细纹少、头发黑得不自然，不要写成惊艳美女"
  - "崩溃迹象要具体：咳血、低温出汗、指甲发青、手臂采样点发黑、走几步就喘"
  - "她可以是第五章被删除患者本人，也可以是同组逃出者；本章保留一点不确定性"
  - "她的恐惧重点不是死亡，而是被重新登记、重新带回去"

伊甸露出方式:
  - "只能出现词名，不解释计划目标"
  - "可以由逃出者转述：'他们说我不适合伊甸二期。'"
  - "可以出现在残片上：EDEN/伊甸/EDN-7 等不完整标识"
  - "不要写成陈屿马上推理出长生、逆龄或精英续命全貌"

蓝衣人处理:
  - "延续第五章和第九章：穿蓝衣服的人是公共健康体系执行端"
  - "他们可以礼貌、低声、拿着终端找人，不要写成黑帮追杀"
  - "越温和越危险：'女士，您的随访还没有完成。'"
  - "陈屿不能正面冲突胜利，最多利用环境错开、躲开或被逃出者推走"

写作要求:
  - 字数: 3800-4300字
  - 基调: 现实惊悚、闷热、压迫、活证据带来的震动
  - 视角: 陈屿第三人称有限视角
  - 节奏: 被标记后的谨慎开局、现实寻人中段、逃出者对话高潮、蓝衣逼近冷收束
  - 重点: 把样本池从数据变成活人，把伊甸作为新词抛出
  - 对话: 短、断、带信息缺口；逃出者不做长篇说明
  - 段落: 现实环境和动作可合并，关键词'伊甸'和蓝衣逼近可单独成段

避免:
  - "不要解释伊甸计划完整内容"
  - "不要让逃出者变成设定百科或完美证人"
  - "不要让陈屿像动作英雄一样救人成功"
  - "不要让蓝衣工作人员暴力喊打喊杀"
  - "不要重复第十章的数据反查结构太久"
  - "不要让林远正面出场给答案"
  - "不要把逆龄写成爽感或艳奇，要写成身体被实验后的不稳定结果"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免连续用'他发现/他意识到/他觉得'推进"
  - "P1: 避免把逃出者对话写成说明书"
  - "P2: 用热浪、断电、破损腕带、药物贴片、咳血和终端定位声承载恐怖感"
