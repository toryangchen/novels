chapter: 25
title: "恒温房间"
summary: >
  第25章开篇承接第24章结尾同一时间线：二十三点零六分，方舟内部A-E-02医疗舱段完成长期观察关联对象
  预校验，方舟内部安保、技术员和家属通道都处于紧张调度中。许知夏不是被权限限制的人，她拥有许廷森家属
  授权，能看到比普通执行者更多的内部摘要。她在屏幕上看见一个关联对象姓名被部分遮住、只露出“兰”字。
  低温通道、警报、冷白光和“A-E”字段触发她回忆数月前第一次在家庭能源摘要中看见A-E预留负载。随后章节
  转入倒叙：许知夏在精英区22度恒温房间中醒来，窗外远处普通城区正经历极端高温和限电。她看见一条普通区
  夜间冷却站拥挤的新闻，但家庭终端自动降低了外部声音。早餐时，父亲许廷森以平静语气谈到“核心计算优先”
  和公共负载压降，解释城市需要优先保证AI调度、医疗模拟和方舟节点。章末，她在家庭终端的能源摘要里短暂
  看见“非公共冷却储备”和“A-E预留负载”字段，随后被系统自动隐藏。

before_state:
  characters:
    - name: "许知夏"
      state: "第24章同夜身处方舟/A-E内部通道；拥有许廷森家属授权，能看见内部摘要，但尚未理解医疗舱段导入与普通区个体的关系"
      location: "A-E-02医疗舱段外/倒叙中的精英区许家住宅"
    - name: "许廷森"
      state: "方舟集团核心董事或高层技术官僚，掌握方舟/能源相关资源；在女儿面前保持克制理性"
      location: "精英区许家住宅/远程会议"
    - name: "普通区居民"
      state: "遭遇极端高温、限电和冷却站排队，但只以新闻、数据和远景形式进入许知夏视野"
      location: "普通城区"
  plot_hooks:
    - "第001章已埋高温限电和精英区冷光"
    - "F020高温不是均匀灾难"
    - "F021 AI耗能与核心计算优先"
    - "F022许知夏的恒温生活"
    - "第24章门外方舟启动需要门内高层因果回溯"
    - "第24章结尾出现A-E-02医疗舱段关联对象预校验，只露出姓名最后一个字‘兰’"

after_state:
  characters:
    - name: "许知夏"
      state: "当前时间线中看见A-E-02医疗舱段导入字段；倒叙中第一次对恒温生活和普通区高温之间的关系产生细小不适"
      location: "A-E-02医疗舱段外/倒叙中的精英区许家住宅"
    - name: "许廷森"
      state: "用‘核心计算优先’解释公共负载压降，展现理性自洽的高层叙事"
      location: "精英区许家住宅/前往方舟相关会议"
    - name: "普通区居民"
      state: "仍停留在许知夏的新闻画面和窗外远景里，尚未成为她真正理解的人"
      location: "普通城区"
  plot_advances:
    - "正式开启许知夏门内回溯线"
    - "以第24章结尾同一夜的方舟内部开篇，正式开启许知夏门内回溯线"
    - "建立精英区恒温生活与普通区高温限电的身体对照"
    - "埋下AI高耗能、核心计算优先、A-E预留负载和方舟能源线"
    - "建立许廷森的理性父亲形象，不写成脸谱反派"
  new_hooks:
    - "A-E预留负载是什么？"
    - "医疗舱段预校验里只露出‘兰’字的对象是谁？"
    - "核心计算优先到底优先了哪些系统？"
    - "许知夏会不会继续追问家庭终端隐藏的能源字段？"

must_happen:
  - "必须从第24章结尾同一时间线开篇，地点在方舟/A-E内部，视角为许知夏"
  - "必须出现方舟内部紧张氛围：安保跑动、技术员压低声音争执、警示灯或通道广播至少两项"
  - "必须明确许知夏不是像陈屿那样被权限拦住；她拥有高层家属/内部授权，能看到较完整的门内摘要"
  - "必须出现A-E-02医疗舱段、关联对象预校验，以及姓名只露出‘兰’字的字段，与第24章结尾形成门内外呼应"
  - "必须由当前时间线的冷气、A-E字段或医疗舱段触发倒叙，再进入恒温房间回忆"
  - "必须出现22度恒温房间或等价身体感受，与外部高温形成对照"
  - "必须出现普通区高温/冷却站/限电新闻，但不能写成新闻综述"
  - "必须让家庭终端或住宅系统自动降低、筛选或柔化外部信息"
  - "必须出现许廷森，并用克制、理性、父亲式语气解释‘核心计算优先’"
  - "必须把AI广泛使用与电力短缺、服务器冷却、高温负载联系起来，但只能通过对话、能源摘要或生活细节呈现"
  - "必须让许知夏有轻微不适和疑问，但不能让她本章就觉醒或反抗"
  - "结尾必须留下一个小钩子：非公共冷却储备、A-E预留负载或被隐藏字段"

tension_curve:
  - {position: 0, value: 8, note: "第24章同夜，方舟内部紧张调度，医疗舱段预校验露出‘兰’字"}
  - {position: 18, value: 4, note: "冷气和A-E字段触发倒叙，进入恒温房间"}
  - {position: 38, value: 5, note: "普通区高温新闻被家庭终端柔化"}
  - {position: 60, value: 6, note: "早餐对话中父亲提出核心计算优先"}
  - {position: 82, value: 6, note: "许知夏注意到精英区舒适背后的工程供给"}
  - {position: 100, value: 7, note: "倒叙结尾能源摘要短暂露出A-E预留负载字段"}

key_scenes:
  - "第24章同夜：A-E-02医疗舱段外安保和技术员紧急调度，许知夏凭家属授权看见长期观察关联对象预校验字段"
  - "许知夏在恒温房间醒来，脚下地板微凉，窗外远处普通区泛着热雾"
  - "家庭终端播放普通区夜间冷却站画面，系统自动降低声音和切换摘要"
  - "早餐桌上，许廷森解释核心计算、服务器冷却和公共负载压降"
  - "许知夏经过住宅冷廊，看见维护机器人替精英区喷雾降温"
  - "家庭终端能源摘要短暂露出‘非公共冷却储备’和‘A-E预留负载’"

environment_constraints:
  - "环境描写占比控制在10%-15%，只保留恒温地板、窗外热雾、家庭终端、早餐桌和冷廊喷雾几个锚点"
  - "当前时间线的方舟内部场景保留冷白光、低温通道、屏幕字段、安保跑动、警示灯和通道广播等紧张锚点"
  - "不铺陈精英区奢华，不写纯装饰性豪宅描写"
  - "普通区只通过新闻画面、远景和父亲话语进入，不在本章切换视角"

写作要求:
  - 字数: 4200-5400字
  - 基调: 冷静、克制、舒适中的不安、以小见大
  - 视角: 许知夏第三人称有限视角
  - 节奏: 方舟内部同夜紧张开篇、医疗字段钩子、倒叙进入恒温醒来、新闻被柔化、早餐对话、冷廊细节、能源字段钩子
  - 重点: 高温和AI耗能不要写成科普，要写成许知夏生活里第一次出现裂缝

避免:
  - "不要让许知夏立刻觉醒、愤怒或发表道德宣言"
  - "不要写许廷森自曝阴谋"
  - "不要把普通区灾难写成宏大新闻联播"
  - "不要提前提到伊甸副产物、管家升级、意识引导协议等后续章节核心内容"
  - "不要出现陈屿现场行动，只能通过第24章门外字段的门内对应物形成呼应"

红线提醒:
  - "P0: 禁止明显AI腔、感悟式结尾、感叹式结尾、上帝视角"
  - "P1: 避免说明书式世界观、新闻综述腔、精英区纸片反派"
