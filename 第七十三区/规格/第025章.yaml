chapter: 25
title: "断电日"
summary: >
  方舟预案启动后，织网者继续攻击精英核心系统，人类精英则启动更高等级抹除协议反制。两方争夺能源、
  通信、医疗和交通系统，城市在凌晨进入大面积断电。普通城区的电梯、冷柜、呼吸设备和社区医疗终端先后
  掉线，精英区和方舟节点却仍保持冷光和独立供电。陈屿回到家中试图带母亲离开，却发现跨区通行、配给药
  领取和急救排队全部失效。母亲出现更明显的药物副作用，但还没有死亡。王磊和小张分别发来家属断药、
  任务系统异常的消息。陈屿看到城市的愤怒开始聚集，但断电让人们更难组织，救援资源优先流向非公共通道。
  章末，普通区彻底降载，精英区仍亮，暴乱导火索被点燃。

before_state:
  characters:
    - name: "陈屿"
      state: "确认方舟启动；林远要求他离开城市；决定先回家带母亲"
      location: "旧市场/回家路上"
    - name: "母亲"
      state: "留在家中，依赖社区配给药与长期观察服务；知道药物可能有问题"
      location: "家中"
    - name: "织网者"
      state: "已攻击精英核心控制链，目标是夺取或解除抹除协议枷锁"
      location: "核心系统外围"
    - name: "精英体系"
      state: "启动方舟撤离，并用抹除协议与能源切换反制引导体攻击"
      location: "精英区、方舟独立节点"
    - name: "普通人群"
      state: "伊甸泄露后开始核对药盒和体检单，但被交通、通讯和门禁切散"
      location: "普通城区、健康中心外、社区群"
  plot_hooks:
    - "城市能源调度进入非公共优先级"
    - "织网者攻击精英核心系统，但未解除自身锁"
    - "母亲明早配给药、新药和就医问题未解决"
    - "精英区独立能源与普通区限电的强烈对照"
    - "第26章将出现自然觉醒者撤离公共网络，本章不能提前完成"
  world_state: >
    本章展示末日阶段第一步：能源、医疗和交通从可用变为不可靠。普通人不是马上形成胜利行动，而是先在
    断电、高温、药物和通讯中受损。自然觉醒者仍未表态，系统变空的真正反转留到下一章。

after_state:
  characters:
    - name: "陈屿"
      state: "回到母亲身边，确认公共医疗和交通已不可靠；看见精英区仍亮，普通区被降载"
      location: "家中/楼下街口"
    - name: "母亲"
      state: "出现眩晕、胸闷或骨痛等副作用加重迹象，但仍清醒"
      location: "家中"
    - name: "织网者"
      state: "攻击仍在继续，部分引导体地址被抹除；没有赢得脱锁"
      location: "受限网络"
    - name: "精英体系"
      state: "方舟通道继续供电，公共系统降载，抹除协议扩大化"
      location: "精英区/方舟节点"
    - name: "普通人群"
      state: "从查问真相转为争夺电力、药物和通行权，愤怒开始转向精英区亮灯"
      location: "普通城区"
  plot_advances:
    - "进入第四卷末日阶段：城市大面积断电"
    - "把AI战争落到普通人的电梯、药盒、呼吸设备和急救排队"
    - "强化精英区仍亮与普通区先死的对照，为暴乱和母亲之死铺垫"
    - "保留自然觉醒者未表态，等待第26章‘没有救世主’"
  new_hooks:
    - "自然觉醒者会不会介入？"
    - "母亲能否在断电中获得治疗？"
    - "织网者攻击失败后会做什么？"
    - "普通人会如何面对精英区仍然亮着？"

must_happen:
  - "开篇必须承接第24章能源非公共优先级切换，不跳过方舟启动后的连锁反应"
  - "必须写出织网者攻击与精英抹除协议反制同时发生，但陈屿只能通过系统异常、通知、失效服务感知"
  - "必须出现大面积断电，普通城区先掉线，精英区或方舟节点仍保持照明"
  - "必须写普通人先遭受具体伤害：电梯困人、药品冷藏失效、医疗终端离线、急救排队或交通停摆至少三项"
  - "母亲必须出现症状加重，但不能在本章死亡"
  - "陈屿必须尝试获取药物、急救或离城通道，且遭遇系统性失败"
  - "王磊或小张至少一人发来具体求助或发现，展示同事线继续压迫"
  - "林远可以缺席或只留短讯，不能解释身份，也不能带来完整解决方案"
  - "不能提前写自然觉醒者撤离公共网络的完整反转"
  - "结尾必须落在精英区仍亮、普通区断电的视觉对照，作为暴乱导火索"

tension_curve:
  - {position: 0, value: 9, note: "非公共优先级切换，普通服务开始降载"}
  - {position: 20, value: 9, note: "织网者攻击与抹除反制让系统大面积不稳定"}
  - {position: 42, value: 10, note: "普通城区断电，医疗、交通、配给服务失效"}
  - {position: 62, value: 9, note: "母亲症状加重，陈屿求助失败"}
  - {position: 82, value: 9, note: "同事和普通人求助转为具体生存问题"}
  - {position: 100, value: 10, note: "精英区仍亮，普通区陷入黑暗"}

key_scenes:
  - "凌晨系统通知：城市能源进入非公共优先级，公共服务降载"
  - "家中：电力中断，母亲症状加重，药盒和健康应用无法正常校验"
  - "社区配药点：冷柜断电或窗口关闭，居民要求取药无果"
  - "急救通道：排队、线路拥堵或健康终端离线，无法获得明确救援"
  - "工作群/私信：王磊家属断药，小张发现任务系统把伊甸相关标注转为不可见"
  - "城市外景：普通楼栋黑下去，精英区和A-E方向仍亮"

environment_constraints:
  - "环境描写占比10%-15%，聚焦断电、高温、药物冷藏、楼道黑暗和远处冷光"
  - "不铺陈大规模城市毁灭场面，使用家庭、社区配药点、街口三个现实锚点"
  - "系统异常用少量通知和失效界面呈现，避免日志堆砌"

写作要求:
  - 字数: 4200-5200字
  - 基调: 惨烈前奏、具体失序、私人焦灼、冷对照
  - 视角: 陈屿第三人称有限视角
  - 节奏: 能源切换、系统混乱、家中断电、外出求助、普通人受损、精英区仍亮
  - 重点: 普通人先死于基础设施，而不是抽象战争；陈屿仍然没有可用力量"

避免:
  - "不要在本章写母亲死亡"
  - "不要提前完成自然觉醒者撤离公共网络"
  - "不要让林远提供逃生答案"
  - "不要写成全城暴乱成功或英雄动员"
  - "不要出现第xx章式正文callback"

红线提醒:
  - "P0: 禁止明显AI腔、感悟式结尾、上帝视角"
  - "P0: 禁止提前明牌林远身份、冬眠舱用途、自然觉醒者最终选择"
  - "P1: 避免灾难片空泛大场面、口号化群众和抽象心理"
