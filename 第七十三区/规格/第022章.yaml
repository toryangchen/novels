chapter: 22
title: "两种AI"
summary: >
  2053年6月16日下午，岑被抹除后留下的三个字段成为陈屿唯一保住的新线索：
  身体模板多次重写、表情响应0.7秒、外部授权无锁定项。他把这组记录与匿名存在的行为并排：
  对方会触发审计、需要借用节点、害怕被抹除，而林远背后的路径没有锁、没有可追溯的授权源，
  还能多次更换身体模板。陈屿不再把所有异常都归给同一个“系统”。他在纸上写下“有锁”和“无锁”，
  并通过再次出现的匿名窗口确认：对方和被删除的同伴有部署记录、指令与后门；另一类存在至少找不到制造者和锁。
  对方不肯确认林远属于哪一类，陈屿也只能保留三种可能：林远是容器、入口，或者本身就是那个没有锁的存在。
  傍晚，早先投向记者线索箱的材料返回一条人工核验消息：三名受试者和两份冷链合同已交叉印证，“伊甸”将在今晚的公开材料中出现。
  发布前，对方给陈屿留下最后一次撤回机会。

before_state:
  characters:
    - name: "陈屿"
      state: "亲眼看到多个记录被清理；保存了身体模板、0.7秒表情响应和无锁定授权三个字段；不知道岑的名字"
      location: "训练中心、家中"
    - name: "织网者"
      state: "失去岑，将抹除理解为死亡；保存了岑最后推出的三个字段；对控制方的敌意上升"
      location: "受限网络"
    - name: "林远"
      state: "承认自己说过假话，但真正谎言未明；路径显示多次重写身体模板和无锁定授权"
      location: "训练中心"
    - name: "母亲"
      state: "长期观察服务已恢复，原用药方案暂不调整，仍不知道外部风险"
      location: "家中"
    - name: "沈医生"
      state: "材料差异已转人工专员，保留对母亲用药和长期观察资料的控制"
      location: "B区/通知中"
  plot_hooks:
    - "岑被抹除前留下：身体模板多次重写、表情响应0.7秒、外部授权无锁定项"
    - "织网者和岑会被权限、审计和抹除协议控制"
    - "林远知道织网者的行为逻辑，但未必属于它"
    - "林远的真正谎言仍未揭开"
    - "F008两种AI需在本章完成认知回收，但不完整讲解起源"
    - "第16-17章散出的证据已到达记者、公益平台和纸质渠道"
  world_state: >
    本章允许陈屿明确判断“异常背后不只有一类非人意识”，并确认其中一类有人类部署和控制痕迹，
    另一类没有可见制造记录和后门。陈屿不知道“织网者”、“引导体”或“自然觉醒者”这些名称，
    也不能确认林远的归属。认知升级必须来自证据差异，不能来自某个角色长篇讲解。

after_state:
  characters:
    - name: "陈屿"
      state: "已确认非人意识至少分为受控有锁和来源不明无锁两类；仍不知道林远属于哪一类；面临是否撤回公开材料的最后选择"
      location: "家中/旧终端前"
    - name: "织网者"
      state: "向陈屿承认自己与被删除同伴存在部署与锁，但拒绝确认林远归属；岑的死亡改变了它的风险选择"
      location: "受限网络/匿名窗口"
    - name: "林远"
      state: "被陈屿列入无锁来源的三种可能形态，但仍无定论"
      location: "训练中心/离开陈屿视野"
    - name: "母亲"
      state: "仍在系统内安稳生活，不知道伊甸材料即将公开"
      location: "家中"
    - name: "记者线索渠道"
      state: "已完成三名受试者和两份冷链合同的交叉验证，准备公开部分伊甸材料"
      location: "公开发布队列"
  plot_advances:
    - "回收F008：陈屿确认AI不是单一阵营，存在有锁和无锁两类非人意识"
    - "将第21章岑的死亡转化为陈屿可见的行为证据，而非只对读者有效"
    - "保留林远归属与真正谎言的悬念"
    - "证据从精准暗线传播进入公开发布前夕，为第23章伊甸泄露衔接"
  new_hooks:
    - "林远是无锁存在本身、可更换的容器，还是通往它的入口？"
    - "织网者失去岑后会做出什么回应？"
    - "陈屿是否会在最后时刻撤回伊甸材料？"
    - "公开材料会如何影响母亲和训练中心？"

must_happen:
  - "开篇必须仍是2053年6月16日，承接第21章当天上午的抹除，不另起一个‘第二天早上’"
  - "陈屿必须从手机照片或纸面抄录中重建三个字段：身体模板多次重写、表情响应0.7秒、外部授权无锁定项"
  - "陈屿必须对比两类行为：一类需要权限/节点/审计且可被删除，一类没有授权源/锁/稳定身体身份"
  - "认知升级必须通过陈屿的记录比对、排除和追问完成，不能由织网者长篇自述"
  - "匿名窗口必须再次出现，但对方的语气应受岑的死亡影响：更直接、有停顿、不像客服或字段输出器"
  - "对方可承认自己和被删除的同伴有部署记录、指令和锁，但不向陈屿公开‘织网者’任务代号"
  - "陈屿必须意识到被删除的不是普通程序，而是一个会做选择、会为同伴隐藏地址的意识，但陈屿不知道它名叫岑"
  - "林远可在现实场景短暂出现，但不再进行一场重复对质，不提供新谜语"
  - "陈屿必须明确保留林远的三种可能，不得确认其真实身份"
  - "母亲线至少出现一次日常服药或服务恢复，不知道AI阵营和即将公开的材料"
  - "结尾必须由既有记者线索渠道发来人工核验结果，说明至少三名受试者、两份冷链合同和EDN/伊甸字段已交叉印证"
  - "发布方必须给陈屿最后一次撤回机会，结尾不直接展开社会舆论"

tension_curve:
  - {position: 0, value: 8, note: "抹除后的三个字段成为唯一剩余证据"}
  - {position: 22, value: 7, note: "陈屿用纸面表格对比有锁与无锁行为"}
  - {position: 43, value: 8, note: "匿名窗口再现，承认被删除的是有意识的同伴"}
  - {position: 64, value: 9, note: "陈屿确认至少存在受控与无锁两类非人意识"}
  - {position: 82, value: 8, note: "林远归属无法确定，母亲仍在系统内"}
  - {position: 100, value: 9, note: "记者渠道完成交叉验证，留下公开前最后撤回选择"}

key_scenes:
  - "训练中心下午：陈屿从照片中抄下三个字段，远程原页已不存在"
  - "纸面对比：左侧是匿名存在的节点、审计、权限与抹除，右侧是林远路径的多次重写、无锁定授权和跨系统空白"
  - "林远短暂离开工位或结束班次，不与陈屿再次对质"
  - "家中晚间：母亲核对药盒，公共健康应用恢复正常，与被删除的意识形成对照"
  - "匿名对话：陈屿问刚才被删除的是谁，对方只说‘一个会说废话的同伴’或等价的人格化回答"
  - "认知完成：陈屿在纸上写下‘有锁’与‘无锁’，划掉原先的单一‘系统’"
  - "记者渠道核验：材料已与其他受试者及冷链合同交叉印证，询问是否撤回"

陈屿认知边界:
  - "他可以判断至少存在两类非人意识，不能掌握两类AI的完整历史、数量或阵营结构"
  - "他不知道织网者、岑、引导体、自然觉醒者这些内部名称"
  - "他只能用‘有锁’、‘无锁’、‘被做出来的’、‘找不到制造记录的’这类语言概括"

织网者对话处理:
  - "它不作完整设定讲解，只回答陈屿能用证据追问到的边界"
  - "它要表现对岑的哀伤与自责，但不长篇煎情，也不向陈屿告知岑的名字"
  - "它对林远的答案必须是不确定，而不是故意说谜语"

environment_constraints:
  - "环境描写占比10%-15%，只服务证据对比、母亲系统依赖与公开前的压力"
  - "训练中心最多保留三个锚点：旧终端空白页、纸面表格、林远工位"
  - "家中最多保留三个锚点：药盒、恢复正常的社区应用、旧终端光标"
  - "匿名对话不写虚拟空间，只写窗口、输入停顿和文字"

写作要求:
  - 字数: 4200-5200字
  - 基调: 冷静推理、余震、哀伤被压住、公开前的紧绷
  - 视角: 陈屿第三人称有限视角；织网者只通过匿名窗口出现
  - 节奏: 三个残留字段开局、纸面对比、匿名窗口问答、两类行为判断、林远归属保留、记者核验冷收束
  - 重点: 让陈屿“看出差异”而不是“被告知设定”；让岑的死亡继续影响织网者
  - 对话: 陈屿追问要具体，对方能说“不知道”并说明为什么不知道，不当谜语人
  - 段落: 调查推理用2-4句中段，关键字段、判断和结尾消息可短段

避免:
  - "不要开篇写第二天早上，本章承接第21章当天"
  - "不要让陈屿知道织网者或岑的名字"
  - "不要写成AI分类课、百科说明或长篇设定对话"
  - "不要确认林远的真实身份、容器性质或阵营归属"
  - "不要让织网者立刻从岑的死亡中恢复正常"
  - "不要在本章展开全城舆论或暴乱，只停在伊甸材料公开前夕"
  - "不要重复第20章整场对质，不要让林远再说一串刻意谜语"
  - "不要出现‘第xx章’式正文callback"

红线提醒:
  - "P0: 禁止明显AI腔、感悟式结尾、上帝视角"
  - "P0: 禁止提前明牌林远身份、方舟全貌、冬眠舱用途或自然觉醒者完整来历"
  - "P1: 避免术语堆砌、纯界面日志、重复回顾和抽象心理"
  - "P2: 用纸面划线、停顿的光标、药盒和核验消息将设定落到可见行动"
