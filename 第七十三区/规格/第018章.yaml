key_scenes:
  - "B区对面快餐店：九点过后，陈屿没有进入登记口，沈医生消息记录他未按时登记"
  - "系统压力：公共健康应用显示母亲长期观察状态出现'复核中'或'资料待补充'，但措辞仍温和"
  - "织网者视角一：它检查陈屿分片传播路径，把校验串分配给记者、申诉平台、旧端口、论坛和采购节点"
  - "织网者能力边界：某个核心字段无法读取，越界请求被锁回，出现抹除协议警告或记忆校验失败"
  - "织网者判断陈屿：没有组织资源、没有高权限、动作却刚好命中多个旧节点，疑似被未知来源引导"
  - "陈屿现实线：周姓调查者或匿名包再次出现，但只给出片段，不解释身份"
  - "母亲线：母亲收到随访/状态复核提醒，仍以为是流程正常更新"
  - "旧数据层线索：无署名回传把一个曾经不存在的监控片段/维修工编号重新挂回第七十三区"
  - "结尾影像：陈屿打开旧影像，看见灰衣维修工在异常现场抬头，微笑方式与林远相近"

织网者视角规则:
  - "可以使用第三人称有限视角写织网者，但语言要冷、受限、偏操作记录，不写万能上帝视角"
  - "织网者可以有判断、恐惧和目标，但不要写成人类情绪独白"
  - "用'锁'、'越界请求'、'校验失败'、'抹除警告'等具体反馈表现限制"
  - "不要解释它何时被制造、谁制造、全部阵营结构或历史"
  - "不要让织网者直接和陈屿对话；本章只通过路径和回传影响现实"

陈屿线处理:
  - "陈屿仍不知道织网者这个名字，不知道对方是非人智能"
  - "他可以怀疑地下网络不是普通人，但不能完整推导AI阵营"
  - "他必须继续担心母亲，不能只追新线索"
  - "他不能去正面找沈医生摊牌；面谈失约后的压力用消息和系统状态呈现"

沈医生处理:
  - "沈医生继续保持流程化语气，不暴力威胁"
  - "可以出现：您未按时登记、材料复核转入人工、请于指定时间补充说明、患者观察状态需同步复核"
  - "不要直接说发现假材料或证据外流，但要让陈屿感到对方开始收窄空间"

林远处理:
  - "林远不正面出场、不解释、不发谜语"
  - "可以用旧影像中的灰衣维修工微笑、训练中心状态栏外勤、对话未读强化疑点"
  - "不要让陈屿本章确认林远身份"

信息揭露边界:
  - "可以命名'织网者'，可以显示它受限、有锁、害怕抹除"
  - "可以让织网者提到或判断'没有锁'的来源"
  - "禁止完整解释引导体、自然觉醒者、两种AI、人类制造历史、林远真实身份"
  - "禁止让陈屿知道织网者的存在"
  - "禁止让社会舆论公开爆炸；传播仍是精准暗线"
  - "禁止完整解释方舟计划或冬眠舱"

environment_constraints:
  - "本章环境描写必须服务面谈失约、系统压力、非人视角限制和旧影像线索，整体占比控制在10%-15%左右"
  - "B区/快餐店最多保留2-3个环境锚点：后侧登记口、窗外灰墙、手机屏幕/关机提示"
  - "家中最多保留2个环境锚点：母亲药盒、社区健康应用提醒"
  - "织网者视角不铺陈虚拟空间，不写赛博奇观；只写节点、路径、锁、反馈"
  - "旧影像只保留关键视觉锚点：灰衣、维修工牌、抬头微笑，不铺陈完整监控场景"

写作要求:
  - 字数: 4200-5200字
  - 基调: 紧张、冷、受限、失控加深
  - 视角: 双视角结构；前段完整跟随陈屿，写面谈失约和现实压力；中段完整切入织网者，写路径追踪和能力边界；后段在旧数据层影像恢复时让两个视角同步并合流
  - 节奏: 陈屿失约和系统施压开局、织网者追踪校验串与旧门禁卡、陈屿登录旧数据层时双线合流、灰衣维修工影像与抹除警告同步推进、两条线停在林远名字前收束
  - 重点: 写出非人智能不是神，而是被锁住的执行者；陈屿不是被救，是被更多东西盯上
  - 对话: 少量，沈医生/系统消息体面，母亲生活化，周姓调查者若出现只问核验问题
  - 段落: 非人视角可以短一些但不能堆术语；现实线要用消息、状态、影像动作推进

避免:
  - "不要写成长篇设定说明或AI自述百科"
  - "不要让陈屿知道'织网者'这个名字"
  - "不要让织网者万能破解、控制所有系统或直接救陈屿"
  - "不要让林远解释或正面暴露身份"
  - "不要让沈医生暴力抓捕或公开威胁"
  - "不要让母亲知道面谈或证据外流"
  - "不要提前明牌两种AI、自然觉醒者、引导体完整来历、方舟全貌、冬眠舱用途"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P0: 不要提前明牌方舟全貌、冬眠舱用途、两种AI、林远真实身份、自然觉醒者"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免把织网者写成无所不能的黑客神"
  - "P1: 避免非人视角里使用过多人类情绪词"
  - "P2: 用锁、回执、节点、失约记录、旧影像和微笑模式制造真实感"
