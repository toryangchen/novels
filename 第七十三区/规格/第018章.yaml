chapter: 18
title: "织网者"
summary: >
  第十七章结尾，陈屿没有进入B区后侧登记口，而是停在对面快餐店里。第十八章开篇承接这一刻：
  沈医生的登记流程没有等到他，B区系统开始发出温和但明确的催促，陈屿意识到自己错过的不是普通面谈，
  而是一条预设好的收束路径。与此同时，叙事第一次短暂切入“织网者”视角。它不是万能黑客，也不是自由AI，
  而是被人类部署、监控、限制的执行智能：它能调度公开渠道、旧端口、论坛残片和采购公告，却不能直接越过
  某些锁。它追踪陈屿散出的校验串，判断陈屿的路径不像普通调查者，更像被另一种未知系统放到了合适位置。
  织网者尝试通过陈屿定位那个“没有锁”的来源，但每一次越界都会触发抹除协议的警告。陈屿这边，他收到
  沈医生更冷的流程消息，母亲的长期观察状态被标记为“复核中”，周姓调查者和匿名回传包继续推动他离开B区。
  章末，织网者没有直接接触陈屿，只把一条新的路径塞进旧数据层：第七十三区某条早已不存在的灰衣维修工影像。
  陈屿打开影像，看到一个熟悉到不能忽视的微笑。

before_state:
  characters:
    - name: "陈屿"
      state: "没有进入B区后侧登记口；已看到无署名回传包和'不要进入九点面谈的登记口'提示；误以为隐藏网络是地下黑客或医疗互助组织"
      location: "B区对面快餐店、返程路上、家中或训练中心边缘"
    - name: "母亲"
      state: "长期观察序列仍生效；不知道陈屿面谈失约和证据扩散；可能收到普通随访提醒"
      location: "家中"
    - name: "沈医生"
      state: "九点面谈未完成；材料复核和载体差异仍悬着；可能通过流程消息施压"
      location: "B区/消息中"
    - name: "织网者"
      state: "首次以受限非人视角出现；能调度信息网络但受到锁和抹除协议限制；正在通过陈屿寻找更异常的来源"
      location: "公共健康协作网络、旧数据层、外部舆情/采购/论坛节点之间"
    - name: "林远"
      state: "仍不解释；可以只以旧影像、微笑模式或状态栏缺席方式出现，不可正面摊牌"
      location: "未知/旧影像中"
  plot_hooks:
    - "第十七章无署名回传包能重组陈屿分散材料，说明有非普通人类效率的网络介入"
    - "陈屿没有进入九点面谈登记口，B区流程必然有反应"
    - "第七章灰衣维修工影像与林远微笑模式有关，第十八章可重新触发但不完成回收"
    - "F007引导体的抹除恐惧：本章可以首次展示受限智能越界时的锁和警告"
    - "F008两种AI：本章只埋一层差异感，不能让陈屿或读者完整理解"
  world_state: >
    第三卷开始进入非人视角，但仍保持信息节制。织网者可以被命名，可以显示它是被部署、
    被监控、受协议限制的智能执行体；但不能完整解释引导体历史、两种AI结构、人类制造细节、
    自然觉醒者身份或林远真实身份。陈屿仍只能看到现实结果：消息、状态、旧影像和路径提示。

after_state:
  characters:
    - name: "陈屿"
      state: "确认B区面谈不是普通流程；知道某个隐藏网络仍在推动他；拿到灰衣维修工旧影像线索，开始把传播异常与林远疑点重新并排"
      location: "家中或训练中心"
    - name: "母亲"
      state: "长期观察状态被系统轻微收紧或标记复核中，但未被带走；仍不知道真相"
      location: "家中"
    - name: "沈医生"
      state: "面谈失约后改用流程和母亲状态施压；不暴力，不直接摊牌"
      location: "消息中/B区系统"
    - name: "织网者"
      state: "确认陈屿不是单纯泄密者，而是可能被另一类未知智能引导的入口；越界尝试触发抹除警告"
      location: "受限网络中"
    - name: "林远"
      state: "仍不正面出现；灰衣维修工影像中的微笑再次强化疑点"
      location: "旧影像/状态栏"
  plot_advances:
    - "首次引入织网者视角，展示受限非人智能存在"
    - "解释第十七章精准传播的部分机制：不是全能破解，而是利用已有渠道、旧端口和低风险节点进行路径优化"
    - "让织网者察觉陈屿背后还有未知来源，为第十九章未知系统接触做前置"
    - "让B区/沈医生对陈屿失约作出流程反应，保持现实压力"
    - "用灰衣维修工旧影像把林远疑点重新推到第十九、二十章前台"
  new_hooks:
    - "织网者所谓的'锁'和抹除警告是什么？"
    - "陈屿背后那个'没有锁'的来源是谁？"
    - "灰衣维修工影像为什么会在此时被塞回旧数据层？"
    - "母亲长期观察状态被复核后会发生什么？"
    - "林远是否与灰衣维修工有关？"

must_happen:
  - "开篇必须承接第十七章结尾：陈屿没进登记口，时间过九点，沈医生或B区系统开始催促/记录失约"
  - "必须出现沈医生或B区流程的反应：未按时登记、请补充说明、材料复核转入人工、患者长期观察状态复核等"
  - "母亲不能知道面谈真相；如果出现，只能通过普通随访提醒或家常询问形成压力"
  - "必须首次切入织网者视角，但篇幅控制，不要整章都写非人视角"
  - "织网者必须表现出能力边界：能看见/调度多个低权限节点，不能直接破解所有系统，越界会触发锁或抹除警告"
  - "必须展示第十七章精准传播的合理机制：校验串、旧端口、公开线索箱、申诉平台、内部论坛、采购公告之间的路径优化"
  - "织网者必须判断陈屿的行为异常：不像组织成员，也不像随机泄密者，更像被另一个来源推到正确位置"
  - "必须出现'没有锁'或等价概念，作为织网者对未知来源的判断，但不能解释自然觉醒者"
  - "必须让陈屿误解或半误解：他仍以为是地下网络/匿名渠道/周姓调查者一类人类组织在帮他"
  - "必须保留林远边界：不让林远正面解释；可通过旧影像、微笑模式或状态栏外勤保持疑点"
  - "结尾必须给陈屿一个新线索：旧数据层里重新出现的灰衣维修工影像、异常现场片段或维修工编号，推动第十九/二十章"

