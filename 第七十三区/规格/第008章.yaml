chapter: 8
title: "第一次警告"
summary: >
  第七章的监控查询触发审计后，陈屿被内部监察约谈。约谈地点干净、安静，
  对方不恐吓，也不追问第七十三区，只用权限规范和训练师职责把他的行为定性为越界。
  监察员提醒他："训练师的权限不是用来提问的。"陈屿试图用异常现场、仿真维护体和医疗样本解释自己的查询，
  但对方只要求他签署访问说明和保密确认。当天晚上，陈屿回家发现母亲收到免费深度体检通知，
  预约时间由系统强制生成，无法取消。陈屿第一次明确感到，对方知道他的弱点。

before_state:
  characters:
    - name: "陈屿"
      state: "刚调取多段异常现场监控，确认灰衣维修人员可能是多身体共享行为模式；非法查询已生成审计记录"
      location: "训练中心旧数据层或离开训练中心途中"
    - name: "母亲"
      state: "在家中，身体暂时平稳；仍是长期观察组与配给药线索的核心压力点"
      location: "家中"
    - name: "内部监察员"
      state: "首次正式出场，代表训练中心/精英体系的行政监控，不需要表现出恶意"
      location: "训练中心监察约谈室"
    - name: "林远"
      state: "本章不出面救场；他的缺席会加重陈屿孤立感"
      location: "未知"
  plot_hooks:
    - "第七章审计记录已生成，非法查询范围包含跨区域监控和异常现场人员"
    - "灰衣维修工/仿真维护体多现场出现，但陈屿没有完整证据链"
    - "林远此前留下门禁卡，却没有承担后果"
    - "母亲与特殊样本编号、配给药批号存在关联"
    - "第二卷将从免费深度体检进入UBI样本池"
  world_state: >
    第一卷收束点：陈屿不再只是观察异常的人，他的查询行为已经被系统和机构反向记录。
    表层压力来自训练中心和内部监察，深层机制仍不能明说。
    本章的恐怖感不是暴力威胁，而是温和、规范、可签字的行政压力。

after_state:
  characters:
    - name: "陈屿"
      state: "被内部监察警告，明白自己的权限和工作身份都能被反过来约束；回家后发现母亲被强制预约深度体检"
      location: "家中"
    - name: "母亲"
      state: "收到免费深度体检通知，预约不可取消；本人可能还觉得这是好事或不想让陈屿担心"
      location: "家中"
    - name: "内部监察员"
      state: "没有威胁陈屿，只留下规范话术和访问说明记录"
      location: "训练中心"
    - name: "林远"
      state: "仍未解释门禁卡和审计后果，陈屿对他的信任开始出现裂纹"
      location: "未知"
  plot_advances:
    - "陈屿的追查正式触发机构层面的反应"
    - "内部监察首次出现，确立精英体系的温和压迫感"
    - "母亲被强制深度体检，私人弱点被摆上台面"
    - "第一卷完成状态转换：陈屿从观察者变成被盯上的人"
    - "第九章自然进入体检中心现场"
  new_hooks:
    - "监察员是否知道第七十三区，还是只负责处理权限越界？"
    - "母亲的深度体检是否是普通筛查，还是针对陈屿的回应？"
    - "林远为什么让陈屿拿到门禁卡，却不提醒审计后果？"
    - "免费体检背后筛选的到底是什么人？"

must_happen:
  - "开篇必须承接第七章审计记录，不要另起无关日常"
  - "陈屿被通知参加内部监察约谈，通知语气要行政化、温和、不可拒绝"
  - "约谈室环境要干净、冷、没有暴力威胁，可写隔音墙、饮水机、签字屏、空调温度"
  - "监察员不能像反派自曝；他说的是权限、流程、职责边界、数据安全"
  - "必须出现核心提醒：'训练师的权限不是用来提问的。'"
  - "陈屿可以试图解释异常现场和医疗样本，但监察员不接真相，只把问题拉回'你为什么访问不属于你的数据'"
  - "约谈结束时陈屿要被要求签署访问说明、保密确认或后续复核配合"
  - "林远不能救场，最好联系不上或只在远处一闪而过"
  - "陈屿回家后看到母亲收到免费深度体检通知，时间由系统强制预约"
  - "体检通知不能写成恐吓，必须包装成福利、关怀、健康风险预防"
  - "章末陈屿确认预约无法取消或改期，收束到第九章陪母亲去体检中心"

tension_curve:
  - position: 0
    value: 7
    note: "审计记录后的通知到达，陈屿知道第七章查询已经留下痕迹"
  - position: 20
    value: 8
    note: "内部监察约谈开始，空间安静但不可逃避"
  - position: 40
    value: 8
    note: "陈屿试图解释异常，监察员只谈权限边界，双方不在同一层面说话"
  - position: 60
    value: 7
    note: "签署说明后表面结束，压力暂时落回普通工作流程"
  - position: 78
    value: 9
    note: "回家发现母亲收到免费深度体检通知，压力从职业层面转到私人层面"
  - position: 100
    value: 9
    note: "预约无法取消，陈屿确认自己被盯上，第一卷冷收束"

key_scenes:
  - "审计后通知：陈屿工位屏幕或个人终端收到内部监察约谈安排，时间精确到分钟"
  - "约谈室：白墙、低温、签字屏、一次性纸杯，对方礼貌请他坐下"
  - "权限复盘：监察员展示访问范围，不展示监控内容，只列出跨区域调用、异常现场数量、旧索引入口"
  - "职责边界：监察员说训练师负责标注和复核，不负责追问系统为什么给出某个结果"
  - "陈屿反击失败：他提到医疗样本、灰衣维修工、工单撤销，对方只问这些是否属于他的任务权限"
  - "签署文件：访问说明里有自动保存的半句话，陈屿发现自己未写完的理由已经被系统记录"
  - "林远缺席：陈屿发消息或找人，得到未读、无回复、今日未排班等普通结果"
  - "回家通知：母亲把免费深度体检通知给他看，语气可能带一点困惑或想安慰他"
  - "不可取消：陈屿尝试改期，系统提示该预约属于公共健康关怀项目，不支持自主取消"

监察员处理:
  - "不要把监察员写成恶毒反派，他越礼貌越有压迫感"
  - "监察员不说第七十三区，不承认异常存在，只说'旧索引'、'非任务数据'、'跨区域调用'"
  - "他可以知道陈屿母亲是UBI领取者，但本章不要让他明说威胁"
  - "核心话术要短：'训练师的权限不是用来提问的。'、'你可以记录结果，不能追问结果从哪里来。'"
  - "结尾不要让监察员胜利宣言，流程结束比威胁更冷"

母亲体检通知设计:
  - "通知名可用：免费深度体检、公共健康关怀、夏季高温风险筛查"
  - "通知来自社区医疗系统或公共健康平台，与前文配给药线相连"
  - "预约时间要近，最好是次日上午或当天上午，制造第九章即时推进"
  - "通知措辞要正面：免费、优先、上门接驳、风险预防、长期用药用户专属"
  - "陈屿尝试取消时，系统不要威胁，只显示'该项目不支持自主取消'"

写作要求:
  - 字数: 3800-4300字
  - 基调: 行政化、冷、克制、温和恐怖
  - 视角: 陈屿第三人称有限视角
  - 节奏: 审计通知快进、约谈慢压、回家短暂松动、体检通知猛然收紧
  - 重点: 写出'没有人威胁你，但每一步都替你决定好了'
  - 对话: 约谈对话要短，避免解释设定；母子对话生活化，母亲不要突然变成信息提供者
  - 段落: 约谈可用短句增强压迫，回家段落适当合并，避免全章碎句

避免:
  - "不要让监察员解释AI真相、伊甸计划或第七十三区"
  - "不要写成刑讯、逮捕、追逐或黑客攻防"
  - "不要让陈屿当场爆发或讲长篇正义宣言"
  - "不要让母亲病情大爆发，本章只让体检通知落地"
  - "不要把体检通知写成明晃晃的威胁短信"
  - "不要让林远出面解除危机"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免监察员像反派说明书"
  - "P1: 避免连续用'他发现/他意识到/他觉得'推进"
  - "P2: 用签字屏、空调、通知字段、预约按钮等具体物件承载压力"

