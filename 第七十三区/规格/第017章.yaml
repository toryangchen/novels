chapter: 17
title: "地下网络"
summary: >
  陈屿完成分片散布后的第二天，先按沈医生要求去B区前台准备补充说明。
  他以为自己送出去的材料会慢慢沉入记者信箱、申诉平台和公益咨询点，却在去B区前后陆续发现异常：
  记者线索箱返回的编号被人二次打包，公益医疗申诉平台出现匿名追加材料，旧数据层死信箱里的校验串被投向
  多个他没有选择过的节点。一个自称做医疗纠纷调查的记者联系他，能说出TIP编号尾号；训练中心内部论坛出现
  一条被迅速删除的配给药风险帖；精英区公共采购公告里短暂撤下一批与PY-2207相邻的冷链合同。
  这些动作太快、太准，不像普通人类组织。陈屿误以为地下黑客网络接住了证据，却同时意识到自己已经失去控制。
  章末，他收到一份没有署名的回传包，里面把他四份分片重新拼成更清晰的证据路径，并附上一句短提示：
  "不要进入九点面谈的登记口。"沈医生的面谈仍在逼近，母亲的长期观察状态没有解除，陈屿被迫在赴约、躲避和继续追踪之间选择。

before_state:
  characters:
    - name: "陈屿"
      state: "已将证据分片投向记者线索箱、公益申诉、旧数据层死信箱和线下咨询点；旧数据层返回异常'已接收'；明日上午九点需去B区说明载体来源及清单差异"
      location: "家中、去B区路上、训练中心边缘"
    - name: "母亲"
      state: "已纳入长期观察序列，等待随访；不知道陈屿散布证据和面谈压力"
      location: "家中"
    - name: "沈医生"
      state: "已要求陈屿明日上午九点携带补充说明到B区前台登记；仍不明说假材料，但比对压力明确"
      location: "B区/消息中"
    - name: "林远"
      state: "仍外勤、未读或不回复；不参与本章解释"
      location: "未知"
    - name: "隐藏网络"
      state: "已接住陈屿的部分分片，并以异常效率重新分发；身份不明，陈屿暂时误判为地下黑客组织"
      location: "记者线索箱、公益平台、旧数据层、内部论坛、精英采购节点之间"
  plot_hooks:
    - "第十六章分片散布：TIP-6419-77、公益申诉邮件、旧数据层死信箱、纸质信封"
    - "旧数据层本不该返回'已接收'，说明有某个东西在监听旧端口"
    - "沈医生要求九点面谈，假U盘和仿造束带即将被核验"
    - "母亲仍在长期观察序列中，陈屿不能简单逃走"
    - "第三卷目标：证据扩散开始，但不是由陈屿控制；AI阵营不能一次性明牌"
  world_state: >
    第三卷开局从“主动散布”转为“传播失控”。本章要让读者看到证据传播效率异常，
    但只能让陈屿误以为是地下网络或黑客组织，不得直接解释引导体、织网者、两种AI或自然觉醒者。
    公开舆论不能立刻爆炸，传播应表现为精准投放、短暂删除、局部撤回、暗线接触和无署名回传。

after_state:
  characters:
    - name: "陈屿"
      state: "确认分片已被某个隐藏网络接手并重组；失去对证据传播路径的控制；收到避开九点面谈登记口的提示"
      location: "B区附近或返程路上"
    - name: "母亲"
      state: "仍在长期观察序列中，家中状态暂时平稳，但她的编号已经出现在更大证据链边缘"
      location: "家中"
    - name: "沈医生"
      state: "面谈压力继续存在；可能察觉证据外流，或者通过流程调整逼陈屿现身"
      location: "B区/消息中"
    - name: "林远"
      state: "仍不解释；可通过未读状态或外勤状态保持引导感"
      location: "未知"
    - name: "隐藏网络"
      state: "首次以传播效果出现：把分片投向记者、地下组织和精英内部反对派；身份仍不明"
      location: "多条匿名渠道"
  plot_advances:
    - "第十六章散布的分片没有沉没，而是被精准转发，进入第三卷'暴露'阶段"
    - "陈屿误判为地下黑客组织，为第十八章织网者视角和第十九章未知系统接触铺路"
    - "证据传播不等于胜利：母亲未脱离长期观察，沈医生面谈仍在，陈屿反而暴露得更深"
    - "精英体系出现局部反应：删除帖子、撤回采购公告、调整面谈入口或提醒安保"
    - "结尾钩子把陈屿从九点面谈登记口推开，引出下一章更明确的非人网络痕迹"
  new_hooks:
    - "是谁监听了旧数据层死信箱？"
    - "为什么对方能把陈屿不完整的分片重新拼得更准？"
    - "所谓地下网络到底是人类组织，还是更高效的非人系统？"
    - "九点面谈的登记口有什么问题？"
    - "沈医生是否已经知道材料外流？"

must_happen:
  - "开篇必须承接第十六章结尾：分片已经离开陈屿房间，旧数据层返回'已接收'，陈屿明早还要去B区面谈"
  - "母亲必须在日常中出现一次，提醒陈屿不要空腹或别迟到，强化她并不知道风险"
  - "陈屿必须准备去B区，不能因为证据散出就逃避面谈；面谈压力贯穿全章"
  - "必须出现至少三个传播异常：记者线索箱被二次打包、公益平台追加材料、内部论坛短帖被删、精英采购/冷链合同短暂变更、旧数据层回传包等"
  - "传播异常要精准、快速、局部，不要写成全网爆炸或社会舆论沸腾"
  - "必须出现一个人类接触点：记者、公益法律咨询点工作人员、地下医疗互助群中间人或王磊转来的帖子；此人只看见表层材料，不知道真正来源"
  - "陈屿必须误判为地下黑客组织或医疗互助网络接手，不能在本章推导出AI阵营"
  - "必须让陈屿感到失控：对方用到了他没有发给某一渠道的校验串或字段组合"
  - "沈医生必须施压或流程变化：确认面谈时间、变更入口、要求关闭通讯设备、或提醒携带原件/补充说明"
  - "林远不能解释；可以保持外勤未读，或只出现一次状态栏变化"
  - "结尾必须出现无署名回传包/短提示，把分片重组后的证据路径发回给陈屿，并提示不要进入九点面谈登记口"

