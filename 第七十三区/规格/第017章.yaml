  - position: 0
    value: 8
    note: "分片已发出但后果未知；沈医生九点面谈逼近"
  - position: 18
    value: 8
    note: "第一个渠道出现异常回执或二次打包痕迹"
  - position: 38
    value: 9
    note: "多个节点同步出现证据残片，传播效率明显不正常"
  - position: 58
    value: 8
    note: "人类接触点出现，陈屿误判为地下网络接住材料"
  - position: 78
    value: 9
    note: "沈医生面谈流程变化，陈屿发现自己可能被引向固定入口"
  - position: 100
    value: 9
    note: "无署名回传包重组证据并警告不要进入登记口，陈屿确认失控"

key_scenes:
  - "家中清晨：母亲准备药盒或早餐，陈屿把纸质信封放进外套，准备先投递再去B区"
  - "路上/投递点：陈屿送出线下信封，手机收到记者线索箱TIP编号的二次状态"
  - "临近B区前：公益平台或一次性邮箱收到匿名追加材料通知，追加材料使用了陈屿未发给该平台的校验串"
  - "训练中心内部论坛/同事消息：王磊或内部群转来一条关于PY-2207风险的帖子，帖子很快被删除"
  - "公共采购或冷链公告：与PY-2207相邻批次/公共健康合作方冷链合同出现短暂撤回，随后页面不可见"
  - "人类接触点：记者或中间人用TIP尾号联系陈屿，只问能否确认编号链，不知道EDN原件"
  - "沈医生消息：面谈仍按九点进行，要求从B区后侧登记/关闭通讯设备/携带原件说明"
  - "林远状态：外勤、未读、审批人为空，不提供答案"
  - "回传包：无署名文件返回，把编号链、医疗AI建议、长期观察编号和配给药批号重组成更清晰路径"
  - "结尾：短提示'不要进入九点面谈的登记口'，陈屿站在B区附近或公交站，看见时间逼近"

传播异常设计:
  - "传播不是广场式爆炸，而是点对点命中关键节点"
  - "记者拿到编号链但没有腕带全貌"
  - "公益平台拿到字段说明，却被匿名追加医疗AI建议摘要"
  - "内部论坛只出现几分钟短帖，说明有人在试探或警告"
  - "精英内部采购/冷链合同变化只能作为网页短暂痕迹，不可写成官方承认"
  - "回传包能把分片拼得更好，但不能解释是谁拼的"

母亲线处理:
  - "母亲本章只在日常中出现，仍不知道真相"
  - "她的药盒、随访提醒和早餐/出门叮嘱用来对照陈屿的失控"
  - "不要让母亲被强行带走或突然恶化；压力来自流程仍悬着"

沈医生处理:
  - "沈医生仍保持流程化、礼貌、专业，不暴力威胁"
  - "可以增强压迫：要求关闭通讯设备、从指定入口登记、携带补充说明和原件"
  - "不要直接说'你散布证据了'，但可以让陈屿怀疑对方已察觉"

林远处理:
  - "林远本章不解释、不救场、不发谜语"
  - "只允许用状态栏、未读、外勤、审批人为空制造缺席感"
  - "不要让陈屿把传播异常归因给林远"

信息揭露边界:
  - "可以让陈屿误以为地下黑客组织或医疗互助网络参与"
  - "可以让传播效率表现出非人感"
  - "禁止出现织网者视角、引导体名称、自然觉醒者、两种AI、林远真实身份"
  - "禁止让社会舆论公开爆炸；第023章才是伊甸泄露"
  - "禁止完整解释方舟计划或冬眠舱"

environment_constraints:
  - "本章环境描写必须服务传播失控、面谈倒计时和母亲日常反差，整体占比控制在10%-15%左右"
  - "家中最多保留3个环境锚点：药盒、早餐/锅、外套里的信封"
  - "B区附近最多保留2-3个锚点：后侧登记口、安检提示、关闭通讯设备标识"
  - "网络场景只写必要界面字段、回执、删除提示和时间戳，不铺陈软件界面"
  - "如果一段环境描写删掉后不影响传播路径或倒计时压力，应不写"

写作要求:
  - 字数: 4200-5200字
  - 基调: 紧张、失控、冷静表面下的传播异常
  - 视角: 陈屿第三人称有限视角
  - 节奏: 清晨面谈倒计时开局、渠道异常逐个出现、中段人类接触误导、沈医生流程收紧、回传包冷收束
  - 重点: 写出陈屿不是胜利者，而是证据传播链上的一个入口；地下网络像人类组织，但效率不像人类
  - 对话: 少量，母亲生活化，记者/中间人谨慎，沈医生消息体面
  - 段落: 网络回执和短提示可单独成段；传播异常不要堆成设定说明，要通过消息、页面、删除痕迹和时间差呈现

避免:
  - "不要写成全网热搜、舆论爆炸或记者发布长报道"
  - "不要让陈屿立刻安全或胜利"
  - "不要让地下网络主动解释身份"
  - "不要出现黑客大战、破解高权限系统、一键控制精英系统"
  - "不要让沈医生暴力威胁或公开抓捕"
  - "不要让林远给答案或发谜语"
  - "不要提前明牌引导体、织网者、两种AI、自然觉醒者、方舟全貌、冬眠舱用途"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P0: 不要提前明牌方舟全貌、冬眠舱用途、两种AI、林远真实身份、引导体或自然觉醒者"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免连续用'他发现/他意识到/他觉得'推进"
  - "P1: 避免把传播异常写成设定百科，要用具体渠道和时间差承载"
  - "P2: 用TIP编号、校验串、删除提示、面谈入口变更、回传包制造真实感"
