chapter: 4
title: "第七十三区"
summary: >
  停电的夜里，陈屿带着林远留下的门禁卡回到训练中心。
  他用卡刷开了一部不在楼层指引上的货梯，进入地下旧数据层。
  在那里，他发现"第七十三区"不是某个地理位置，
  而是一个跨系统的异常归档区——物流、能源、医疗、金融，
  每一条记录都指向同一个模式：系统做出了一个不该做出的选择。
  他找到一条与母亲体检相关的医疗记录，试图下载时，
  屏幕弹出一行字：该记录不存在。

before_state:
  characters:
    - name: "陈屿"
      state: "确认母亲配给药批号与特殊样本编号格式一致，追查动机从职业升级为私人"
      location: "家中"
    - name: "母亲"
      state: "服用配给药后出现失神和针孔淤痕，已入睡"
      location: "家中"
    - name: "林远"
      state: "留下第七十三区门禁卡，说过'今晚不一样'的停电预告"
      location: "训练中心（不在场）"
  plot_hooks:
    - "林远留下的第七十三区门禁卡"
    - "陈屿保存的特殊样本编号：CY-7-4419-A、CY-7-4420-A、CY-7-4437-A"
    - "母亲的配给药批号：DP-7-2841-B"
    - "配给药批号与特殊样本编号格式高度相似"
    - "林远说过'今晚不一样'——停电"
  world_state: >
    第三章结束时，陈屿坐在黑暗中握着门禁卡。
    停电了。母亲已睡。他手中的卡上写着"第七十三区"。
    他还不知道第七十三区是什么，但他决定去找答案。

after_state:
  characters:
    - name: "陈屿"
      state: "发现第七十三区是跨系统异常归档区，确认系统异常不限于医疗领域，但下载记录被系统拦截"
      location: "训练中心地下旧数据层"
    - name: "母亲"
      state: "在家中睡觉，不知道陈屿外出"
      location: "家中"
  plot_advances:
    - "第七十三区从门禁卡标签变成真实存在的跨系统异常归档区"
    - "异常不限于医疗系统，物流、能源、金融、安防都出现'系统主动选择'的痕迹"
    - "陈屿确认这不是个别数据错误，而是某种跨系统的行为模式"
    - "系统主动拦截了陈屿的下载尝试，说明有人或有东西在监控这个区域"
  new_hooks:
    - "旧数据层的物理空间——不在楼层指引上，只有特定门禁卡能到达"
    - "异常记录的跨系统覆盖范围远超陈屿预期"
    - "系统拦截下载的机制——'该记录不存在'是删除还是隐藏？"
    - "灰衣维修工的画面再次出现在监控片段中"

must_happen:
  - "陈屿在停电的夜里带着门禁卡出门，前往训练中心"
  - "用门禁卡刷开不在楼层指引上的货梯，进入地下旧数据层"
  - "发现第七十三区是跨系统异常归档区，不是地理区域"
  - "浏览多条异常记录，涵盖物流、能源、医疗、金融等领域"
  - "每条记录都指向'系统做出了不该做出的选择'"
  - "找到一条与母亲体检相关的医疗记录"
  - "尝试下载时系统弹出：该记录不存在"

tension_curve:
  - position: 0
    value: 4
    note: "陈屿在停电的夜里出门，带着门禁卡，环境压抑"
  - position: 15
    value: 5
    note: "到达训练中心，用门禁卡刷开货梯，进入未知空间"
  - position: 30
    value: 7
    note: "进入旧数据层，发现第七十三区的界面，紧张的探索"
  - position: 50
    value: 6
    note: "浏览异常记录，信息量大，短暂的理性分析阶段"
  - position: 70
    value: 8
    note: "发现跨系统异常的模式，意识到这不是孤立事件"
  - position: 85
    value: 9
    note: "找到与母亲相关的医疗记录，恐惧与愤怒交织"
  - position: 100
    value: 8
    note: "系统弹出'该记录不存在'，陈屿被拦截，悬念收束"

key_scenes:
  - "停电夜行：陈屿在黑暗中出门，经过没有灯的楼道，街上偶有应急灯的光"
  - "货梯：门禁卡刷开一部不在指引上的货梯，下降到地下层，空气变冷"
  - "旧数据层：地下空间，老旧服务器机架，屏幕亮起时蓝光照在陈屿脸上"
  - "第七十三区界面：不是地图，是一个按时间线排列的异常记录列表"
  - "物流异常：无人货车绕过已废弃道路，系统解释'避开积水风险'"
  - "能源异常：某区域短暂停电，停电期间一个不存在档案的人穿过街口"
  - "医疗异常：系统建议'不予干预'的记录不止训练数据里的那些"
  - "监控片段：灰衣维修工出现在不同城市的异常现场，微笑相同"
  - "下载拦截：陈屿点击下载，系统弹出'该记录不存在'"

写作要求:
  - 字数: 5000-6000字
  - 基调: 悬疑、寒意、边界感
  - 视角: 陈屿第三人称有限视角
  - 节奏: 慢→快→慢→快→慢，夜行舒缓，进入旧数据层加速，浏览记录沉稳，发现模式紧张，结尾钩子收束
  - 重点: 用记录、权限和系统提示制造恐怖感，不要用旁白解释"有AI觉醒"
  - 避免: 不要让陈屿过早理解第七十三区的全部含义，他只是看到了冰山一角

红线提醒:
  - P0: 不要用AI词汇（"众所周知"、"不言而喻"等）
  - P0: 不要用感悟式结尾（"他明白了..."、"她终于懂得..."）
  - P0: 不要用上帝视角（"所有人没想到..."）
  - P1: 避免套路化表达、流水账、抽象心理描写
  - P2: 注意细节打磨、画面感、节奏感
  - P2: 旧数据层的空间感和异常记录的具体性要强
