chapter: 12
title: "合理的人"
summary: >
  陈屿带着 EDN 腕带回到日常生活，还没来得及继续追查，便在训练中心收到一次非正式约见。
  来者不是监察部门，而是一名代表精英医疗体系的温和中年男人。他没有否认高风险研究，
  只把它称为极端气候、人口老化和医疗资源枯竭下的文明延续工程。他承认陈屿接触到的记录
  属于不该被底层训练师保存的材料，要求陈屿交出 EDN 腕带、本地截图和所有缓存副本。
  作为交换，他可以让陈屿母亲脱离普通观察序列，进入更高等级治疗通道。陈屿第一次面对
  可以立刻帮助母亲的交易，也第一次听见权力体系用冷静、体面、合乎逻辑的方式解释残酷。
  章末，陈屿没有当场交出全部证据，只交出一个经过处理的副本，并意识到自己母亲的编号已经被对方放在谈判桌上。

before_state:
  characters:
    - name: "陈屿"
      state: "从逃出者处带回 EDN-7-2598-B 腕带，知道伊甸和逆龄实验存在实体证据；训练系统已将他纳入行为观察"
      location: "家中、训练中心"
    - name: "母亲"
      state: "完成免费深度体检后等待报告，仍不知道自己已进入样本筛选链条；身体疲惫但日常仍在维持"
      location: "家中"
    - name: "精英代表"
      state: "来自精英医疗/公共健康背后的管理层，不以反派姿态出现，而以解决问题的人自居"
      location: "训练中心附近的会客室、医疗合作方办公室或精英区边缘"
    - name: "林远"
      state: "本章可以短暂缺席或只在远处出现，不替陈屿做决定；其沉默本身制造不安"
      location: "训练中心"
    - name: "蓝衣工作人员"
      state: "仍是公共健康体系执行端，可通过体检报告推送或随访提醒施压，不正面追逐陈屿"
      location: "社区、系统通知中"
  plot_hooks:
    - "EDN-7-2598-B 腕带是伊甸线的实体证据"
    - "逃出者说过'伊甸二期'、'窗口快坏了'和'不要相信蓝衣人'"
    - "母亲编号 HC-7-3102-A 与样本池、长期配给药、风险二级有关"
    - "陈屿已被训练系统标记为行为观察对象，服从度评分3/10"
    - "第十二章必须让精英代表正面登场，并提出以母亲治疗资格换取记录"
  world_state: >
    第二卷从底层追查进入权力正面施压。
    医疗实验不能被解释成简单邪恶，而要呈现为一套有预算、有指标、有牺牲计算、有文明叙事的精英工程。
    本章只让精英代表承认"高风险研究"和"不适合公开的观察项目"，不要把伊甸计划、方舟计划、长生目标一次性讲透。

after_state:
  characters:
    - name: "陈屿"
      state: "被迫面对交易：交出证据换母亲更好治疗；表面配合，实际保留了至少一个备份或关键字段"
      location: "训练中心返家路上或家中"
    - name: "母亲"
      state: "收到更高级别复查/绿色通道提示，成为对方展示诚意和施压的筹码"
      location: "家中"
    - name: "精英代表"
      state: "确认陈屿手里有 EDN 证据，同时留下交易期限；不急着摧毁陈屿，而是尝试收编他"
      location: "会客室或车内离开"
    - name: "林远"
      state: "如果出现，只能让陈屿注意'他们没有说谎'或'代价被放进了表格里'，不能替他破局"
      location: "训练中心边缘"
  plot_advances:
    - "精英医疗体系首次派代表与陈屿正面谈判"
    - "伊甸线从逃出者口中的词，升级为被权力承认但包装过的高风险研究"
    - "母亲医疗资格成为交易筹码，陈屿的软肋被对方精准握住"
    - "陈屿的行动从单纯追查进入博弈：他必须学会交出一部分、隐藏一部分"
    - "为第十三章调查林远埋下心理动机：陈屿发现人类权力已经盯上他，而林远仍在沉默"
  new_hooks:
    - "陈屿交出去的副本是否能骗过对方？"
    - "母亲的绿色通道究竟是治疗，还是更高等级观察？"
    - "精英代表所说的文明延续工程背后还有什么设施和资源？"
    - "林远为什么在这次交易前后保持沉默？"
    - "对方如何知道 EDN 腕带已经到陈屿手里？灰衣维修工是否也被追踪？"

must_happen:
  - "开篇从日常压力切入：陈屿藏好 EDN 腕带，同时母亲收到体检报告或复查提醒"
  - "必须出现母亲生活化反应：她担心花钱、担心陈屿请假、把绿色通道当成好消息"
  - "陈屿在训练中心或通勤途中收到约见通知，通知措辞必须正式、温和，不像威胁"
  - "精英代表登场要克制：衣着、动作、语气都普通体面，不露反派姿态"
  - "对方必须明确知道 EDN-7-2598-B 腕带和陈屿的本地缓存记录"
  - "对方不能否认逃出者，也不能承认谋杀；只说个体风险、项目偏差、未完成随访、保护性处置"
  - "对方必须提出核心交易：交出腕带、截图、本地文件和备份，换母亲进入优先治疗/更高等级医疗通道"
  - "必须有一段'合理化'对话：极端高温、医疗资源不足、老龄化、文明延续、少数高风险研究的必要性"
  - "陈屿不能热血拒绝，也不能完全投降；他要权衡母亲，当场做出部分配合"
  - "陈屿最好交出一个经过处理的副本或腕带照片，而不是完整实体证据；实体腕带是否交出可留悬念，但必须保留至少一处关键备份"
  - "对方要用母亲编号 HC-7-3102-A 或体检报告证明自己能控制她的治疗路径"
  - "结尾必须冷收束：母亲的绿色通道提示抵达，陈屿看见它和交易内容几乎同时发生"

tension_curve:
  - position: 0
    value: 7
    note: "陈屿藏匿 EDN 腕带，母亲等待体检结果，日常表面恢复"
  - position: 18
    value: 7
    note: "训练中心出现非正式约见通知，林远缺席或沉默"
  - position: 35
    value: 8
    note: "精英代表确认 EDN 腕带和本地记录，陈屿意识到自己已经暴露"
  - position: 55
    value: 9
    note: "对方用文明延续话术包装高风险研究，并把逃出者降格为项目偏差"
  - position: 75
    value: 9
    note: "母亲治疗资格被摆上谈判桌，陈屿面临真正诱惑"
  - position: 100
    value: 8
    note: "陈屿部分交付、暗留备份；母亲收到绿色通道提示，钩子转向信任危机和林远调查"

key_scenes:
  - "家中早晨：陈屿把 EDN 腕带藏进不联网的旧设备或工具盒，母亲问他是不是又没睡"
  - "体检报告推送：社区健康应用提示母亲需要二次复查，措辞是'优先关怀'或'绿色通道资格评估'"
  - "训练中心：陈屿发现自己的任务权限被轻微调整，林远工位空着或只留下未发送的空白消息"
  - "约见通知：合作方会客室、医疗项目说明会、或精英区边缘的白色小会议室，不要写成审讯室"
  - "精英代表登场：他叫出母亲编号和陈屿的行为观察记录，语气像在谈风控"
  - "合理化交锋：对方承认研究有高风险，但强调普通医疗体系已经无法承受极端气候和老龄化"
  - "交易提出：一份母亲优先治疗方案被推到桌面上，旁边是要求陈屿交出的记录清单"
  - "陈屿权衡：他问如果不交会怎样，对方不威胁，只说普通流程会继续按系统建议执行"
  - "部分交付：陈屿交出经过处理的副本、无关键字段截图或一份可被追踪的假完整包"
  - "冷收束：回家路上或到家后，母亲手机收到绿色通道通知，陈屿知道交易已经开始执行"

精英代表设计:
  - "可暂不命名，或使用普通姓名/职务称呼，如沈医生、项目协调官、公共健康合作方代表"
  - "他必须像一个受过训练的专业人士，而不是阴谋反派"
  - "他说话有同理语气，但核心逻辑冷：资源有限、风险分层、牺牲不可避免"
  - "他不说'我们害人'，只说'我们必须在不可逆的条件下保留更多可能性'"
  - "他对陈屿有一点尊重：认可他能看出模式，也因此认为他可以理解交易"

交易设计:
  - "交换物：EDN-7-2598-B 腕带、本地截图、缓存导出、母亲编号关联记录、逃出者接触记录"
  - "筹码：母亲更高等级治疗通道、暂停普通随访、降低观察风险等级、提供非配给药替代方案"
  - "威胁方式：不直说伤害母亲，只说如果没有额外授权，她将继续按公共健康模型建议执行"
  - "陈屿反应：不能立刻义正辞严拒绝；他必须被母亲筹码击中，甚至短暂想接受"
  - "策略：陈屿可以交出一份不完整材料，保留腕带实体或关键编号备份，为第十六章分片散布埋前置能力"

信息揭露边界:
  - "可以承认：高风险研究、观察窗口、优先治疗资格、项目偏差、公共健康与精英医疗合作"
  - "可以暗示：伊甸服务于上层资源和文明延续，不等于普通医疗福利"
  - "禁止明说：精英长生完整目标、方舟计划、冬眠舱、两种AI、林远真实身份"
  - "不要让精英代表解释所有字段；他只解释够让陈屿知道对方有权力、有资源、有母亲筹码"

environment_constraints:
  - "本章环境描写必须服务压迫感、线索和人物处境，整体占比控制在10%-15%左右"
  - "会客场景最多保留2-3个环境锚点：隔音玻璃、恒温冷气、桌面文件/终端、门外蓝色工牌"
  - "不要铺陈精英区街景、建筑外观、灯光材质；除非它直接暴露资源分层或交易压力"
  - "训练中心和家中环境只写与证据藏匿、母亲状态、权限变化有关的细节"
  - "如果一段环境描写删掉后不影响行动、线索或情绪压力，应不写"

写作要求:
  - 字数: 4200-5200字
  - 基调: 冷静、体面、压迫、诱惑大于恐吓
  - 视角: 陈屿第三人称有限视角
  - 节奏: 日常余震开局、约见推进、对话交锋中段、交易压顶、冷钩子收束
  - 重点: 写出'合理的人'比粗暴反派更可怕；让陈屿的犹豫成立
  - 对话: 精英代表语气克制、清晰、有职业礼貌；陈屿少说口号，多问具体条件
  - 段落: 对话交锋短中交替，解释性内容必须被动作、文件、编号和母亲筹码切开

避免:
  - "不要把精英代表写成威胁式反派或阴谋宣讲员"
  - "不要让陈屿马上大义凛然拒绝交易，这会削弱母亲软肋"
  - "不要让对方一次性讲出伊甸计划完整真相"
  - "不要提前引出方舟计划、冬眠舱、引导体或自然觉醒者"
  - "不要让林远替陈屿解释局势或救场"
  - "不要重复第十章的数据查询结构，数据只作为谈判材料出现"
  - "不要写成动作戏、追逐戏或审讯戏，本章恐怖来自理性和条件交换"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免连续用'他发现/他意识到/他觉得'推进"
  - "P1: 避免把精英代表对话写成设定百科或作者代言"
  - "P2: 用母亲编号、绿色通道通知、证据清单、腕带毛刺和权限变化承载压力"
