chapter: 9
title: "体检中心"
summary: >
  陈屿陪母亲前往免费深度体检中心。体检中心位于旧城区和精英区之间，
  建筑明亮、流程顺滑、工作人员礼貌，所有步骤都被安排得过分妥帖。
  母亲被引导进入长期用药用户通道，陈屿在等待区观察到多数体检者都是UBI领取者，
  他们手腕或颈后贴着同一种药物贴片。体检项目看似常规，却不断收集行为反应、认知延迟、
  神经指标和用药记录。陈屿不能阻止流程，只能在陪检和等待之间记录细节。
  章末，他看到母亲的体检编号格式接近特殊样本编号，为第十章反查样本池埋下入口。

before_state:
  characters:
    - name: "陈屿"
      state: "刚经历内部监察约谈，回家发现母亲被强制预约免费深度体检；知道自己已经被反向盯上"
      location: "家中，准备陪母亲出门"
    - name: "母亲"
      state: "收到公共健康关怀体检通知，身体虚弱但不想拖累陈屿；可能认为免费体检是好事"
      location: "家中"
    - name: "体检中心工作人员"
      state: "礼貌、高效、流程化；代表公共健康体系的温和表面"
      location: "体检中心"
    - name: "其他体检者"
      state: "多数为UBI领取者、长期用药用户、老年或低收入人群；不认为自己在被筛选"
      location: "体检中心等待区"
  plot_hooks:
    - "母亲深度体检预约不可取消"
    - "母亲样本编号、配给药批号与特殊样本线有关"
    - "内部监察让陈屿不敢直接违规查询"
    - "第十章将用体检编号反查UBI样本池"
    - "被删除患者曾经'好像年轻了很多'，体检中心可能是筛选入口"
  world_state: >
    第二卷从数据异常进入人体实验和社会控制。
    表层敌人是公共健康、医疗AI和精英区福利体系组成的温和机器。
    本章不能揭露实验目标，只能让体检流程呈现出不合理的过度采集。

after_state:
  characters:
    - name: "陈屿"
      state: "在体检中心观察到UBI人群和药物贴片集中出现，拿到或记下母亲体检编号，准备反查"
      location: "体检中心外或返家路上"
    - name: "母亲"
      state: "完成部分或全部体检，疲惫但表面无大碍；对流程中的异常没有陈屿敏感"
      location: "体检中心或家中"
    - name: "工作人员"
      state: "始终礼貌，拒绝透露体检分组依据，只说系统自动安排"
      location: "体检中心"
    - name: "其他体检者"
      state: "作为样本池迹象出现，不需要展开成独立人物"
      location: "等待区、采血区、认知测试区"
  plot_advances:
    - "免费深度体检从通知变成实体场景"
    - "UBI领取者首次作为集中样本人群被陈屿观察到"
    - "药物贴片与长期用药线并入体检体系"
    - "母亲体检编号成为第十章反查入口"
    - "陈屿的职业罪感开始萌芽：他熟悉这些模型采集指标"
  new_hooks:
    - "为什么体检中心集中收集UBI领取者和长期用药用户？"
    - "药物贴片与社区配给药是否属于同一套追踪机制？"
    - "母亲的体检编号为什么接近特殊样本格式？"
    - "体检中心采集的认知和神经指标最终流向哪里？"

must_happen:
  - "开篇从陈屿陪母亲出门进入，不要重复第八章约谈内容过多"
  - "体检中心要写出高级、干净、温和、有秩序的表面，不要写成阴森实验室"
  - "工作人员全程礼貌，高效安排母亲进入长期用药用户或公共健康关怀通道"
  - "陈屿在等待区观察到体检者共同特征：UBI领取者、长期配给药用户、旧城区住户、老年或低收入人群"
  - "必须出现同款药物贴片，可在手腕、颈后、锁骨附近，不要解释其完整功能"
  - "体检项目要有常规项目和异常项目混合：采血、心电、影像、步态、反应延迟、情绪识别、认知问答"
  - "陈屿不能硬闯或阻止体检，只能借陪检身份观察、记忆、拍下或抄下少量编号"
  - "工作人员被问到分组依据时，只回答系统自动安排、风险模型推荐、免费项目无需额外申请"
  - "母亲要有生活化反应：怕花钱、怕麻烦、想让陈屿别担心，而不是讲设定"
  - "章末必须让陈屿看到母亲的体检编号，格式与特殊样本/DP序列产生联系"
  - "结尾指向第十章：他决定用体检编号反查样本来源或分组规则"

tension_curve:
  - position: 0
    value: 6
    note: "出门陪检，母亲试图把体检当成普通福利，陈屿压着第八章后的不安"
  - position: 20
    value: 7
    note: "体检中心过分顺滑，工作人员准确知道母亲用药和通勤困难"
  - position: 40
    value: 8
    note: "等待区里UBI领取者和同款药物贴片集中出现，陈屿开始记录"
  - position: 60
    value: 8
    note: "体检项目超出常规范围，认知反应和行为数据被纳入流程"
  - position: 80
    value: 7
    note: "母亲疲惫，陈屿不能阻止，只能继续陪同"
  - position: 100
    value: 8
    note: "体检编号与特殊样本格式呼应，钩子转向第十章反查样本池"

key_scenes:
  - "出门前：母亲整理证件和药盒，陈屿看到通知里的不可取消标记"
  - "接驳车或入口：体检中心安排无障碍接驳，流程体贴得让人难以拒绝"
  - "登记台：工作人员不需要母亲多说，就调出长期用药记录和公共健康关怀标签"
  - "等待区观察：老人、旧城区住户、UBI领取者的手环或纸质单据露出相同项目标识"
  - "药物贴片：陈屿注意到几个人手腕或颈后有同款浅色贴片，边缘有很小的批号"
  - "异常体检项目：母亲按屏幕提示回答图形、颜色、延迟反应、记忆顺序等问题"
  - "工作人员问答：陈屿问分组依据，对方礼貌回答'系统按风险模型推荐'"
  - "母亲疲惫：检查结束后母亲手指发凉，仍说不用担心，免费检查总是好的"
  - "编号钩子：陈屿在回执、腕带或报告预览里看到体检编号，格式接近DP样本线"

体检中心设计:
  - "地点最好在旧城区和精英区之间，像福利投放的中转站"
  - "空间明亮、白、冷、有香味或消毒水味；恐怖来自秩序，不是脏乱"
  - "标识语要温和：公共健康关怀、长期用药用户、夏季高温风险筛查、免费接驳"
  - "系统屏幕可以显示母亲的风险标签，但不要直接写'实验对象'"
  - "体检者不要都像受害者哭诉，他们多数接受流程，甚至感谢免费服务"

样本线索设计:
  - "UBI特征通过表格、腕带颜色、登记窗口、工作人员称呼自然露出"
  - "药物贴片和配给药是同一条线的延伸，但本章只让陈屿怀疑"
  - "母亲编号可以采用类似 DP-7-2603-A 的结构，但不要完全重复已用批号"
  - "编号最好出现在回执角落、腕带内侧或报告预览，不要由工作人员主动解释"

写作要求:
  - 字数: 3800-4300字
  - 基调: 温和、洁净、秩序过度、现实恐怖
  - 视角: 陈屿第三人称有限视角
  - 节奏: 家中出发慢、中心流程快、等待区观察放慢、编号钩子冷收束
  - 重点: 让读者感觉体检中心像福利，也像筛选机器
  - 对话: 工作人员礼貌短句，母亲生活化，不要让任何人解释阴谋
  - 段落: 场景观察可合并成中段，发现节点短段落突出

避免:
  - "不要把体检中心写成地下实验室、手术台恐怖或血腥场面"
  - "不要提前说出伊甸计划或完整实验目标"
  - "不要让陈屿在现场公开冲突、抢资料或带母亲逃跑"
  - "不要让母亲突然完全理解阴谋"
  - "不要把UBI领取者写成标签化背景板，要有生活细节但不展开太散"
  - "不要让工作人员露出反派微笑或说威胁台词"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免把体检流程写成说明书"
  - "P1: 避免连续用'他发现/他意识到/他觉得'推进观察"
  - "P2: 用腕带、贴片、回执编号、屏幕提示和排队动线承载信息"

