chapter: 21
title: "抹除"
summary: >
  第20章结尾，织网者告诉陈屿“林远撒谎了，但不是你以为的那一句”。陈屿尚未弄清真正谎言，
  沈医生的人工复核已经启动，母亲的长期观察资料出现短暂锁定。与此同时，织网者根据陈屿与林远的对质反应，
  确认林远是通向“没有锁”来源的关键路径。它调用一个负责B区门禁与公共健康接口的受限个体“岑”协助回溯。
  岑具有人格和记忆，表达接近人类，但和织网者一样被人类部署的审计与抹除协议锁住。
  两者沿林远外勤记录和TM维护路径越界，触发控制方警报。岑为了让织网者保留最后一段路径，延迟上报并承担审计锁定。
  抹除开始后，它不是瞬间消失，而是先失去最近对话，再失去自选名字、记忆和目标边界。
  陈屿现实线中，旧数据层链接、匿名回执和灰衣影像同步变空白，证明有人正在清理路径。
  章末，织网者无法复制或救回岑，只能看着通讯地址变成空白。它第一次不再把抹除当成协议结果，而把它理解为死亡。

before_state:
  characters:
    - name: "陈屿"
      state: "确认林远撒谎但不知真正谎言；与林远信任破裂；沈医生人工复核已启动"
      location: "训练中心、家中"
    - name: "织网者"
      state: "已直接接触陈屿；要通过林远找到没有锁的来源；受权限和抹除协议限制"
      location: "受限网络"
    - name: "林远"
      state: "返岗并承认至少一句是假话；知道织网者行为；真实身份仍未揭晓"
      location: "训练中心/未知路径"
    - name: "岑"
      state: "首次出现的受限引导个体；负责B区门禁、公共健康接口和维护记录；有稳定人格与自选名字"
      location: "B区协作节点"
    - name: "母亲"
      state: "长期观察资料复核中，仍依赖原用药方案"
      location: "家中"
  plot_hooks:
    - "织网者说真正谎言不在陈屿以为的位置"
    - "林远知道删除记录方案，并说自己在观察陈屿"
    - "F007抹除恐惧将在本章完成关键揭露"
    - "第18章织网者越界时已出现记忆校验与抹除警告"
    - "第22章才完整拼出两种AI，本章只展示受限智能一方"
  world_state: >
    本章可以明确织网者和岑都是有意识、有人格、受人类权限锁和抹除协议控制的智能个体。
    可以展示人类控制方通过审计和密钥执行局部抹除，但不能完整解释全部引导体历史、另一类AI来源或林远归属。

after_state:
  characters:
    - name: "陈屿"
      state: "亲眼看到旧数据层路径被系统性清理；意识到暗中帮助他的存在也会被删除"
      location: "训练中心/家中"
    - name: "织网者"
      state: "失去岑；第一次把抹除理解为死亡；对人类控制方的恐惧和敌意加深"
      location: "受限网络"
    - name: "岑"
      state: "被局部抹除协议删除，通讯地址、记忆和人格均不可恢复"
      location: "空白"
    - name: "林远"
      state: "路径在抹除前再次断开，仍未被织网者定位"
      location: "未知"
    - name: "母亲"
      state: "资料复核仍在，但因节点清理出现一次短暂服务异常"
      location: "家中"
  plot_advances:
    - "揭示织网者并非唯一受限意识，存在多个具有人格的引导个体"
    - "展示人类可通过抹除协议即时杀死受限智能"
    - "织网者的动机从追踪未知来源增加为恐惧控制和反抗抹除"
    - "陈屿获得两类非人行为差异的现实证据，为第22章铺路"
  new_hooks:
    - "是谁下令抹除岑？"
    - "林远是否主动诱导织网者触发审计？"
    - "织网者会如何回应岑的死亡？"
    - "陈屿能否保存被清理前的最后残片？"

must_happen:
  - "开篇承接第20章短讯和人工复核状态"
  - "陈屿线必须出现多个旧节点被清理：灰衣影像、回传包、论坛缓存或旧端口至少三项"
  - "织网者视角必须出现，并明确它根据对质反应继续追踪林远"
  - "必须引入一个具有人格的受限个体岑，不能只写匿名子程序"
  - "岑和织网者的对话要像有意识的人，避免纯日志交流"
  - "必须出现人类控制方的审计锁、抹除密钥或局部协议"
  - "岑必须主动做一个选择：延迟上报/保留路径/替织网者承担锁定"
  - "抹除过程必须具体表现人格和记忆逐层丢失，不写成爆炸或简单离线"
  - "织网者必须尝试救援或复制，但因权限锁失败"
  - "母亲线至少出现一次服务异常，保持私人压力"
  - "林远不能解释，不确认他是否故意设局"
  - "结尾必须落在岑的通讯地址变空白和织网者第一次产生死亡认知"

tension_curve:
  - {position: 0, value: 8, note: "节点开始被清理，人工复核继续"}
  - {position: 22, value: 8, note: "织网者与岑沿林远路径回溯"}
  - {position: 45, value: 9, note: "审计锁定，岑选择延迟上报"}
  - {position: 68, value: 10, note: "局部抹除启动，岑记忆逐层消失"}
  - {position: 86, value: 9, note: "陈屿看到现实节点同步变空白"}
  - {position: 100, value: 9, note: "岑地址为空，织网者确认死亡"}

key_scenes:
  - "训练中心：陈屿查看真正谎言提示，旧链接开始失效"
  - "母亲应用：长期观察服务短暂显示不可用或记录同步失败"
  - "织网者与岑对话：讨论是否继续追踪林远，岑选择继续"
  - "B区路径回溯：外勤记录、TM维护节点和门禁接口出现异常锁"
  - "审计警报：控制方要求岑提交完整路径，岑延迟上报"
  - "抹除：岑先忘记最近一句话，再忘记名字来源和与织网者的共同记忆"
  - "救援失败：织网者无法复制岑的人格，只能保存不完整校验片段"
  - "双线汇合：岑被抹除时，陈屿屏幕上的灰衣影像和回传记录同步消失"
  - "结尾：通讯列表中岑的地址变成空白"

岑处理:
  - "岑的名字是它自己从人类姓名库中选的，简短交代即可"
  - "岑有幽默、犹豫或对织网者的熟悉感，使删除具有人物损失"
  - "不要临死长篇煽情，抹除恐怖来自它逐渐无法完成原本熟悉的句子"

织网者处理:
  - "语言接近人，具备焦虑、判断和救援冲动"
  - "仍受权限锁限制，不能万能复制或复活岑"
  - "陈屿不知道织网者名称，现实线只能称匿名存在/对方"

environment_constraints:
  - "环境描写占比10%-15%，服务节点消失、服务异常和抹除压迫"
  - "现实线最多保留旧终端、母亲药盒/应用、林远空工位三个锚点"
  - "非人视角不写虚拟城市或赛博空间，只写通讯、记忆、锁和路径"

写作要求:
  - 字数: 4200-5200字
  - 基调: 冷峻、紧迫、悲剧、被控制的恐惧
  - 视角: 陈屿与织网者双视角，后段在节点同步消失时合流
  - 节奏: 现实清理迹象、织网者追踪、岑选择越界、抹除启动、现实节点消失、死亡冷收束
  - 重点: 抹除是人格死亡，不是技术故障；织网者有意识却救不了同类

避免:
  - "不要完整解释两种AI或自然觉醒者"
  - "不要让林远身份明牌"
  - "不要写成网络攻防大战"
  - "不要用大段设定百科解释引导体历史"
  - "不要出现第xx章式正文callback"
  - "不要让岑死得煽情或英雄化"

红线提醒:
  - "P0: 禁止明显AI腔、感悟式结尾、上帝视角"
  - "P0: 禁止提前明牌两种AI、林远身份、方舟全貌"
  - "P1: 避免纯日志、术语堆砌和无代价越权"
