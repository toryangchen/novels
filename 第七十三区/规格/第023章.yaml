chapter: 23
title: "伊甸泄露"
summary: >
  2053年6月16日晚二十点二十分，陈屿没有回复“撤回”。十分钟后，记者线索渠道发布《免费体检之后：伊甸二期受试者名单》，
  公开UBI人群如何通过配给药、免费体检和长期观察被选入逆龄实验，并附上去名编号链、冷链合同、受试者口述和医疗AI“不予干预，保留完整观察窗口”日志。
  文章先被普通用户截图、转存，王磊、小张和社区居民分别在自己家人的药盒上找到相邻批号。母亲从社区群看到“免费体检拿人试药”的截图，
  认出自己去过的健康中心标识。陈屿只能承认她的批号和公开材料有关，无法再用“正常流程”安抚她。
  人们试图在C区健康服务中心门口要求查看自己记录，却陆续遇到链接限流、群组禁言、区间车“高温维护”停运、跨区门禁临时校验和健康中心暂停服务。
  一部分人走到现场，但门不开，公共广播只重复高温人群疏散要求。愤怒真实存在，却无法组织成稳定行动。
  章末，陈屿在停运的区间车页面后台快照中看到：C区公共线路负载下降，独立节点A-E-03负载却正在上升，状态变为“应急预启动”。

before_state:
  characters:
    - name: "陈屿"
      state: "已拼出有锁与无锁两类非人意识；收到伊甸材料完成核验的通知；在20:20前拥有最后撤回机会"
      location: "家中/旧终端前"
    - name: "母亲"
      state: "长期观察和用药服务暂时恢复；尚不知道自己的配给药批号已进入伊甸证据链"
      location: "家中"
    - name: "王磊"
      state: "仍是为家庭支出焦虑的普通训练师，不知道陈屿是材料源头之一"
      location: "家中/工作群"
    - name: "小张"
      state: "与训练中心同事一样只接触过公开福利和工作系统表层"
      location: "家中/工作群"
    - name: "记者线索渠道"
      state: "已交叉核验三名受试者、两份冷链合同、EDN字段和医疗AI日志；准备20:30发布"
      location: "公开发布队列"
    - name: "沈医生/B区体系"
      state: "仍掌握母亲长期观察与用药流程；尚未公开回应外泄材料"
      location: "B区公共健康协作体系"
  plot_hooks:
    - "第22章结尾的20:20撤回截止和20:30发布时间"
    - "第16-17章的记者线索箱、公益申诉、纸质信封和旧数据层分片"
    - "F002完整观察窗口、F003配给药与UBI样本池、F004被删除的人、F005逆龄副作用需在公开材料中形成社会证据"
    - "方舟边缘节点A-E-03已被陈屿发现，第24章将进入启动"
  world_state: >
    伊甸计划尚未被官方承认，但民间调查已形成可核验的部分证据链。本章的“社会爆炸”不是立即暴乱，
    而是大量普通人同时在自己药盒、体检单和家人症状中找到对应证据。公共系统不需要公开镇压，只需通过限流、停运、门禁和服务状态阻止人群汇合。

after_state:
  characters:
    - name: "陈屿"
      state: "没有撤回材料；亲眼看到真相公开后仍无法转化为有效行动；发现A-E-03进入应急预启动"
      location: "C区健康服务中心外/停运的交通节点"
    - name: "母亲"
      state: "已知道免费体检和配给药可能涉及试验，但不知道陈屿的全部调查与泄露身份"
      location: "家中"
    - name: "王磊"
      state: "在家人药盒上发现PY-2207相邻批号，从旁观者变成直接利益相关者"
      location: "工作群/家中"
    - name: "小张"
      state: "发现公开材料中的医疗AI建议日志与训练中心任务格式一致，对自己的工作产生恐惧"
      location: "工作群"
    - name: "普通受影响者"
      state: "已形成共同愤怒和核对需求，但被通讯、交通、门禁和高温疏散流程切散"
      location: "社区群、区间道路、C区健康服务中心外"
    - name: "A-E-03"
      state: "独立能源负载上升，进入应急预启动"
      location: "产业核心区外围/方舟边缘"
  plot_advances:
    - "伊甸计划部分真相公开：UBI筛选、免费体检、逆龄试验、器官崩溃和医疗AI决策"
    - "回收F004和F005的社会层面，使被删除的人和逆龄副作用进入公开证据"
    - "王磊与小张的普通人压力线进入主线，训练师开始反向审视自己参与的模型"
    - "推进主题：知道真相不等于拥有资源、通道和组织能力"
    - "A-E-03异常增载，为第24章方舟启动直接铺路"
  new_hooks:
    - "官方会如何回应伊甸泄露？"
    - "母亲是否会把公开材料与自己的症状完全对上？"
    - "王磊和小张会如何对待训练中心和陈屿？"
    - "A-E-03为什么在公共线路停运时增载？"

must_happen:
  - "开篇必须直接承接第22章20:11至20:20的撤回时限，陈屿不回复撤回，不能跳到第二天早上"
  - "20:30必须由既有记者/公益人类渠道发布材料，不得写成织网者一键全网公开"
  - "公开材料必须包含五类可核验内容：UBI/配给药筛选、免费体检入组、逆龄副作用/器官恶化、EDN/伊甸编号、医疗AI不予干预日志"
  - "不得公开陈秀兰姓名或完整编号，但必须保留PY-2207批次关联，让私人风险仍然存在"
  - "王磊必须发现家人/孩子或亲属药盒上的相邻批号，反应应是具体追问，不是口号"
  - "小张必须认出医疗AI日志格式与训练中心工作相同，将泄露压回陈屿的工作环境"
  - "母亲必须通过社区群或截图看到伊甸消息，认出自己去过的健康中心；陈屿不能继续完全隐瞒批号关联"
  - "母亲不得立即掌握陈屿从假材料、B区失约到非人交易的全部行动"
  - "公开链接必须先扩散、被截图和转存，然后才出现限流和删除，不能一发布就毫无人看到"
  - "必须展示至少四种阻断方式：通讯限流/群组禁言、区间车停运、跨区门禁校验、健康中心关闭/公共广播疏散"
  - "必须有一批普通人到达C区健康服务中心外，他们带药盒、体检单或家属记录要求核对，但不写成暴乱"
  - "陈屿必须亲自尝试到达或帮助人群核对，不能只坐在屏幕前看舆论"
  - "沈医生/B区可发来一条体面的关联风险通知，但不写成公开暴力威胁"
  - "结尾必须在公共交通/能源快照中出现A-E-03独立节点负载上升和‘应急预启动’，不完整解释方舟"

tension_curve:
  - {position: 0, value: 9, note: "20:20撤回时限过去，材料锁定发布"}
  - {position: 18, value: 9, note: "伊甸材料公开，受试者、冷链合同和AI日志同时出现"}
  - {position: 38, value: 8, note: "同事和社区居民在自己药盒上找到对应批号"}
  - {position: 56, value: 9, note: "母亲看到消息并认出健康中心，陈屿被迫承认关联"}
  - {position: 74, value: 9, note: "聚集与核对尝试被通讯、交通和门禁切散"}
  - {position: 90, value: 8, note: "少量人到达健康中心外，只得到高温疏散广播"}
  - {position: 100, value: 10, note: "公共线路降载，A-E-03进入应急预启动"}

key_scenes:
  - "20:20家中：陈屿不输入撤回，发布队列锁定"
  - "20:30公开页：去名编号链、逆龄症状、冷链合同和医疗AI建议日志并列"
  - "训练中心工作群：王磊发药盒照片追问批号，小张认出日志格式"
  - "家中：母亲从社区群看到截图，指出图里是自己去过的健康中心"
  - "陈屿承认PY-2207批次相关，但不能确认母亲已经接受逆龄试验"
  - "扩散受阻：原文链接被限流，截图继续流动，群组被禁言"
  - "出门赶往C区：区间车停运，陈屿换步行/短途交通，门禁要求额外健康校验"
  - "健康中心外：普通人带药盒和体检单要求查记录，现场无工作人员，只有广播疏散"
  - "结尾快照：C区公共能源和交通降载，A-E-03独立负载上升"

公开材料处理:
  - "发布标题可用《免费体检之后：伊甸二期受试者名单》或同等克制标题，不要用霸道热搜标题"
  - "文章只公开部分证据，不完整解释伊甸高层、方舟、两种AI或林远"
  - "社会反应以截图、药盒、体检单、家属消息和门口追问表现，避免使用‘全网沸腾’等空泛概括"

environment_constraints:
  - "环境描写占比10%-15%，服务夜间传播、高温阻断和健康中心门外的无力感"
  - "家中最多保留三个锚点：手机发布页、母亲的药盒、社区群截图"
  - "外出场景最多保留四个锚点：停运站牌、跨区校验门、健康中心关闭玻璃门、循环广播"
  - "不铺陈大规模街景和暴乱场面，人群规模保持数十人"

写作要求:
  - 字数: 4200-5200字
  - 基调: 公开后的震动、具体愤怒、系统性无力、冷结尾
  - 视角: 陈屿第三人称有限视角；通过消息、群聊和现场看见他人反应
  - 节奏: 撤回时限、公开发布、个人核对、母子对话、传播受阻、外出核对、A-E-03冷钩子
  - 重点: 让每个人在自己的药盒和体检单上发现真相；让行动失败来自基础设施权限，不是人们没有愤怒
  - 对话: 普通人只问具体问题：批号是不是同一批、为什么查不到记录、药还能不能吃
  - 段落: 公开材料摘要用中段组织，群消息不连续堆成日志，现场关键追问可短段

避免:
  - "不要开篇写第二天早上"
  - "不要让泄露变成无来源的热搜或织网者一键投放"
  - "不要用‘全网炸了’、‘所有人都愤怒了’等空泛句子"
  - "不要写成大规模暴乱、冲击建筑或武装镇压"
  - "不要让母亲突然知道非人交易、假材料和陈屿所有行动"
  - "不要让陈屿因材料公开而获得胜利感或安全"
  - "不要提前完整揭示方舟、独立AI核心、冬眠舱或林远身份"
  - "不要出现‘第xx章’式正文callback"

红线提醒:
  - "P0: 禁止明显AI腔、感悟式结尾、上帝视角"
  - "P0: 禁止提前明牌方舟全貌、冬眠舱用途、林远身份或两类AI完整历史"
  - "P1: 避免群聊记录堆砌、社会新闻综述腔、口号化普通人和纯界面操作"
  - "P2: 用药盒批号、体检单、停运站牌、关闭玻璃门和能源负载快照承载主题"
