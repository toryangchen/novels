key_scenes:
  - "回家：陈屿开门，屋里很暗，母亲坐在沙发上不动"
  - "失神：母亲眼神空洞，叫了几声才有反应，事后不记得"
  - "针孔：陈屿帮母亲倒水时看到手臂内侧的细小淤痕，排列整齐"
  - "诊所：工作人员微笑解释'常规监测反应'，拒绝提供详情"
  - "查询：陈屿在深夜用工作终端比对批号，数字在屏幕上排列"
  - "发现：批号结构与CY-7-4419-A等编号的格式高度相似"

配给药批号设计:
  - 配给药包装上只有批号，没有厂家信息
  - 批号格式：如 DP-7-2841-B
  - 与特殊样本编号 CY-7-4419-A 的相似点：
    - 中间的"7"一致
    - 编号递增格式一致
    - 末尾的字母后缀一致
  - 不同点：前缀不同（DP vs CY），可能代表不同子系统

母亲状态设计:
  - 短暂失神约持续十秒，眼神空洞，嘴唇微动但不出声
  - 恢复后不记得刚才发生了什么
  - 手臂内侧有三处细小淤痕，直径约两毫米，排列近似等距
  - 母亲说去诊所拿药时被"顺便查了一下"
  - 陈屿追问，母亲只说"量血压"，但淤痕不在常规抽血位置

诊所场景设计:
  - 社区诊所不大，灯光偏白，空气有消毒水味
  - 工作人员是中年女性，态度温和，回答用系统话术
  - "配给药经过严格审核，副反应在可控范围内"
  - "您的家人被纳入常规健康监测，这是免费福利"
  - 陈屿问具体做了什么检查，对方说"系统自动执行，我只负责登记"
  - 陈屿想看记录，被告知"居民无权限查看医疗监测档案"

写作要求:
  - 字数: 5000-6000字
  - 基调: 压抑、私人化、恐惧逐渐升温
  - 视角: 陈屿第三人称有限视角
  - 节奏: 慢→快→慢→快，家庭场景舒缓，发现异常后加速，诊所场景压抑，查询批号时紧张
  - 重点: 母亲的异常状态、针孔淤痕、批号格式的发现
  - 避免: 不要让陈屿过早得出"人体实验"的结论，他目前只是感到"不对劲"

红线提醒:
  - P0: 不要用AI词汇（"众所周知"、"不言而喻"等）
  - P0: 不要用感悟式结尾（"他明白了..."、"她终于懂得..."）
  - P0: 不要用上帝视角（"所有人没想到..."）
  - P1: 避免套路化表达、流水账、抽象心理描写
  - P2: 注意细节打磨、画面感、节奏感
  - P2: 母亲的失神和针孔要写得具体、有画面感，不要用"她感到不舒服"这种抽象表达
