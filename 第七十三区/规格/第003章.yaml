chapter: 3
title: "配给药"
summary: >
  陈屿下班回家，发现母亲服用社区配给药后出现短暂失神，
  手臂上还多了几处细小的针孔样淤痕。母亲说是去社区诊所拿药时"顺带检查了一下"。
  陈屿去诊所询问，工作人员用系统话术搪塞，说是"常规反应"。
  晚上，陈屿用工作终端查询配给药的批号，
  发现批号编码格式与白天训练数据中"特殊样本"的编号结构高度相似。
  追查从职业好奇心变成了私人恐惧。

before_state:
  characters:
    - name: "陈屿"
      state: "发现医疗AI训练数据中的特殊样本，保存了三条编号，开始对系统产生疑问"
      location: "下班回家途中"
    - name: "母亲"
      state: "身体不好，依赖社区配给药，日常服用后有犯困、心跳慢等副作用"
      location: "家中"
    - name: "林远"
      state: "留下第七十三区门禁卡，说过'今晚不一样'的停电预告"
      location: "训练中心（不在场）"
  plot_hooks:
    - "陈屿保存的三条特殊样本编号：CY-7-4419-A、CY-7-4420-A、CY-7-4437-A"
    - "林远留下的第七十三区门禁卡"
    - "医疗AI模型建议'不予干预'，备注'完整观察窗口'"
    - "母亲的配给药副作用"
  world_state: >
    第二章结束时，陈屿握着第七十三区门禁卡离开训练中心。
    林远说"今晚不一样"——暗示停电。陈屿心中已有疑问，但尚未采取行动。

after_state:
  characters:
    - name: "陈屿"
      state: "确认母亲的配给药批号与特殊样本编号结构一致，追查动机从职业升级为私人"
      location: "家中"
    - name: "母亲"
      state: "服用配给药后出现失神和针孔淤痕，被陈屿发现但本人不以为意"
      location: "家中"
  plot_advances:
    - "母亲的配给药批号与特殊样本编号格式相似，个人线与医疗异常线交汇"
    - "陈屿确认社区诊所对配给药副作用的解释不可信"
    - "陈屿开始主动查询配给药来源，越过'只是工作'的边界"
  new_hooks:
    - "配给药与特殊样本之间的编码关联"
    - "母亲手臂上的针孔淤痕——不是口服药该有的痕迹"
    - "社区诊所的'常规反应'话术"

must_happen:
  - "陈屿回家发现母亲短暂失神，状态异常"
  - "陈屿发现母亲手臂上的针孔样淤痕"
  - "社区诊所用系统话术解释为常规反应，不提供具体信息"
  - "陈屿用工作终端查询配给药批号，发现编码格式与特殊样本编号相似"
  - "追查动机从职业好奇升级为私人恐惧"

