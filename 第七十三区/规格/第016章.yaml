chapter: 16
title: "选择记录"
summary: >
  母亲正式纳入长期观察序列后，陈屿确认自己已经无法通过流程保护她。
  沈医生仍在复核假材料，林远继续外勤失联，留给陈屿的时间越来越短。
  他回到本地缓存和第七十三区旧数据层，重新整理此前保存的母亲编号、特殊样本记录、配给药批号、
  EDN腕带照片、长期观察序列回执以及医疗AI的历史建议。通过比对字段，他抓到一条真正能说明问题的证据：
  某些样本在风险上升时，医疗AI建议并非治疗，而是“延迟干预/不予干预/继续观察”，并且这些建议与观察窗口、
  配给药方案和长期观察序列相互关联。陈屿意识到如果自己继续把证据藏在本地，沈医生一旦拆穿假材料，
  所有东西都会被收走或抹掉。他不再试图寻找一个安全的完整出口，而是把记录切成多份：字段说明、编号链、
  截图、腕带照片、流程回执、时间线，分别投给不同渠道。章末，第一批分片离开他的设备，他收到一个没有署名的
  接收回执或投递成功提示。陈屿不知道谁会看到这些记录，只知道记录已经不只在他手里。

before_state:
  characters:
    - name: "陈屿"
      state: "母亲已入长期观察序列；手里仍有真腕带、完整缓存、本地截图、A-E/ARK边缘线索；沈医生仍在复核假材料"
      location: "家中、训练中心、第七十三区旧数据层"
    - name: "母亲"
      state: "已纳入长期观察序列，等待两周后随访；仍相信流程会带来更多照顾"
      location: "家中"
    - name: "沈医生"
      state: "未公开拆穿假材料，但已提醒可能需要补充说明或面谈"
      location: "消息中、公共健康合作方"
    - name: "林远"
      state: "状态栏变为外勤，审批人为空；对陈屿的消息仍未读或不回复"
      location: "未知"
    - name: "潜在接收者"
      state: "可能包括记者、公益医疗申诉邮箱、地下论坛、旧同事、匿名投递箱；尚未与陈屿建立信任"
      location: "网络与现实渠道中"
  plot_hooks:
    - "第十五章母亲入组，观察编号LT-OBS-20530614-0047已生效"
    - "第十二章真腕带和完整记录仍在陈屿手里，假U盘/假束带随时可能露馅"
    - "第十章特殊样本来自UBI人群，医疗AI曾建议继续观察"
    - "第十四章ARK/A-E边缘显示公共健康外还有更高权限系统，但第十六章不继续解释"
    - "F014陈屿保存编号将在本章升级为主动散布记录"
  world_state: >
    第二卷卷末前，陈屿从被动调查者转为主动破坏记录封锁的人。
    本章可以让医疗AI“不予干预/延迟干预/继续观察”的关键证据浮出，
    但不能完整公开伊甸真相，也不能让社会立刻爆炸。证据散出去后，
    第十七章才进入“地下网络精准传播”的后果。

after_state:
  characters:
    - name: "陈屿"
      state: "完成第一轮分片散布；知道自己已经越过安全线，无法再假装只是保护母亲"
      location: "家中或训练中心返程路上"
    - name: "母亲"
      state: "仍在长期观察序列中，对陈屿夜里忙碌只理解为工作压力"
      location: "家中"
    - name: "沈医生"
      state: "复核压力继续逼近；可以发来面谈安排或补充材料提醒"
      location: "消息中"
    - name: "林远"
      state: "仍不解释；可以出现一次状态变化或未读消息，不救场"
      location: "未知"
    - name: "证据分片"
      state: "已经离开陈屿本地设备，分散到多个渠道；后果尚未显现"
      location: "匿名邮箱、实体投递点、离线存储、公开申诉端口等"
  plot_advances:
    - "陈屿抓到医疗AI延迟/不予干预建议与长期观察、配给药、样本编号之间的关键关联"
    - "陈屿从保存证据转为主动散布证据，人物弧光推进"
    - "母亲入组后的私人压力转化为公开风险"
    - "为第十七章地下网络精准传播和多方利用证据做前置"
    - "沈医生假材料倒计时继续存在，推动陈屿不能慢慢等"
  new_hooks:
    - "谁会收到这些分片？为什么会被精准转发？"
    - "沈医生是否会发现陈屿已经散布证据？"
    - "分片证据是否足够让外界拼出伊甸线索？"
    - "林远是否早知道陈屿会走到这一步？"

must_happen:
  - "开篇必须承接第十五章：母亲长期观察序列已生效，沈医生材料复核仍悬着"
  - "母亲必须在日常中出现，不能被剧情工具化；她仍不知道陈屿在做什么"
  - "陈屿必须重新整理本地证据：母亲编号、长期观察编号、配给药批号、EDN腕带、特殊样本记录、医疗AI建议"
  - "必须出现关键证据：医疗AI对某些样本给出'延迟干预'、'不予干预'或'继续观察'，且与观察窗口/长期观察/配给药链条相关"
  - "证据获取方式要合理：基于陈屿此前保存的缓存、本地截图、第七十三区旧数据层和训练师权限边缘，不要黑客开挂"
  - "陈屿必须意识到完整证据包集中在自己手里太危险，单点保存会被沈医生/系统抹除"
  - "必须设计分片散布：不同片段去不同渠道，单个片段不足以暴露全部，但组合后能形成证据链"
  - "分片内容至少包括四类：编号链、截图/字段说明、腕带或EDN照片、母亲入组回执/时间线、医疗AI建议日志"
  - "必须出现陈屿对接收渠道的谨慎选择：记者、公益医疗申诉、匿名论坛、线下投递、旧数据层死信箱等，不要一次性全网公开"
  - "沈医生必须再次施压：消息或系统提示要求面谈/补充说明/材料核验时间，形成倒计时"
  - "林远不能提供答案；可以只保持外勤、未读，或出现一次普通状态变化"
  - "结尾必须是记录离开陈屿本地：第一批发送成功/投递完成/离线包寄出，并出现一个微妙回执或无署名接收提示"

tension_curve:
  - position: 0
    value: 8
    note: "母亲入组已生效，沈医生复核倒计时逼近"
  - position: 20
    value: 8
    note: "陈屿整理本地证据，发现长期观察编号能接上样本链"
  - position: 42
    value: 9
    note: "医疗AI延迟/不予干预建议成为关键证据"
  - position: 62
    value: 8
    note: "陈屿设计分片，决定不再保存完整单点证据"
  - position: 82
    value: 9
    note: "沈医生面谈/补充说明消息抵达，迫使陈屿立刻发送"
  - position: 100
    value: 9
    note: "第一批分片离开本地，陈屿越过安全线"

key_scenes:
  - "家中夜里：母亲睡下或整理药盒，陈屿看着LT-OBS回执和本地文件夹"
  - "证据重排：陈屿把母亲编号、配给药批号、特殊样本编号、EDN腕带照片、观察序列编号放到同一时间线"
  - "第七十三区旧数据层/训练中心：陈屿用低权限和缓存查找医疗AI历史建议，找到'继续观察/延迟干预/不予干预'"
  - "关键比对：一条样本风险上升却被建议继续观察，备注含观察窗口或配给药调整"
  - "单点风险：陈屿意识到完整证据包只在自己手里，一旦面谈或设备被收走，记录会再次消失"
  - "分片设计：他给不同片段命名、去标识化、保留可验证编号，避免单个渠道拿到全部"
  - "渠道选择：匿名邮箱、实体U盘、公共申诉端口、旧数据层死信箱、可信记者线索箱中选择2-4个"
  - "沈医生倒计时：消息提醒明日面谈/补充材料核验/请携带原件"
  - "发送/投递：第一批分片离开本地设备，陈屿删除发送端痕迹但保留纸质/离线校验串"
  - "结尾回执：某个渠道返回'已接收'或一个没有署名的校验码，暗示第十七章的精准传播"

证据设计:
  - "核心证据不是完整真相，而是足以让外界追问的链条"
  - "编号链：HC母亲编号、LT-OBS长期观察编号、PY配给药批号、特殊样本编号、EDN腕带编号"
  - "字段链：观察窗口、风险稳定性、延迟反应、服从度、继续观察、不予干预"
  - "时间线：基础体检、优先关怀激活、补充评估、长期观察入组、沈医生复核"
  - "证据不能写成一键爆料成功；只能让记录离开陈屿手中"

母亲线处理:
  - "母亲本章不崩溃、不知情；她可以提醒陈屿睡觉、吃饭或问他是不是工作太忙"
  - "她的药盒、回执单、随访提醒是陈屿行动的私人动因"
  - "不要让母亲成为旁白工具，她的普通反应要刺痛陈屿"

沈医生处理:
  - "沈医生不正面摊牌假材料，但要让陈屿知道时间不多"
  - "可用消息：明日请携带原件面谈、材料需补充说明、复核进入下一步"
  - "语气保持礼貌专业，不要威胁"

林远处理:
  - "林远不解释不救场"
  - "可以让状态栏继续'外勤'，审批人为空，或陈屿发出的消息仍未读"
  - "不要出现林远给出散布方案"

信息揭露边界:
  - "可以明确医疗AI存在延迟/不予干预建议"
  - "可以把长期观察、配给药、特殊样本和医疗AI建议建立证据链"
  - "不能完整解释伊甸计划组织架构、方舟计划、冬眠舱、AI阵营或林远身份"
  - "不能让社会本章就爆炸；传播后果放到第十七章"

environment_constraints:
  - "本章环境描写必须服务证据整理、时间压力和越线动作，整体占比控制在10%-15%左右"
  - "家中最多保留3个环境锚点：药盒、塑料袋/回执单、旧终端或工具箱"
  - "训练中心/旧数据层只写与权限、缓存、发送痕迹有关的细节"
  - "不要铺陈城市、天气、交通或办公室环境；除非用于体现投递/离线行动风险"
  - "如果一段环境描写删掉后不影响证据链或行动压力，应不写"

写作要求:
  - 字数: 4200-5200字
  - 基调: 冷峻、克制、越线、倒计时
  - 视角: 陈屿第三人称有限视角
  - 节奏: 入组余波开局、证据整理推进、关键日志抬高、分片设计、沈医生倒计时、发送冷收束
  - 重点: 写出陈屿从保存者变成散布者；不是胜利，而是失去退路"
  - 对话: 少量，母亲生活化，沈医生消息体面；其他接收渠道不拟人化
  - 段落: 数据比对不要堆成百科，关键字段和发送结果可单独成段

避免:
  - "不要写成黑客大战、破解高权限系统或一键曝光全网"
  - "不要让证据立刻引发社会舆论爆炸"
  - "不要让林远帮忙或解释"
  - "不要让沈医生暴力威胁或直接摊牌假腕带"
  - "不要继续大篇幅追查方舟/ARK"
  - "不要提前明牌两种AI、引导体、自然觉醒者、林远身份"
  - "不要让陈屿显得掌握终极真相；他只是把足够危险的问题送出去"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P0: 不要提前明牌方舟全貌、冬眠舱用途、两种AI、林远真实身份"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免连续用'他发现/他意识到/他觉得'推进"
  - "P1: 避免把证据链写成设定百科，要用编号、截图、文件命名和发送动作承载"
  - "P2: 用校验串、离线包、分片命名、发送回执制造真实感"
