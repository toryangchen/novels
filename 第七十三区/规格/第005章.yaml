chapter: 5
title: "被删除的人"
summary: >
  陈屿带着第七十三区里拍下的模糊照片回到家，试图追查那条提示"该记录不存在"的医疗附件。
  他先用母亲的样本编号 DP-7-2603-A 做参照，又从残损照片里辨认出一个相邻编号 DP-7-2598-A。
  继续追查时，他发现与这个相邻编号相关的一名女性患者正在被层层抹掉：
  社区医疗档案、户籍索引、消费记录、通讯记录都显示为空或权限不足。
  他通过残留的线下地址找到患者曾经住过的旧楼，那里只剩邻居模糊的记忆：
  "她好像年轻了很多。"
  章末陈屿发现手机里部分照片被自动损坏，只剩一张灰衣维修工的侧影仍然清晰。

before_state:
  characters:
    - name: "陈屿"
      state: "发现第七十三区是跨系统异常归档区，拍下时间轴、E-04项目、灰衣维修工等线索；母亲相关医疗附件被系统提示'该记录不存在'"
      location: "训练中心门口，天亮后准备回家"
    - name: "母亲"
      state: "在家中睡觉，不知道陈屿夜里外出；已被长期观察组和配给药线索牵连"
      location: "家中"
    - name: "林远"
      state: "没有露面；此前留下门禁卡和'今晚不一样'的提示，真实意图不明"
      location: "训练中心或未知位置"
  plot_hooks:
    - "第七十三区中的母亲相关医疗记录附件提示：该记录不存在"
    - "样本编号 DP-7-2603-A 与母亲过去一年的配给药批号序列有关"
    - "残损照片里出现相邻样本编号 DP-7-2598-A，疑似同一批观察对象"
    - "E-04项目的样本筛选标准"
    - "灰衣维修工在多个异常现场出现，微笑模式一致"
    - "纸条：你以为你在找答案"
    - "陈屿手机里保存的第七十三区照片可能无法安全带出"
  world_state: >
    第四章结束时，陈屿从旧数据层回到地面，发现口袋里多了一张陌生纸条。
    他已经确认系统异常跨越医疗、物流、能源、金融、安防等领域，
    但尚不知道是谁在抹记录，也不知道第七十三区本身是否在监控他。

after_state:
  characters:
    - name: "陈屿"
      state: "确认'记录不存在'不只是下载拦截，而是现实身份和社会痕迹正在被系统性抹除；开始意识到数字记录和现实存在之间的边界很脆弱"
      location: "旧城区一栋低层居民楼外"
    - name: "母亲"
      state: "仍在家中，状态暂时平稳；陈屿开始担心她也可能被同样方式抹除或转移"
      location: "家中"
    - name: "被删除的女性患者"
      state: "系统记录中消失，现实住处已空；邻居只残留模糊记忆，称她曾经'好像年轻了很多'"
      location: "曾住在旧城区，当前去向不明"
  plot_advances:
    - "第七十三区的'不存在'从系统提示升级为现实层面的身份抹除"
    - "陈屿第一次线下走访异常对象，追查从屏幕进入现实街区"
    - "引出身体年龄异常伏笔，但不解释实验机制，不说出完整计划名称"
    - "陈屿确认有人或某个系统会主动清理与实验对象相关的社会痕迹"
    - "手机照片被部分损坏，说明陈屿带出的证据并不可靠"
  new_hooks:
    - "被删除女性患者的去向：她是死亡、转移，还是成为系统外的人？"
    - "邻居提到的'年轻了很多'意味着什么？"
    - "为什么灰衣维修工的照片没有损坏，反而保留下来？"
    - "纸条是谁塞的，它是在提醒陈屿还是操控陈屿？"

must_happen:
  - "陈屿回家后先确认母亲状态，不能让母亲知道他夜里去了训练中心"
  - "陈屿检查手机照片，发现第七十三区照片模糊、缺帧或部分损坏，但仍能辨认几个关键词"
  - "陈屿用母亲的 DP-7-2603-A 做参照，从残损照片里辨认出相邻编号 DP-7-2598-A"
  - "陈屿用个人终端或工作终端尝试追查 DP-7-2598-A 相关记录，遇到空白、权限不足、记录不存在等不同层级的阻断"
  - "陈屿发现一名女性患者的医疗记录、户籍索引、消费记录、通讯记录互相对不上，像被从系统里抽掉"
  - "陈屿不能只在电脑前查，必须去线下地址走访"
  - "线下地址是一栋旧城区居民楼或社区安置楼，环境要和精英区/训练中心形成对比"
  - "陈屿找到患者曾经住过的房间，房间已空或被重新登记，门牌、快递柜、邻里记忆留下残痕"
  - "邻居说出关键句：'她好像年轻了很多'，但不能给出完整解释"
  - "章末陈屿发现手机照片进一步损坏，只剩灰衣维修工侧影清晰，形成下一章钩子"

tension_curve:
  - position: 0
    value: 5
    note: "天亮回家，陈屿疲惫、母亲仍睡，现实暂时安静但压着第四章纸条"
  - position: 15
    value: 6
    note: "检查照片，发现证据模糊和缺失，说明地下层的数据不能轻易带出"
  - position: 35
    value: 7
    note: "线上追查 DP-7-2598-A，系统返回空白、权限不足、记录不存在，阻力逐层加重"
  - position: 55
    value: 6
    note: "陈屿转为线下走访，旧城区高温、破败、居民麻木，节奏稍慢但压抑"
  - position: 75
    value: 8
    note: "门牌、快递柜、邻居记忆互相矛盾，确认被删除的人在现实中确实留下过痕迹"
  - position: 90
    value: 9
    note: "邻居说她'好像年轻了很多'，逆龄伏笔第一次落地"
  - position: 100
    value: 8
    note: "照片损坏，只剩灰衣维修工侧影清晰，钩子收束到第006-007章"

key_scenes:
  - "回家确认母亲：母亲在闷热房间里睡着，手臂针孔仍在，陈屿把门禁卡和纸条藏好"
  - "照片检查：手机相册里的第七十三区照片出现色块、黑斑、时间戳错乱，像被静默处理过"
  - "线上追查：陈屿输入 DP-7-2598-A，系统先显示缓存残影，再跳为空记录；不同系统给出互相矛盾的状态"
  - "身份空洞：医疗档案显示无此人，户籍索引显示迁出，消费记录停在三个月前，通讯账号显示注销"
  - "线下地址：旧城区安置楼，楼道闷热、广告残破、快递柜有失效取件码，门牌处有撕掉标签的胶痕"
  - "旧房间：房间已换锁或空置，门缝里有清洁剂气味，墙上残留更换过的门禁码贴纸"
  - "邻居记忆：邻居不确定她叫什么，只记得她以前是六十多岁，后来有一阵看起来像四十多岁，眼神却更空"
  - "证据反噬：陈屿离开后发现手机照片进一步损坏，只有灰衣维修工的侧影和一点标准微笑还清楚"

患者线索设计:
  - 不要让这名患者等同于母亲；她是母亲线的预演和警告
  - 可设定为女性，六十岁以上，UBI领取者，曾住旧城区安置楼
  - 系统里不要直接写实验名称，只通过邻居记忆和旧照片差异暗示
  - 邻居记忆应模糊、口语化、带迟疑：不确定名字，不确定年龄，只确定"不太对"
  - 可留下一个生活残痕：旧快递单、社区体检通知角、门缝里的药盒包装、过期取件码

查询阻断设计:
  - 医疗系统：无此档案或档案已归档，普通用户无权限
  - 户籍系统：迁出，但迁出目的地为空
  - 消费系统：三个月前后突然停止
  - 通讯系统：账号注销，注销申请来源为"系统自动清理"
  - 社区系统：住户状态从"长期观察"变成"非本辖区人员"
  - 所有阻断都要像正常行政流程，不要写成黑客大战或弹窗威胁

写作要求:
  - 字数: 5000-6000字
  - 基调: 闷热、疲惫、现实恐怖、低声压迫
  - 视角: 陈屿第三人称有限视角
  - 节奏: 快→慢→快→慢→冷收束；照片损坏和线上追查较快，线下走访放慢，用现实细节制造压迫，邻居一句话抬高张力
  - 重点: 把"记录不存在"写成现实恐怖，不要停留在技术查询；要让读者感到一个人可以被系统从社会中擦掉
  - 对话: 线下走访的对话要短、含混、生活化；邻居不要像解释设定的人
  - 证据: 陈屿只能拿到残片，不能拿到完整证据链

避免:
  - 不要直接说完整计划名、实验名或真相总结，只能暗示
  - 不要让陈屿过早推导出完整阴谋；他只确认"有人被删除了"
  - 不要写成动作追逐或黑客攻防，本章恐怖来自空白记录和现实残痕
  - 不要让林远出面解释；若出现，只能以未接电话、消息未读、远处背影等形式轻触
  - 不要让母亲病情在本章大爆发，母亲线保持悬着，为第008-009章加压

红线提醒:
  - P0: 不要用AI词汇（"众所周知"、"不言而喻"等）
  - P0: 不要用感悟式结尾（"他明白了..."、"她终于懂得..."）
  - P0: 不要用上帝视角（"所有人没想到..."）
  - P1: 避免套路化表达、流水账、抽象心理描写
  - P1: 避免把邻居写成说明书式证人
  - P2: 注意高温环境、旧楼气味、屏幕残影、门牌胶痕等具体细节
  - P2: 移动端段落要短中交替，发现节点可短段，查询和走访过程不要全是一句一段
