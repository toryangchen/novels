chapter: 20
title: "林远撒谎"
summary: >
  第十九章后，陈屿没有答应织网者的交易，也没有提交沈医生要求的书面说明。
  第二天早上，林远结束外勤回到训练中心，状态栏恢复正常，像这几天的失踪从未发生。
  陈屿违背织网者“不要通过林远”的警告，带着灰衣维修工影像、TM-000、旧门禁卡和A-E-03线索当面质问。
  林远先用正常工作解释回避，随后明确声称自己只是在陈屿第一次保存异常编号后才注意到他，
  从未接触TM-000维护节点，也不知道灰衣维修工影像来源。陈屿拿出影像时间戳和门禁卡底层编号，
  证明至少有一项说法不成立。林远没有承认，只说“相似不等于同一”，并反问陈屿是否愿意把母亲交给一个
  能删除她全部记录的存在。对话使两人的信任第一次真正破裂。章末，陈屿收到织网者短讯：他说谎了，
  但不是你以为的那一句。

before_state:
  characters:
    - name: "陈屿"
      state: "与织网者直接对话；知道匿名提醒、材料转发和灰衣影像来自同一非人意识；尚未接受救母交易；掌握林远微笑和TM线索"
      location: "家中、训练中心"
    - name: "林远"
      state: "长期外勤后即将回归；真实身份未明；可能知道织网者正在追踪自己"
      location: "训练中心/未知"
    - name: "织网者"
      state: "要求第七十三区完整索引，提出让母亲成为系统外之人的交换；警告不要通过林远"
      location: "受限网络"
    - name: "母亲"
      state: "长期观察资料复核中；现实状态稳定；不知道陈屿面对的交易"
      location: "家中"
    - name: "沈医生"
      state: "书面说明期限逼近；材料复核将转入人工"
      location: "消息/B区"
  plot_hooks:
    - "灰衣维修工与林远微笑、动作模式相似，但脸和骨相不同"
    - "旧门禁卡由林远留下，来源字段为空"
    - "TM-000、A-E-03和灰衣维修工影像形成连续线索"
    - "织网者说自己找林远比陈屿更久"
    - "第020章必须出现林远第一次可识别的明确谎言"
  world_state: >
    陈屿已经确认织网者具有人格，但尚不知道织网者、人类精英和林远背后的未知来源构成怎样的阵营。
    本章只推进林远疑点和信任破裂，不揭晓林远真实身份，不完整解释两种AI。

after_state:
  characters:
    - name: "陈屿"
      state: "确认林远至少说了一处可验证的谎言；不再把林远视为可信同事，但仍无法判断其立场"
      location: "训练中心外/返家路上"
    - name: "林远"
      state: "首次明确撒谎；知道织网者已直接接触陈屿；仍不承认身份"
      location: "训练中心"
    - name: "织网者"
      state: "通过短讯确认林远撒谎，却指出谎言不在陈屿以为的位置"
      location: "匿名通知接口"
    - name: "母亲"
      state: "长期观察状态仍在复核，书面说明期限未解除"
      location: "家中"
  plot_advances:
    - "陈屿与林远关系从怀疑进入信任破裂"
    - "林远确认自己知道织网者接触和删除记录方案，却不解释消息来源"
    - "灰衣影像、门禁卡和TM-000被放在同一场对质中"
    - "为第021章织网者追踪林远并触发抹除铺路"
  new_hooks:
    - "林远究竟在哪一句上撒了更大的谎？"
    - "林远为什么知道织网者提出的救母方案？"
    - "织网者会不会因追踪林远再次越界？"
    - "陈屿是否会接受删除母亲记录的交易？"

must_happen:
  - "开篇承接第十九章次日早晨：织网者交易未答复，沈医生书面说明期限逼近"
  - "林远必须自然回到训练中心，不写成戏剧化现身"
  - "陈屿必须主动违背'不要通过林远'的警告，当面质问"
  - "对质证据至少包括三项：灰衣维修影像、TM-000、旧门禁卡/A-E-03"
  - "林远必须给出一个具体、可验证、后来被证据戳破的谎言"
  - "林远必须说出'相似不等于同一'，但这句话不能成为唯一回避"
  - "林远必须知道织网者的救母交易，令陈屿确认两者互相察觉"
  - "林远不能承认真实身份，不能解释两种AI或自然觉醒者"
  - "沈医生/母亲线至少出现一次，保持现实倒计时"
  - "结尾织网者短讯指出：林远确实撒谎，但陈屿判断错了谎言所在"

tension_curve:
  - {position: 0, value: 8, note: "交易与书面说明双重倒计时"}
  - {position: 20, value: 7, note: "林远正常返岗，表面平静"}
  - {position: 45, value: 9, note: "陈屿拿出灰衣影像和TM线索质问"}
  - {position: 68, value: 9, note: "具体谎言被门禁/维护记录戳破"}
  - {position: 86, value: 9, note: "林远说出织网者救母交易，信任破裂"}
  - {position: 100, value: 9, note: "织网者提示真正谎言另有所在"}

key_scenes:
  - "家中清晨：母亲药盒和书面说明期限并置，陈屿仍未选择"
  - "训练中心：林远恢复正常排班，像外勤从未异常"
  - "空会议室/设备间：陈屿展示灰衣影像和工作证对比"
  - "TM-000质问：林远否认接触维护节点"
  - "门禁卡证据：卡片底层编号/维护记录证明林远说法至少一处不成立"
  - "救母交易反问：林远准确说出删除母亲记录的代价"
  - "相似不等于同一：林远拒绝承认灰衣维修工身份"
  - "冷收束：织网者短讯说明林远撒谎，但不是陈屿以为的那一句"

林远对话规则:
  - "语气保持平静、正常、具体，不做长篇谜语式发言"
  - "撒谎时不要突然反派化；谎言服务于隐藏来源和保护自身路径"
  - "可以反问陈屿是否愿意接受织网者交易，但不能替他选择"
  - "不能承认自己就是灰衣维修工或说明身体来源"

织网者处理:
  - "本章不长篇对话，只在结尾用短讯介入"
  - "织网者对林远有追踪欲和恐惧，为第021章越界做动机"
  - "陈屿仍不知道织网者任务代号"

environment_constraints:
  - "环境描写服务对质、倒计时和信任破裂，占比控制在10%-15%"
  - "家中最多保留药盒、手机期限两个锚点"
  - "训练中心最多保留空工位恢复使用、会议室玻璃/门禁终端三个锚点"
  - "不铺陈通勤、天气和办公楼外观"

写作要求:
  - 字数: 4200-5200字
  - 基调: 克制、对质、信任破裂、危险平静
  - 视角: 陈屿第三人称有限视角
  - 节奏: 双重倒计时开局、林远返岗、证据对质、谎言被戳破、救母交易反问、织网者冷钩子
  - 对话: 陈屿问具体事实，林远答得平静但回避核心；避免谜语堆砌

避免:
  - "不要提前确认林远真实身份"
  - "不要完整解释两种AI或自然觉醒者"
  - "不要让林远突然承认一切"
  - "不要把对质写成肢体冲突"
  - "不要出现第xx章式元叙事callback"
  - "不要让母亲知道交易和面谈"

红线提醒:
  - "P0: 禁止明显AI腔、感悟式结尾、上帝视角"
  - "P0: 禁止提前明牌林远身份、两种AI、方舟全貌或冬眠舱"
  - "P1: 避免谜语人对话、重复callback和抽象心理"
