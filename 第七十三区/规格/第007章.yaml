chapter: 7
title: "监控回看"
summary: >
  陈屿利用第七十三区门禁卡重新进入旧数据层，绕过训练系统的普通权限，
  调取与灰衣维修工相关的异常现场监控。他看到东南亚港口、欧陆停电街区、
  北美医疗分诊区和本城旧楼清理现场里，都出现过类似的维修人员或仿真维护体。
  这些人的身份记录在当时都显示正常，但事后不是过期、撤销，就是归属到不存在的外包队伍。
  陈屿注意到他们外貌、年龄、装备都有细微差别，却共享同一种停顿、头部倾斜和标准微笑。
  他暂时判断：有人在使用仿真身体做跨区域行动。
  章末，他的监控查询被系统记入审计，第一次正式警告开始逼近。

before_state:
  characters:
    - name: "陈屿"
      state: "刚被林远一句'如果不是人在操纵呢'撬开原有推理；已尝试在训练系统搜索灰衣维修工但权限不足；手里有第七十三区门禁卡"
      location: "训练中心走廊或旧数据层入口附近"
    - name: "母亲"
      state: "仍在家中，身体暂时平稳；陈屿的追查开始间接威胁到她"
      location: "家中"
    - name: "林远"
      state: "上一章出现后离开；没有解释门禁卡、纸条或第七十三区"
      location: "训练中心或未知"
    - name: "灰衣维修工"
      state: "目前只是第七十三区照片和记录中的共同异常点；尚未确认是人、仿真体还是别的接口"
      location: "多个异常现场影像中"
  plot_hooks:
    - "灰衣维修工照片在其他照片损坏时反而保留"
    - "第七十三区旧数据层可能有普通系统查不到的监控索引"
    - "林远问：如果不是人在操纵呢？"
    - "灰衣维修工与北美、欧陆多起异常现场的面部特征高度相似，微笑模式一致"
    - "陈屿的查询可能已经被内部审计记录"
    - "第八章将进入内部监察与母亲强制体检线"
  world_state: >
    陈屿已经确认异常跨医疗、物流、能源、金融和安防等系统。
    他仍处在错误但合理的中间判断里：背后可能有人类组织或内部权限人员在操纵。
    第七十三区不是公开数据库，而像旧系统留下的异常归档层。
    正文只能让读者看见影像和记录矛盾，不能直接解释AI阵营或涌现机制。

after_state:
  characters:
    - name: "陈屿"
      state: "看到多个异常现场的灰衣维修人员影像，开始怀疑有人使用仿真身体或维护壳做跨区域行动；同时留下非法查询记录"
      location: "旧数据层终端前，或离开训练中心的雨夜"
    - name: "母亲"
      state: "没有直接出场或只以陈屿未接来电/家中消息轻触；她将成为第八章被威胁的弱点"
      location: "家中"
    - name: "林远"
      state: "本章不正面解释；最多以陈屿记忆中的微笑或走廊里一瞬间的相似感出现"
      location: "不固定"
    - name: "灰衣维修工/仿真维护体"
      state: "从单一照片升级为多现场、多身份、同一行为模式的异常线索"
      location: "东南亚港口、欧陆街区、北美医疗分诊区、本城旧楼等监控残片"
  plot_advances:
    - "陈屿第一次拿到多段灰衣维修人员现场影像，而不只是文字备注或照片"
    - "确认关键地点出现过疑似仿真机器人或维护体，身份记录当时正常、事后异常"
    - "灰衣维修工线从'同一个人'扩展为'多个身体共享同一种行为模式'"
    - "陈屿形成新的中间假设：有人用仿真身体作为跨区域行动工具"
    - "陈屿的查询触发审计记录，为第八章内部监察约谈铺路"
  new_hooks:
    - "这些维护体究竟是被谁使用，还是自己在执行某种选择？"
    - "为什么不同外貌的人会有几乎相同的微笑和停顿？"
    - "第七十三区为什么允许陈屿看到这些影像？"
    - "审计记录生成后，训练中心会怎样处理陈屿？"

must_happen:
  - "承接第六章结尾：陈屿带着门禁卡重新进入旧数据层或旧监控索引，而不是重新写大量理论推理"
  - "陈屿搜索'灰衣维修工'失败后，要换成更系统化的关键词：维护人员、现场修复、临时外包、仿真维护体、异常现场非任务人员等"
  - "陈屿至少调出四段监控残片：东南亚港口暴雨、欧陆停电街区、北美医疗分诊区、本城旧楼或社区清理现场"
  - "每段监控都要有具体系统异常和现场动作，不要只写'他出现了'"
  - "监控里的维修人员外貌不能完全相同：年龄、脸型、身高、工具箱、制服细节可以不同"
  - "共同点必须具体：固定停顿、头部轻微偏转、看向摄像头之外的位置、唇角上扬角度、离开路线避开所有后续摄像头"
  - "身份记录必须呈现'当时正常、事后不正常'：临时工号有效、外包队伍存在、授权工单通过；回看时工号撤销、队伍无注册、工单来源为空"
  - "陈屿要把'同一个人'的判断修正为'同一类身体或同一套行为模板'"
  - "陈屿可以短暂联想到林远的微笑，但必须立即压下或否定，不在本章做正式比对"
  - "章末必须触发审计：系统显示查询被记录、审计编号生成、或访问原因被自动提交复核"
  - "结尾不要写内部监察直接登场，把压力留到第八章"

tension_curve:
  - position: 0
    value: 6
    note: "雨前闷热，陈屿带着门禁卡回到旧数据入口，延续第六章的未解问题"
  - position: 15
    value: 7
    note: "普通关键词搜索无结果，陈屿换用旧索引分类，第一次打开异常现场监控池"
  - position: 35
    value: 8
    note: "东南亚港口与欧陆停电片段连续出现，维修人员身份当时都合法"
  - position: 55
    value: 8
    note: "北美医疗和本城旧楼片段把线索拉回医疗与母亲线，陈屿发现行为模式相同"
  - position: 70
    value: 7
    note: "陈屿尝试建立仿真身体假设，理性推理让恐惧短暂降温"
  - position: 85
    value: 9
    note: "他在冻结帧里看到一个近似林远的微笑，但没有证据，只能压下"
  - position: 100
    value: 9
    note: "系统弹出审计记录，非法查询正式进入流程，收束到第八章第一次警告"

key_scenes:
  - "旧数据层入口：雨云压低，训练中心走廊比白天更空，陈屿刷第七十三区门禁卡进入旧索引"
  - "检索失败：灰衣维修工无结果，仿真机器人权限不足，陈屿改用维护工单和异常现场人员交叉检索"
  - "东南亚港口片段：暴雨、废弃道路、无人货车绕行，灰衣维修人员站在禁止通行标识旁，工单显示道路积水传感器维护"
  - "欧陆停电片段：街区短时黑场，备用电源切换失败前，一名灰衣人员从变电箱旁经过，身份为临时线路检查员"
  - "北美医疗片段：分诊区拥堵，救护车分流算法短暂停顿，一名维护人员推着清洁设备穿过禁入走廊，工号事后被注销"
  - "本城旧楼片段：社区清理队进入某栋旧楼，门牌被换下，一个穿灰色工装的人抬头看向楼道摄像头之外的位置"
  - "行为比对：陈屿不靠旁白总结，而是把冻结帧、时间戳、工单有效期、离开路线摆在同一屏"
  - "林远微笑轻触：某一帧的唇角弧度让陈屿想起林远，但他用'相似不等于同一'把念头压回去"
  - "审计弹窗：系统没有威胁，只显示访问类型、查询范围、审计编号和'已提交复核'"

监控片段设计:
  - name: "东南亚港口暴雨"
    purpose: "承接第四、第五章灰衣维修工照片，确认照片不是孤立残片"
    anomaly: "十七辆无人货车绕行废弃道路，物流系统没有记录手动干预"
    gray_figure: "灰色雨衣、旧工具箱、半张脸被雨水和帽檐遮住"
    identity_record: "临时维护工单有效，外包单位事后显示未注册"
  - name: "欧陆停电街区"
    purpose: "把能源异常和现场身体接口连起来"
    anomaly: "局部街区在十九秒内进入监控盲区，备用电源切换记录互相矛盾"
    gray_figure: "较高、脸更窄，穿灰色反光维修服，停在变电箱旁两秒"
    identity_record: "身份为线路检查员，回看时工号已被系统回收"
  - name: "北美医疗分诊区"
    purpose: "把灰衣线拉回医疗系统，贴近母亲线"
    anomaly: "救护车分流算法短暂停顿，一名样本对象被留在观察窗口内"
    gray_figure: "推清洁设备，左手戴旧式检修腕带，经过禁入门时没有被拦截"
    identity_record: "门禁显示授权通过，但授权来源为空"
  - name: "本城旧楼清理"
    purpose: "把远方异常拉到陈屿所在城市，制造贴身威胁"
    anomaly: "社区住户状态批量更新，一间曾有长期观察记录的房间被改为待清洁"
    gray_figure: "本地清理队制服，身高较矮，抬头角度与前三段一致"
    identity_record: "清理队名单里没有此人，现场摄像头却标注其为'已登记人员'"

灰衣维修工处理:
  - "本章可以确认不是简单的同一个自然人跨城市移动，而是多个身体或多个身份壳共享同一行为特征"
  - "不要确认他们是涌现者身体，也不要使用'涌现者'这个词"
  - "不要让灰衣维修工在线下正面出现，本章只通过监控残片和系统记录推进"
  - "微笑必须写成细节：唇角角度、眼周无变化、停顿时间、头部偏转，而不是抽象地说'诡异'"
  - "林远相似感只能轻触：陈屿可以想起他，但不能得出结论，也不要把截图拿去正式比对"
  - "陈屿的假设仍要保持错误空间：'有人使用仿真身体'合理，但不是最终答案"

审计触发设计:
  - "审计提示要冷静、行政化，不要弹出威胁语"
  - "推荐呈现字段：访问范围、异常现场数量、跨区域监控调用、访问理由、审计编号、复核状态"
  - "陈屿可以尝试关闭窗口，但审计编号已经生成"
  - "系统可以要求他填写访问理由，他还没写完，理由框自动保存"
  - "结尾最后一屏建议落在'已提交复核'或'审计记录已生成'"

写作要求:
  - 字数: 3800-4300字
  - 基调: 冷、压抑、监控感、雨夜临近的潮湿感
  - 视角: 陈屿第三人称有限视角
  - 节奏: 入口短促、监控片段密集、比对放慢、审计弹窗冷收束
  - 重点: 用影像、时间戳、工单、门禁记录证明异常，不靠旁白解释设定
  - 对话: 本章可以几乎无对话；如果出现值班人员或系统提示，对话必须短、行政化
  - 段落: 移动端短中交替；监控发现节点可短段，连续比对和环境描写应合并成2-4句
  - 细节: 屏幕反光、雨点、旧索引卡顿、监控水痕、工单有效期、工号撤销时间要具体

避免:
  - "不要直接解释AI阵营、涌现者、自然觉醒者、引导体或伊甸计划真相"
  - "不要确认灰衣维修工就是林远，林远疑点只作为极轻的相似感"
  - "不要写成动作追逐、黑客大战或系统攻防"
  - "不要让陈屿一次拿到完整证据链；他只能拿到足够危险的残片"
  - "不要让灰衣维修工与陈屿在线下对视或交手"
  - "不要让内部监察提前登场；第七章只到审计触发"
  - "不要堆太多监控片段，四段足够，必要时第五段只作为列表中闪过的残影"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免连续用'他发现/他意识到/他觉得'推进推理"
  - "P1: 避免把监控片段写成设定说明书，每个片段都要有现场动作"
  - "P2: 注意监控画面和现实环境的冷暖对比，别让全章只有屏幕信息"
  - "P2: 结尾用冷静系统提示制造压力，不用感叹和总结"
