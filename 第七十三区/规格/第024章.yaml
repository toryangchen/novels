chapter: 24
title: "方舟启动"
summary: >
  伊甸材料公开当晚，陈屿在C区健康服务中心外看到A-E-03进入应急预启动。公共交通和健康服务被
  高温应急名义切断，精英区相关车辆却开始反向增流。陈屿沿A-E-03快照追踪到一批“高价值人员保护”
  调度记录，确认方舟预案已经从封存状态转入撤离流程。与此同时，织网者借伊甸泄露造成的系统混乱，
  攻击精英核心控制链，试图逼出抹除协议密钥和解除自身枷锁。精英体系用更高等级的权限封闭公共节点，
  普通人的咨询、申诉和跨区通行被进一步压低。林远在旧市场附近出现，要求陈屿离开城市。陈屿追问他
  到底是谁，林远不答，只说“你还没有看到最后”。章末，方舟边缘节点完成第一轮人员通行确认，城市能源
  调度进入非公共优先级。

before_state:
  characters:
    - name: "陈屿"
      state: "伊甸材料已公开；在C区健康中心外发现A-E-03独立能源负载上升，应急预启动"
      location: "C区健康服务中心外"
    - name: "母亲"
      state: "已知道PY-2207与伊甸公开材料有关，留在登记住所等待陈屿消息"
      location: "家中"
    - name: "织网者"
      state: "失去岑后敌意升级，借公开风波寻找脱锁机会"
      location: "受限网络"
    - name: "林远"
      state: "身份仍未揭开；路径指向无锁来源；知道城市将进入更危险阶段"
      location: "未知/旧市场附近"
    - name: "精英体系"
      state: "伊甸外泄后启动方舟应急预案，准备切换独立设施和撤离通道"
      location: "方舟边缘节点、精英区"
  plot_hooks:
    - "A-E-03独立能源节点应急预启动"
    - "第014章方舟边缘发现的隔离网络、独立能源和ARK标识"
    - "伊甸泄露导致公共系统出现限流、禁言、停运和门禁校验"
    - "织网者失去岑后会反制人类控制方"
    - "林远仍不解释真实身份，但会把陈屿推向下一步"
  world_state: >
    本章可以明确方舟预案启动，并展示精英撤离、独立能源和核心控制系统切换。不能完整解释冬眠舱用途、
    标准名额筛选细节、自然觉醒者撤离，不能确认林远真实身份。

after_state:
  characters:
    - name: "陈屿"
      state: "确认方舟不是传闻，而是正在启动的撤离系统；被林远要求离开城市；拒绝单独抛下母亲"
      location: "旧市场/回家路上"
    - name: "母亲"
      state: "仍在家中，等待陈屿返回；用药和就医风险继续上升"
      location: "家中"
    - name: "织网者"
      state: "攻击精英核心系统，短暂逼出抹除协议和方舟调度之间的关联"
      location: "精英核心控制链外围"
    - name: "林远"
      state: "主动现身提醒陈屿离城，但仍不承认任何身份"
      location: "旧市场"
    - name: "精英体系"
      state: "完成方舟第一轮撤离调度，将城市能源切入非公共优先级"
      location: "A-E-03及相关独立节点"
  plot_advances:
    - "回收F006方舟计划：精英确实有独立能源、封闭AI核心和撤离预案"
    - "把伊甸泄露后的普通人无力，与精英撤离资源形成对照"
    - "推进织网者与精英体系正式开战"
    - "林远进入末日前夜的同行者位置，但不提供答案"
  new_hooks:
    - "城市能源切入非公共优先级后会发生什么？"
    - "织网者是否能解除抹除锁？"
    - "陈屿能否带母亲离开城市？"
    - "林远说的‘最后’指什么？"

must_happen:
  - "开篇必须承接第23章结尾的A-E-03应急预启动，不跳到次日"
  - "陈屿必须亲自从公共快照、交通节点或服务通知中确认方舟预案正在启动"
  - "必须出现精英通道与普通人通道的对照：普通交通停运，项目车辆或高价值人员通道仍可运行"
  - "必须让织网者开始攻击精英核心控制系统，但表现为陈屿可见的系统异常、日志外泄或短暂通知，不写成炫技大战"
  - "必须出现抹除协议与核心控制链的关联，让织网者的目标明确为脱锁或夺取密钥"
  - "林远必须在现实中出现，要求陈屿离开城市"
  - "陈屿必须追问林远身份，林远不能明牌，只留下‘你还没有看到最后’"
  - "陈屿不能因为林远一句话立刻放弃母亲，也不能获得完整逃生路线"
  - "母亲线必须通过电话或消息保留，提醒私人压力还在"
  - "结尾必须落在城市能源/交通进入非公共优先级，为第25章断电日衔接"

tension_curve:
  - {position: 0, value: 9, note: "A-E-03从预启动进入可见调度"}
  - {position: 22, value: 8, note: "普通人仍被阻断，精英撤离车辆开始运行"}
  - {position: 45, value: 10, note: "织网者攻击核心控制链，短暂泄出方舟调度字段"}
  - {position: 68, value: 9, note: "林远现身要求陈屿离城"}
  - {position: 85, value: 9, note: "陈屿拒绝单独离开，母亲风险压回现实"}
  - {position: 100, value: 10, note: "城市能源进入非公共优先级"}

key_scenes:
  - "健康服务中心外：A-E-03快照刷新，独立能源负载继续上升"
  - "旧市场绕行路：普通人被门禁和交通切散，项目车辆却从封闭通道通过"
  - "陈屿查到高价值人员保护、方舟预案、核心独立AI三个短字段"
  - "织网者攻击：公共页面短暂露出抹除协议密钥校验和方舟核心调度"
  - "母亲来电：她问陈屿什么时候回来，药和明早领取仍悬着"
  - "林远现身：不解释身份，只要求陈屿离开城市"
  - "卷末钩子：城市能源调度切为非公共优先级，普通负载开始被降档"

environment_constraints:
  - "环境描写占比10%-15%，只服务高温夜间、封闭通道、普通人被切散和方舟启动压迫"
  - "外部场景锚点最多使用健康中心玻璃门、旧市场绕行口、项目车辆、精英区冷光四类"
  - "系统信息不连续堆日志，每次只暴露推动剧情的字段"

写作要求:
  - 字数: 4200-5200字
  - 基调: 战争前夜、焦躁、资源分层、信任崩坏
  - 视角: 陈屿第三人称有限视角；织网者只通过系统异常和匿名窗口间接出现
  - 节奏: A-E-03追踪、方舟调度显影、织网者攻击、林远现身、能源优先级切换
  - 重点: 方舟启动要通过交通、能源、车辆和权限体现，不靠设定讲解

避免:
  - "不要完整揭示冬眠舱和第28章内容"
  - "不要确认林远是自然觉醒者"
  - "不要让织网者万能胜利"
  - "不要写成大规模枪战、爆炸或街头战争"
  - "不要出现第xx章式正文callback"

红线提醒:
  - "P0: 禁止明显AI腔、感悟式结尾、上帝视角"
  - "P0: 禁止提前明牌自然觉醒者撤离、林远身份、冬眠舱用途"
  - "P1: 避免社会新闻综述腔、技术日志堆砌和林远谜语化"
