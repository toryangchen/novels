chapter: 13
title: "林远的空白"
summary: >
  第十二章交易后，陈屿用假腕带和处理过的副本只买到一点时间。母亲的优先关怀通道已激活，
  但这条通道到底是治疗还是更高等级观察仍不清楚。林远连续缺席，工位干净得像无人使用，
  这让陈屿第一次把怀疑从精英医疗体系转向身边这个长期递线索的人。他用低风险方式调查林远：
  查公司履历、门禁记录、租房登记、公共生活消费痕迹和同事记忆。所有记录都完整、合法、格式正确，
  却没有生活留下的噪声。陈屿趁夜去林远登记住处查看，发现房间像样板间：有家具、有衣物、有牙刷、
  有冰箱和水杯，但几乎没有磨损、气味、垃圾、旧物和个人习惯。章末，陈屿在住处或门口发现一处微小线索：
  林远像是故意留下一个可被他发现的空白，让他意识到自己不是偶然查到这里，而是被允许查到这里。

before_state:
  characters:
    - name: "陈屿"
      state: "已与沈医生交易，交出处理过的U盘和仿造腕带；真腕带和完整记录仍在手里；知道自己只买到一点时间"
      location: "家中、训练中心"
    - name: "母亲"
      state: "优先关怀通道已激活，可能收到指定医疗机构评估提醒；把它当成好事，仍不知道交易内容"
      location: "家中"
    - name: "林远"
      state: "第十二章缺席，工位空着；长期以来在关键节点留下线索，但从不解释"
      location: "训练中心记录中、登记住处、未知"
    - name: "沈医生/公共健康合作方"
      state: "已收到陈屿交出的不完整材料，尚未明确反馈真假；交易压力仍悬在陈屿头上"
      location: "B区或系统通知中"
    - name: "同事"
      state: "王磊、小张等人仍在正常工作，可提供对林远的普通记忆：能力强、话少、从不参与生活话题"
      location: "训练中心"
  plot_hooks:
    - "林远第十二章关键时刻缺席"
    - "林远曾留下第七十三区门禁卡，并用一句话引导陈屿打破'人类黑客'推理"
    - "灰衣维修工多次出现在异常现场，微笑模式与林远相似"
    - "沈医生知道陈屿去过旧城区，说明现实路径也被追踪"
    - "陈屿交出的假腕带可能很快被识破"
    - "第十三章需要继续埋设F010：林远一直把线索放到陈屿够得着的位置"
  world_state: >
    第二卷继续保持表层敌人为精英医疗体系，AI阵营真相仍在阴影里。
    本章不能明说林远是自然觉醒者，也不能解释仿真身体，只能通过履历过度完整、
    生活痕迹空白、住处样板化和林远似乎主动留下可查入口来制造非人感。

after_state:
  characters:
    - name: "陈屿"
      state: "确认林远身份记录完整但生活痕迹异常空白；对林远的信任转为主动怀疑，准备继续追踪其与灰衣维修工的关系"
      location: "林远登记住处外、返家路上或家中"
    - name: "母亲"
      state: "优先关怀通道评估时间逼近；她希望陈屿陪同，给第十四/十五章母亲线继续施压"
      location: "家中"
    - name: "林远"
      state: "仍未正面解释；可能通过一条迟来的消息、空白回执或房间里的细节证明他知道陈屿来过"
      location: "未知"
    - name: "沈医生"
      state: "假腕带尚未引爆或只发来温和确认提醒，形成倒计时"
      location: "消息/系统通知中"
  plot_advances:
    - "陈屿第一次主动调查林远个人身份，而不是只接受其递来的线索"
    - "林远的履历完整却缺少生活噪声，非人感从气质升级为证据"
    - "住处像样板间，强化'完整伪装但没有真正生活'的疑点"
    - "林远似乎留下可被发现的空白，暗示陈屿的调查也在被引导"
    - "为第十四章追踪更高权限痕迹/方舟边缘做心理和线索铺垫"
  new_hooks:
    - "林远的履历是谁生成或维护的？"
    - "林远是否知道陈屿交出的是假腕带？"
    - "林远和灰衣维修工是否是同一类存在，或使用同一套身份/身体？"
    - "住处里留下的空白是疏漏，还是故意给陈屿看的入口？"
    - "母亲的优先关怀通道会把她带向哪里？"

must_happen:
  - "开篇必须承接第十二章：陈屿知道假腕带迟早可能露馅，母亲绿色通道评估通知继续施压"
  - "林远必须继续缺席或短暂出现后消失，不能正面解释"
  - "陈屿调查林远的方式要谨慎：用公司内网低权限资料、公开租房登记、门禁历史、同事闲谈、离线截图，不要写成黑客开挂"
  - "林远履历必须完整、合法、格式正确：入职记录、考勤、租房合同、缴费、培训记录都存在"
  - "异常点不是'没有记录'，而是记录太干净：无迟到、无投诉、无快递误投、无医疗小记录、无消费碎片、无邻里记忆"
  - "必须出现同事对林远的普通评价：能力强、话少、准时、从不谈家人、从不参加饭局或生活闲聊"
  - "陈屿必须找到林远登记住处，不要通过暴力闯入；可用物业维修通告、门缝、门禁尾随、短暂开门机会、公共区域观察进入或窥见"
  - "住处要像样板间：有必要家具和生活用品，但缺少使用痕迹；不要写成恐怖屋"
  - "必须出现至少三个生活空白细节：牙刷干净、鞋底无灰、冰箱只有规则排列的水、衣柜衣物尺码/颜色过度统一、垃圾桶空、床单无褶皱、无旧票据"
  - "必须有一处能连接前文的微小线索：灰色维修服纤维、旧工具箱同款划痕、门禁卡白色标签残胶、TM-000端口贴纸、或与林远微笑相关的影像停帧"
  - "陈屿不能得出'林远不是人'的明牌结论，只能承认：林远不像一个真正生活在这里的人"
  - "结尾必须让陈屿感到自己也许是被允许查到这里：林远发来一句普通消息，或房间里留着一张空白便签/未锁抽屉/朝向门口的椅子"
  - "章末钩子指向第十四章：林远空白背后连接更高权限痕迹、独立能源/封闭设施/项目边缘，但不能直接说方舟"

