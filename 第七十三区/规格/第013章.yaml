    value: 7
    note: "假腕带随时可能暴露，母亲绿色通道评估逼近，林远仍缺席"
  - position: 20
    value: 7
    note: "陈屿低风险调查林远履历，发现记录完整得不自然"
  - position: 40
    value: 8
    note: "同事闲谈和门禁/消费痕迹互相印证：林远有身份但缺生活"
  - position: 60
    value: 8
    note: "陈屿找到林远登记住处，样板间般的生活空白落地"
  - position: 82
    value: 9
    note: "住处出现与灰衣维修工或第七十三区线有关的微小线索"
  - position: 100
    value: 8
    note: "林远似乎知道陈屿来过；陈屿意识到自己被允许发现这些空白"

key_scenes:
  - "家中/早晨：母亲收到优先关怀评估预约，想让陈屿请假陪她；陈屿想到假腕带和沈医生"
  - "训练中心：林远工位仍然整洁空着，系统显示请假或外勤，但没有正常交接痕迹"
  - "低权限查询：陈屿查看林远入职、培训、考勤、绩效和租房登记，记录完整得像模板"
  - "同事闲谈：王磊或小张说林远从不迟到、从不聚餐、从不抱怨、从不提家里人"
  - "生活痕迹比对：陈屿查到林远没有普通人的小错误、小消费、小医疗记录或社区互动"
  - "前往住处：陈屿用物业维修或门禁尾随等低冲突方式接近林远登记住处"
  - "样板间住处：家具齐全，水杯、牙刷、衣物、冰箱都有，但都像为了通过检查而存在"
  - "微小线索：一处灰衣维修工/旧工具箱/TM-000/门禁卡标签残胶相关细节出现"
  - "被允许的感觉：陈屿发现某处抽屉、门锁、记录或便签留得太方便，不像疏漏"
  - "结尾消息：林远发来一句普通话，例如'你今天请假了吗？'或'别迟到。'，让陈屿确认对方知道他在查"

林远调查设计:
  - "履历完整：身份证明、学历、入职、社保、租房、水电缴费都存在"
  - "异常不在缺失，而在缺少噪声：没有旧账单、没有朋友留言、没有购物误差、没有拖延、没有生活偏好"
  - "陈屿要用职业方法看出异常：不是凭感觉，而是比对普通同事记录里的自然杂质"
  - "不要让陈屿一次拿到核心秘密；本章只把怀疑从'林远有秘密'推到'林远不像普通人'"

住处设计:
  - "不是阴森恐怖，而是过分合格、过分干净、过分刚好"
  - "每个物件都像在回答'一个人类住处应该有什么'，但没有长期使用磨损"
  - "环境锚点控制：恒温、无气味、整齐水瓶/牙刷/衣物、垃圾桶空，最多选2-3个反复承担线索"
  - "可以有一件与前文呼应的小物：灰色纤维、工具箱划痕、门禁卡标签纸、维护端口编号"

母亲线处理:
  - "母亲把优先关怀当成好事，不要让她理解阴谋"
  - "她可以提醒陈屿请假陪诊，制造时间压力"
  - "绿色通道不在本章落地治疗，只作为第十五章母亲入组的前置压力"

沈医生/假腕带处理:
  - "沈医生不要正面登场；可以只通过一条温和消息或未回执保持压力"
  - "假腕带不能被立即验证通过；陈屿知道它只是拖延"
  - "如果出现消息，措辞应体面：'材料已收到，感谢配合。后续请保持通讯畅通。'"

信息揭露边界:
  - "可以暗示林远身份非普通人：履历过净、住处无生活痕迹、似乎预留可查入口"
  - "禁止明说林远是自然觉醒者、仿真身体、AI、观察者或实验主持者"
  - "禁止解释灰衣维修工真实机制，只能保留相似工具、标签、门禁或微笑模式"
  - "禁止引出方舟、冬眠舱、两种AI等后续明牌设定；第十四章才进入更高权限痕迹"

environment_constraints:
  - "本章环境描写必须服务线索、压迫感和人物处境，整体占比控制在10%-15%左右"
  - "住处场景最多保留3个环境锚点：恒温无味、整齐水瓶/牙刷、无磨损家具或空垃圾桶"
  - "不要铺陈楼盘、街景、天气或装潢；除非它说明'生活痕迹空白'"
  - "训练中心环境只写林远工位、记录权限、同事反应等与调查相关细节"
  - "如果一段环境描写删掉后不影响线索理解或人物压力，应不写"

写作要求:
  - 字数: 4200-5200字
  - 基调: 冷静、怀疑、空白感、生活伪装下的不安
  - 视角: 陈屿第三人称有限视角
  - 节奏: 交易余压开局、低风险调查推进、住处场景放慢、微小线索抬高张力、冷钩子收束
  - 重点: 写出'记录完整'比'记录缺失'更可疑；写出住处像为检查生成的生活
  - 对话: 同事闲谈要生活化；林远若发消息，必须普通、短、含义可疑
  - 段落: 数据调查合并成中段，关键空白和住处发现可短段突出

避免:
  - "不要把林远写成谜语人正面出场讲答案"
  - "不要直接写'林远不是人'或'林远是AI'"
  - "不要让住处变成恐怖片场景或秘密基地"
  - "不要让陈屿非法黑入高权限系统开挂"
  - "不要把本章写成纯数据查询，必须有现实住处场景"
  - "不要让母亲绿色通道本章就完整兑现"
  - "不要忘记假腕带只是拖延，陈屿仍在倒计时里"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P0: 不要提前明牌林远真实身份、方舟、冬眠、两种AI"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免连续用'他发现/他意识到/他觉得'推进"
  - "P1: 避免把履历调查写成设定百科"
  - "P2: 用工位空白、完整履历、无磨损住处、空垃圾桶和普通消息承载不安"
