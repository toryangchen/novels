chapter: 14
title: "方舟边缘"
summary: >
  陈屿从林远住处发现的 TM-000 标签底膜和第十三章的消息入手，追踪维护端口背后的权限路径。
  他发现 TM-000 不只是公共健康维护网关的一次性端口，而是被一组更高权限项目借用过的边缘维护节点。
  这些节点连接着独立能源、医疗冷链、封闭网络和一处不出现在普通地图上的设施。系统里偶尔露出的项目名不是“伊甸”，
  而是“方舟”或 ARK。陈屿不能进入核心，只能通过能源调度、接驳车路线、维护工单和一段被遮蔽的平面图看见它的边缘：
  一处服务少数人的后路正在城市边界运行。与此同时，母亲的优先关怀评估推进，她被要求补充检查，为第十五章“母亲入组”施压。
  章末，陈屿确认方舟不是普通避难项目，也不是公共医疗设施；它有独立能源和封闭AI接口，而林远似乎早就把他引到这条线旁边。

before_state:
  characters:
    - name: "陈屿"
      state: "调查林远后发现其履历完整但生活痕迹空白；在林远住处看到TM-000标签底膜；知道林远知道他来过"
      location: "家中、训练中心、城市边缘"
    - name: "母亲"
      state: "优先关怀通道评估已激活，等待补充检查或指定机构通知；仍把绿色通道理解为好事"
      location: "家中、指定医疗机构"
    - name: "林远"
      state: "没有正面解释；用一条普通消息证明他知道陈屿调查过住处"
      location: "未知、消息中"
    - name: "沈医生/公共健康合作方"
      state: "已收到陈屿交出的不完整材料和假腕带；尚未公开拆穿，仍保持温和压力"
      location: "B区/系统消息"
    - name: "方舟边缘设施"
      state: "尚未被陈屿完整识别；只通过能源调度、维护工单、接驳路线和项目缩写露出"
      location: "精英区边缘、产业核心区外围或城市地下设施入口"
  plot_hooks:
    - "TM-000维护端口连接第十一章逃出者邮件和第十三章林远住处标签底膜"
    - "第十二章沈医生知道陈屿现实路径，说明维护/公共健康系统被更高权限追踪"
    - "林远住处像被故意留出入口，暗示陈屿被允许查到下一层"
    - "母亲绿色通道已激活，可能不是治疗而是升级筛选"
    - "F006方舟计划需要在第十四章埋设：独立能源、封闭设施、精英后路"
    - "F017方舟边缘的非官方冬眠舱需要开始埋设，但不能说明未来用途"
  world_state: >
    第二卷从人体实验推进到精英后路的边缘。读者可以第一次看到“方舟”作为项目名或缩写出现，
    但不能得到完整解释。正文只展示边缘证据：独立能源调度、封闭维护网络、冷链/医疗/休眠相关词残片、
    不对公众开放的接驳路线和异常权限。不要提前进入方舟核心，也不要解释冬眠舱最终作用。

after_state:
  characters:
    - name: "陈屿"
      state: "确认有一套独立于公共健康体系的方舟边缘设施；拿到或记下项目缩写、能源节点和封闭接口线索"
      location: "返程路上或家中"
    - name: "母亲"
      state: "被要求进入补充检查/长期评估前置流程；更接近第十五章入组"
      location: "家中或指定医疗机构"
    - name: "林远"
      state: "仍不解释；可能用一句普通消息把陈屿从方舟边缘拉回母亲线，保持观察者姿态"
      location: "未知"
    - name: "沈医生"
      state: "可能发来材料复核提醒，暗示假腕带拖延时间有限"
      location: "消息/系统通知"
  plot_advances:
    - "TM-000从维护端口升级为更高权限项目边缘节点"
    - "方舟计划首次以边缘证据出现，连接独立能源、封闭设施和精英后路"
    - "陈屿发现公共健康、伊甸和方舟之间存在资源/接口共享，但仍不知道全貌"
    - "母亲绿色通道向补充检查推进，为第十五章母亲入组做前置"
    - "林远引导感继续增强：他没有直接帮忙，却让陈屿刚好够到下一层线索"
  new_hooks:
    - "方舟到底是什么？为什么公共健康维护端口会接到它的边缘？"
    - "独立能源节点服务的是医疗设施，还是另一套避难系统？"
    - "封闭AI接口为什么不接入公共网络？"
    - "母亲的优先关怀评估是否会把她送进长期观察组？"
    - "沈医生什么时候发现假腕带？"

must_happen:
  - "开篇必须承接第十三章：陈屿带着TM-000标签底膜线索和林远消息，回到母亲评估压力中"
  - "必须出现沈医生或系统的温和提醒，暗示陈屿交出的材料还在复核，假腕带只是拖延"
  - "陈屿调查TM-000要低风险、分层推进：维护工单、公共健康网关、能源配额、接驳路线、地图空白，不要黑客开挂"
  - "必须发现TM-000被更高权限借用过，普通公共健康接口只能看到边缘字段"
  - "必须出现'方舟'或'ARK'作为项目名/缩写，但不能完整解释计划"
  - "必须出现独立能源线索：普通城区限电或配额紧张时，某个边缘节点仍保持高功率/恒温/冷链"
  - "必须出现封闭网络或独立AI接口线索，但只能作为字段/接口名/访问失败提示，不要解释AI阵营"
  - "必须有现实场景：陈屿追踪接驳路线或维护车，到达精英区边缘/产业核心区外围/地下设施入口附近"
  - "现实场景不能写成潜入成功；陈屿只能远远观察、拍下标识、记住车牌或从公共屏/维护牌看到残片"
  - "必须出现一处方舟边缘视觉线索：独立电源标识、无公共门牌的医用冷链口、地下入口、封闭接驳车、或'ARK-EDGE'维护牌"
  - "母亲线必须推进：她收到补充评估/长期评估/指定机构复查要求，陈屿无法拒绝"
  - "林远可以不出场；若出现，只能通过一句普通消息或曾经留下的线索推动，不可解释"
  - "结尾必须冷收束：陈屿确认自己只看见方舟边缘，而母亲正被公共健康系统推向下一步"

tension_curve:
  - position: 0
    value: 7
    note: "假腕带复核压力、母亲评估推进、TM-000线索未解"
  - position: 20
