key_scenes:
  - "家中：母亲整理评估材料，社区应用弹出补充评估或指定机构提醒"
  - "沈医生消息：材料已收到，仍在复核，请保持通讯畅通；语气礼貌但制造倒计时"
  - "训练中心/家中低风险查询：陈屿用TM-000反查维护工单，只看到公共健康网关和几条被上级权限遮住的记录"
  - "能源异常：某个ARK-EDGE/方舟边缘节点在限电时段仍有稳定高功率、冷链和恒温负载"
  - "接驳路线：公共健康车辆或冷链车从体检中心/精英区边缘驶向地图上没有门牌的位置"
  - "现实追踪：陈屿搭公共交通或步行到产业核心区外围，远远观察封闭入口和维护车辆"
  - "边缘标识：维护牌、车身小字或闸口终端出现ARK/方舟/EDGE/独立能源等残片"
  - "访问失败：陈屿在低权限界面看到封闭AI接口/独立核心字段，点击后提示无访问权限或离线隔离"
  - "母亲通知：评估结果要求她进入补充检查或长期评估前置流程"
  - "结尾：陈屿把方舟边缘线索和母亲通知并排放在屏幕上，意识到两条线都在把他往下一层推"

方舟边缘设计:
  - "本章只写边缘，不写核心：维护节点、能源接口、冷链入口、接驳车、封闭网络字段"
  - "可以出现'ARK-EDGE'、'方舟边缘维护'、'独立能源节点'等残片"
  - "不要直接解释精英末日避难、冬眠舱用途、最终幸存路径"
  - "让读者感觉这里不像公共医疗设施：不挂公共健康牌、不开放预约、不接入普通地图"

母亲线处理:
  - "母亲仍把绿色通道理解为治疗机会"
  - "她可以因为评估流程变多而焦虑花钱/麻烦陈屿，但不能理解阴谋"
  - "补充检查措辞要温和：长期评估、优先关怀复核、风险稳定性确认"
  - "为第十五章母亲被纳入长期观察组做铺垫，不要本章就完全入组"

林远处理:
  - "林远不解释，不救场"
  - "可以通过上一章消息余波、住处TM-000标签、或一句新消息形成引导感"
  - "不要让林远说谜语或给答案"

信息揭露边界:
  - "可以明示方舟/ARK是一个更高权限项目名或设施边缘"
  - "可以暗示独立能源、封闭网络、医疗冷链、休眠/低温相关字段"
  - "禁止完整解释方舟计划、冬眠舱、精英逃生全貌"
  - "禁止引出引导体、自然觉醒者、两种AI等第三卷核心设定"
  - "禁止说明林远真实身份"

environment_constraints:
  - "本章环境描写必须服务线索、压迫感和人物处境，整体占比控制在10%-15%左右"
  - "现实边缘设施场景最多保留3个环境锚点：冷链口、独立电源标识、无门牌闸口/封闭接驳车"
  - "不要铺陈城市街景、产业园建筑或天气；除非用于对比普通限电与独立供能"
  - "训练中心/家中环境只写与查询、母亲通知和倒计时压力有关的细节"
  - "如果一段环境描写删掉后不影响线索理解或行动压力，应不写"

写作要求:
  - 字数: 4200-5200字
  - 基调: 冷峻、边缘窥见、权限压迫、私人压力并行
  - 视角: 陈屿第三人称有限视角
  - 节奏: 母亲通知和复核压力开局、TM-000查询推进、中段现实追踪、方舟边缘线索抬高、母亲线冷收束
  - 重点: 写出陈屿只能看见边缘，不能进入核心；方舟是比伊甸更高一层的后路痕迹
  - 对话: 少量，母亲生活化，沈医生消息体面，林远若发消息必须短且普通"
  - 段落: 数据查询不要全碎句，关键字段/访问失败/边缘标识可单独成段

避免:
  - "不要写成动作潜入或黑客突破"
  - "不要让陈屿进入方舟核心"
  - "不要一次性解释方舟计划和冬眠技术"
  - "不要提前明牌AI阵营、林远身份、引导体或自然觉醒者"
  - "不要让母亲本章就知道真相"
  - "不要让沈医生暴力威胁，保持温和流程化压迫"
  - "不要重复第十三章的林远住处调查结构"

红线提醒:
  - "P0: 不要用AI词汇（'众所周知'、'不言而喻'等）"
  - "P0: 不要用感悟式结尾（'他明白了...'、'她终于懂得...'）"
  - "P0: 不要用上帝视角（'所有人没想到...'）"
  - "P0: 不要提前明牌方舟全貌、冬眠舱用途、两种AI、林远真实身份"
  - "P1: 避免套路化表达、流水账、抽象心理描写"
  - "P1: 避免连续用'他发现/他意识到/他觉得'推进"
  - "P1: 避免把方舟边缘写成设定百科"
  - "P2: 用TM-000、能源负载、接驳路线、ARK残片、母亲补充评估通知承载压力"
